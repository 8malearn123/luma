<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>LUMA — داشبورد الصالون</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Cairo:wght@200;300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet" />
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#131217; --surface:#18171d; --surface2:#1b1a21; --surface3:#201f26;
    --gold:#9c8047; --gold-light:#ccab64; --gold-bright:#dbbd81; --gold-pale:#e6ce95; --gold-deep:#846a38;
    --white:#f6f2ec; --cream:#ece6da; --muted:#86818d; --muted-deep:#58545f;
    --line:#26242d; --line-soft:#1e1d24;
    --green:#6fa86a; --green-bg:rgba(111,168,106,0.12); --red:#c2705f; --rose:#d98a93; --blue:#6f93b8;
    --sidebar-w:262px;
  }
  body{background:var(--bg);color:var(--white);font-family:'Cairo',sans-serif;font-weight:300;line-height:1.7;-webkit-font-smoothing:antialiased;}
  .serif{font-family:'Bodoni Moda',serif;} .mono{font-family:'IBM Plex Mono',monospace;letter-spacing:0.14em;direction:ltr;}
  .num{font-family:'Bodoni Moda',serif;font-weight:500;direction:ltr;}
  .gold-fill{background:linear-gradient(120deg,#dbbd81,#ccab64 35%,#9c8047);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  ::selection{background:var(--gold);color:#131217;} a{color:inherit;text-decoration:none;}
  ::-webkit-scrollbar{width:9px;height:9px;}::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:6px;border:2px solid var(--bg);}::-webkit-scrollbar-thumb:hover{background:var(--gold-deep);}
  .app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh;}

  .sidebar{background:linear-gradient(190deg,#1c160f,#120d08);border-left:1px solid var(--line);height:100vh;position:sticky;top:0;display:flex;flex-direction:column;}
  .sb-head{padding:24px;border-bottom:1px solid var(--line-soft);}
  .sb-head .brand{font-family:'Bodoni Moda',serif;font-weight:500;font-size:25px;letter-spacing:0.28em;color:var(--gold-light);direction:ltr;}
  .sb-head .salon{display:flex;align-items:center;gap:10px;margin-top:14px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:9px 11px;}
  .sb-head .salon .lg{width:34px;height:34px;border-radius:9px;background:linear-gradient(140deg,#201f26,#18171d);border:1px solid var(--gold-deep);display:flex;align-items:center;justify-content:center;color:var(--gold-light);font-family:'Bodoni Moda',serif;font-size:16px;}
  .sb-head .salon .nm b{font-size:13px;color:var(--white);font-weight:600;display:block;} .sb-head .salon .nm span{font-size:10.5px;color:var(--muted);}
  .sb-nav{flex:1;overflow-y:auto;padding:16px 14px;}
  .nav-item{display:flex;align-items:center;gap:13px;padding:12px 14px;border-radius:10px;cursor:pointer;color:var(--cream);font-size:14.5px;transition:background .2s,color .2s;position:relative;margin-bottom:2px;}
  .nav-item .ico{width:20px;height:20px;color:var(--muted);transition:color .2s;display:flex;}
  .nav-item .lbl{flex:1;} .nav-item .dot{width:6px;height:6px;border-radius:50%;background:var(--gold-light);opacity:0;}
  .nav-item:hover{background:var(--surface);color:var(--white);} .nav-item:hover .ico{color:var(--gold-pale);}
  .nav-item.active{background:linear-gradient(100deg,rgba(156,124,58,0.18),rgba(156,124,58,0.05));color:var(--gold-light);font-weight:500;}
  .nav-item.active .ico{color:var(--gold-light);} .nav-item.active .dot{opacity:1;}
  .nav-item.active::before{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--gold-light);border-radius:3px;}

  .main{min-width:0;display:flex;flex-direction:column;}
  .topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:18px;padding:16px 30px;background:rgba(23,18,13,0.85);backdrop-filter:blur(18px);border-bottom:1px solid var(--line);}
  .topbar .pg .crumb{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:0.14em;color:var(--gold);direction:ltr;}
  .topbar .pg h1{font-family:'Cairo',sans-serif;font-weight:600;font-size:20px;color:var(--white);}
  .topbar .right{margin-right:auto;display:flex;align-items:center;gap:12px;}
  .topbar .me{display:flex;align-items:center;gap:10px;} .topbar .me .av{width:40px;height:40px;border-radius:50%;background:linear-gradient(140deg,#201f26,#18171d);border:1px solid var(--gold-deep);display:flex;align-items:center;justify-content:center;color:var(--gold-light);font-family:'Bodoni Moda',serif;font-size:17px;}
  .topbar .me .nm b{font-size:13px;color:var(--white);font-weight:600;display:block;} .topbar .me .nm span{font-size:11px;color:var(--muted);}
  .screen{padding:30px;max-width:1560px;width:100%;}

  .sec-label{display:flex;align-items:center;gap:12px;font-size:12px;font-weight:600;color:var(--gold);margin-bottom:16px;}
  .sec-label .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent);}
  .sec-label .more{font-size:12px;font-weight:400;color:var(--muted);cursor:pointer;} .sec-label .more:hover{color:var(--gold-light);}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:20px;}
  .stat{position:relative;background:linear-gradient(160deg,var(--surface2),var(--surface));border:1px solid var(--line);border-radius:16px;padding:20px;overflow:hidden;transition:border-color .3s,transform .3s;}
  .stat:hover{border-color:var(--gold-deep);transform:translateY(-3px);}
  .stat .glow{position:absolute;top:-40%;left:-10%;width:55%;height:80%;background:radial-gradient(ellipse,rgba(156,124,58,0.14),transparent 70%);}
  .stat .top{display:flex;align-items:center;justify-content:space-between;position:relative;}
  .stat .top .ico{width:38px;height:38px;border-radius:10px;background:var(--surface3);border:0.5px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--gold-light);}
  .stat .top .delta{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:4px 9px;border-radius:20px;direction:ltr;color:var(--green);background:var(--green-bg);}
  .stat .val{font-family:'Bodoni Moda',serif;font-weight:500;font-size:38px;color:var(--white);direction:ltr;line-height:1;margin-top:16px;display:flex;align-items:baseline;gap:6px;}
  .stat .val .u{font-family:'Cairo',sans-serif;font-size:13px;color:var(--muted);} .stat .k{font-size:13px;color:var(--gold-pale);margin-top:7px;}
  .badge{font-size:11px;padding:4px 11px;border-radius:20px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
  .badge.gold{color:var(--gold-light);background:rgba(156,124,58,0.16);border:0.5px solid var(--gold-deep);}
  .badge.green{color:var(--green);background:var(--green-bg);} .badge.soft{color:var(--muted);background:var(--surface3);}
  .btn{font-family:'Cairo',sans-serif;font-weight:500;font-size:13.5px;padding:11px 20px;border-radius:9px;cursor:pointer;border:none;transition:all .25s;white-space:nowrap;display:inline-flex;align-items:center;gap:8px;}
  .btn-gold{background:linear-gradient(120deg,#dbbd81,#ccab64 45%,#9c8047);color:#131217;} .btn-gold:hover{filter:brightness(1.07);}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--cream);} .btn-ghost:hover{border-color:var(--gold-deep);color:var(--gold-light);}
  .empty-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 20px;gap:16px;}
  .empty-screen .ico{width:70px;height:70px;border-radius:50%;border:1px solid var(--gold-deep);display:flex;align-items:center;justify-content:center;color:var(--gold-light);}
  .empty-screen h3{font-weight:600;font-size:21px;color:var(--white);} .empty-screen p{font-size:14px;color:var(--muted);max-width:42ch;line-height:1.8;}
  .fade-in{animation:fade .5s ease both;}@keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  @media(prefers-reduced-motion:reduce){.fade-in{animation:none;}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sb-head">
      <a class="brand" href="index.html" title="العودة للرئيسية" style="text-decoration:none;cursor:pointer">LUMA</a>
      <div class="salon"><span class="lg">ل</span><span class="nm"><b>صالون لمسة</b><span>جدة · حي الشاطئ</span></span></div>
    </div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div style="margin-top:auto;padding:14px;border-top:1px solid var(--line-soft)">
      <a href="login.html" title="تسجيل الخروج" style="display:flex;align-items:center;justify-content:center;gap:8px;color:var(--gold-pale);font-size:13px;border:1px solid var(--line);border-radius:10px;padding:10px;text-decoration:none" onmouseover="this.style.borderColor='var(--gold-deep)';this.style.color='var(--gold-light)'" onmouseout="this.style.borderColor='var(--line)';this.style.color='var(--gold-pale)'"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></svg> تسجيل الخروج</a>
    </div>
  </aside>
  <div class="main">
    <header class="topbar">
      <div class="pg"><span class="crumb" id="tb-crumb">SALON</span><h1 id="tb-title">نظرة عامة</h1></div>
      <div class="right">
        <button class="btn btn-gold" onclick="SALON.go('board')">+ حجز جديد</button>
        <div class="me"><div class="av">ل</div><div class="nm"><b>لمى المالكي</b><span>مديرة الصالون</span></div></div>
      </div>
    </header>
    <div class="screen fade-in" id="screen"></div>
  </div>
</div>

<script>
const IC={
  grid:'<rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>',
  board:'<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 3v18M3 9h18"/>',
  staff:'<circle cx="9" cy="8" r="3.4"/><path d="M2.5 20a6.5 6.5 0 0113 0"/><path d="M16 5.2a3.4 3.4 0 010 6M21.5 20a6.5 6.5 0 00-4-6"/>',
  users:'<circle cx="9" cy="8" r="3.4"/><path d="M2.5 20a6.5 6.5 0 0113 0"/><path d="M16 5.2a3.4 3.4 0 010 6M21.5 20a6.5 6.5 0 00-4-6"/>',
  scissors:'<circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M8.5 8L20 18M8.5 16L20 6"/>',
  wallet:'<rect x="3" y="6" width="18" height="13" rx="2.5"/><path d="M3 10h18M16 14h2"/>',
  chart:'<path d="M4 20V4M4 20h16"/><rect x="7" y="12" width="3" height="5"/><rect x="12" y="8" width="3" height="9"/><rect x="17" y="5" width="3" height="12"/>',
  pin:'<path d="M12 21s-7-6-7-11a7 7 0 0114 0c0 5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/>',
  gear:'<circle cx="12" cy="12" r="3.2"/><path d="M12 2v3M12 19v3M5 5l2 2M17 17l2 2M2 12h3M19 12h3M5 19l2-2M17 7l2-2"/>',
  clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
  walk:'<circle cx="13" cy="4" r="2"/><path d="M9 21l2-7-3-2 1-4 4 2 2 3M11 14l-2 7M14 13l2 4"/>',
  star:'<path d="M12 3l2.6 5.6 6 .8-4.4 4.2 1.1 6L12 17.8 6.7 19.6l1.1-6L3.4 9.4l6-.8z"/>',
  chair:'<path d="M6 19v-7a3 3 0 013-3h6a3 3 0 013 3v7M6 14h12M8 19v2M16 19v2"/>',
  bag:'<path d="M6 7h12l1 13a1 1 0 01-1 1H6a1 1 0 01-1-1z"/><path d="M9 7a3 3 0 016 0"/>',
  ticket:'<path d="M3 9a2 2 0 012-2h14a2 2 0 012 2 2 2 0 000 4 2 2 0 01-2 2H5a2 2 0 01-2-2 2 2 0 000-4z"/><path d="M14 7v10" stroke-dasharray="1 2"/>',
  invoice:'<path d="M6 2h9l4 4v15l-2.2-1.4L14.6 21l-2.6-1.5L9.4 21 7.2 19.6 5 21V4a2 2 0 012-2z"/><path d="M9 8h6M9 12h6M9 16h3"/>',
  mega:'<path d="M3 11v3a1 1 0 001 1h2l8 4V6L6 10H4a1 1 0 00-1 1z"/><path d="M16 9a3 3 0 010 6M18.5 6.5a6 6 0 010 11"/>',
  boxes:'<path d="M3 7l9-4 9 4v10l-9 4-9-4z"/><path d="M3 7l9 4 9-4M12 11v10"/>',
  plus:'<path d="M12 5v14M5 12h14"/>',
};
const icon=(n,s=20)=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${IC[n]||''}</svg>`;
window.icon=icon;

/* ── STAFF + APPOINTMENTS (booking board core) ── */
const STAFF=[
  {id:'amal',n:'أمل',role:'مكياج',color:'#ccab64'},
  {id:'sara',n:'سارة',role:'شعر',color:'#d98a93'},
  {id:'nora',n:'نورة',role:'بشرة',color:'#7d9bc0'},
  {id:'reem',n:'ريم',role:'أظافر',color:'#6fa86a'},
];
/* staff added from the UI persist across reloads */
const STAFF_KEY='luma_salon_staff';
try{(JSON.parse(localStorage.getItem(STAFF_KEY))||[]).forEach(s=>{if(s&&s.id&&!STAFF.some(x=>x.id===s.id))STAFF.push(s);});}catch(e){}
function saveStaff(){try{localStorage.setItem(STAFF_KEY,JSON.stringify(STAFF.filter(s=>s.custom)));}catch(e){}}
const STAFF_COLORS=['#c98ab6','#8ac9b8','#9b8ac9','#c97f6f','#6fb0c9','#b8c96f'];
const START_HOUR=10, SLOTS=20, ROW_H=44; /* 10:00 → 20:00, 30-min slots */
function slotLabel(i){const t=START_HOUR*60+i*30;let h=Math.floor(t/60),m=t%60;const ap=h>=12?'م':'ص';let h12=h>12?h-12:h;return `${h12}:${m===0?'00':'30'} ${ap}`;}
/* appts: {staff, start(slot index), dur(slots), client, service, st} */
const APPTS=[
  {staff:'amal',start:0,dur:2,client:'نوف العتيبي',service:'مكياج سهرة',st:'confirmed'},
  {staff:'amal',start:4,dur:4,client:'دانة السالم',service:'مكياج عروس',st:'confirmed'},
  {staff:'amal',start:10,dur:2,client:'ريم القحطاني',service:'مكياج ناعم',st:'pending'},
  {staff:'sara',start:1,dur:3,client:'لمياء الحربي',service:'صبغة + قص',st:'confirmed'},
  {staff:'sara',start:6,dur:2,client:'هند الشمري',service:'تسريحة',st:'confirmed'},
  {staff:'sara',start:12,dur:4,client:'وعد الزهراني',service:'كيراتين',st:'confirmed'},
  {staff:'nora',start:0,dur:3,client:'سارة الأحمدي',service:'هيدرافيشل',st:'confirmed'},
  {staff:'nora',start:5,dur:2,client:'منيرة الدوسري',service:'تنظيف بشرة',st:'pending'},
  {staff:'nora',start:9,dur:2,client:'أمل السبيعي',service:'تقشير',st:'confirmed'},
  {staff:'reem',start:2,dur:2,client:'جواهر الشهري',service:'منيكير جل',st:'confirmed'},
  {staff:'reem',start:5,dur:3,client:'لطيفة المطيري',service:'منيكير + بديكير',st:'confirmed'},
  {staff:'reem',start:11,dur:2,client:'عبير الغامدي',service:'تركيب أظافر',st:'walkin'},
];
const ST_STYLE={confirmed:{bg:'rgba(111,168,106,0.16)',bd:'#6fa86a',lb:'مؤكد'},pending:{bg:'rgba(205,172,80,0.16)',bd:'#ccab64',lb:'بانتظار الدفع'},walkin:{bg:'rgba(125,155,192,0.16)',bd:'#7d9bc0',lb:'حضور مباشر'}};

const SCREENS={};

SCREENS.overview=()=>{
  const onDuty=STAFF.length;
  const todayCount=APPTS.length;
  const revenue='6,840';
  /* 7-day upcoming: confirmed + cancelled */
  const WEEK=[['الثلاثاء',9,0],['الأربعاء',9,1],['الخميس',12,0],['الجمعة',9,0],['السبت',1,0],['الأحد',3,0],['الإثنين',1,0]];
  const SALES=[['16',9],['17',11.5],['18',14],['19',10.4],['20',16],['21',12.6],['22',6.8]];
  const APVAL=[['16',5.4],['17',6.8],['18',5.1],['19',9.2],['20',11.4],['21',9.1],['22',4.2]];
  function apptBars(){
    const W=540,H=230,pad={t:18,r:8,b:34,l:30},iw=W-pad.l-pad.r,ih=H-pad.t-pad.b,max=12,step=iw/WEEK.length,bw=Math.min(30,step*0.42);
    let grid='';for(let g=0;g<=4;g++){const y=pad.t+ih-(g/4)*ih;grid+=`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="#26242d" stroke-width="1"/><text x="${pad.l-6}" y="${y+4}" fill="#58545f" font-size="9.5" font-family="IBM Plex Mono" text-anchor="end">${((g/4)*max).toFixed(0)}</text>`;}
    let bars=WEEK.map((d,i)=>{const x=pad.l+i*step+(step-bw)/2;const hc=(d[1]/max)*ih,hx=(d[2]/max)*ih;const yC=pad.t+ih-hc,yX=yC-hx;return `<g><rect x="${x}" y="${yC}" width="${bw}" height="${hc}" rx="3" fill="url(#abg)"/>${d[2]?`<rect x="${x}" y="${yX}" width="${bw}" height="${hx}" rx="3" fill="#c2705f"/>`:''}<text x="${x+bw/2}" y="${H-14}" fill="#86818d" font-size="9.5" font-family="Cairo" text-anchor="middle">${d[0]}</text></g>`;}).join('');
    return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible"><defs><linearGradient id="abg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#dbbd81"/><stop offset="1" stop-color="#9c8047"/></linearGradient></defs>${grid}${bars}</svg>`;
  }
  function salesLines(){
    const W=540,H=230,pad={t:18,r:10,b:30,l:38},iw=W-pad.l-pad.r,ih=H-pad.t-pad.b,max=28,step=iw/(SALES.length-1);
    const toPts=arr=>arr.map((d,i)=>[pad.l+i*step,pad.t+ih-(d[1]/max)*ih]);
    const p1=toPts(SALES),p2=toPts(APVAL);
    const path=p=>p.map((q,i)=>`${i?'L':'M'}${q[0].toFixed(1)} ${q[1].toFixed(1)}`).join(' ');
    let grid='';for(let g=0;g<=4;g++){const y=pad.t+ih-(g/4)*ih;grid+=`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="#26242d" stroke-width="1"/><text x="${pad.l-6}" y="${y+4}" fill="#58545f" font-size="9" font-family="IBM Plex Mono" text-anchor="end">${((g/4)*max).toFixed(0)}k</text>`;}
    const dots=(p,c)=>p.map(q=>`<circle cx="${q[0].toFixed(1)}" cy="${q[1].toFixed(1)}" r="2.6" fill="${c}"/>`).join('');
    const labels=SALES.map((d,i)=>`<text x="${(pad.l+i*step).toFixed(1)}" y="${H-12}" fill="#86818d" font-size="9.5" font-family="Cairo" text-anchor="middle">${d[0]}</text>`).join('');
    return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible">${grid}<path d="${path(p2)}" fill="none" stroke="#6fa86a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="${path(p1)}" fill="none" stroke="#ccab64" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>${dots(p2,'#6fa86a')}${dots(p1,'#ccab64')}${labels}</svg>`;
  }
  const STATS=[
    {ic:'board',k:'حجوزات اليوم',v:todayCount,u:'',d:'+4'},
    {ic:'wallet',k:'دخل اليوم المتوقع',v:revenue,u:'ر.س',d:'+12%'},
    {ic:'staff',k:'موظفات على رأس العمل',v:onDuty,u:`/ ${STAFF.length}`,d:''},
    {ic:'chair',k:'إشغال الكراسي',v:'82',u:'%',d:'+6%'},
  ];

      <div class="sec-label">الحملات والعروض <span class="ln"></span></div>
      ${CAMP.map(c=>`<div class="card" style="display:flex;align-items:center;gap:15px;margin-bottom:11px;padding:16px 18px"><div style="width:44px;height:44px;border-radius:11px;background:var(--surface3);border:0.5px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--gold-light)">${icon('mega',20)}</div><div style="flex:1"><div style="font-size:15px;color:var(--white);font-weight:600">${c.n}</div><div style="font-size:12px;color:var(--muted);margin-top:2px">${c.type} · <span style="font-family:'IBM Plex Mono',monospace;color:var(--gold-pale);direction:ltr">${c.code}</span></div></div><div style="text-align:center"><div class="num" style="font-size:18px;color:var(--white)">${c.used}</div><div style="font-size:10.5px;color:var(--muted)">استخدام</div></div><div style="text-align:center"><div class="num" style="font-size:18px;color:var(--gold-light)">${c.rev}</div><div style="font-size:10.5px;color:var(--muted)">ر.س إيراد</div></div><span class="badge ${c.sc}">${c.st}</span></div>`).join('')}
    </div>
    <div class="card"><div class="sec-label">قنوات الوصول <span class="ln"></span></div>${CH.map(c=>`<div style="display:flex;align-items:center;gap:12px;padding:11px 0"><span style="font-size:13px;color:var(--cream);width:108px">${c[0]}</span><div style="flex:1;height:9px;background:var(--surface3);border-radius:10px;overflow:hidden"><span style="display:block;height:100%;width:${c[1]/44*100}%;background:${c[2]};border-radius:10px"></span></div><span class="mono" style="font-size:12px;color:var(--gold-pale);width:34px;text-align:left">${c[1]}%</span></div>`).join('')}
      <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--line-soft);display:flex;align-items:center;gap:12px"><div style="width:40px;height:40px;border-radius:11px;background:rgba(156,124,58,0.16);border:0.5px solid var(--gold-deep);display:flex;align-items:center;justify-content:center;color:var(--gold-light)">${icon('users',19)}</div><div><div style="font-size:13.5px;color:var(--white);font-weight:600">برنامج الإحالة</div><div style="font-size:12px;color:var(--muted)">٢٨ عميلة دعت 39 صديقة</div></div></div>
    </div>
  </div>`;
};

/* ── INVENTORY (المخزون + إضافة) ── */
window.INVENTORY=[
  {n:'كريم أساس — درجات',cat:'مكياج',q:8,min:10,cost:90,sup:'مورّد الجمال'},
  {n:'رموش صناعية',cat:'مكياج',q:6,min:10,cost:25,sup:'لاش برو'},
  {n:'صبغة شعر — بنّي',cat:'شعر',q:18,min:8,cost:55,sup:'كلر لاين'},
  {n:'زيت كيراتين',cat:'شعر',q:4,min:6,cost:120,sup:'كلر لاين'},
  {n:'محلول هيدرافيشل',cat:'بشرة',q:22,min:8,cost:140,sup:'سكن كير'},
  {n:'جل أظافر — ألوان',cat:'أظافر',q:30,min:12,cost:18,sup:'نيل بار'},
  {n:'مثبّت مكياج (سبراي)',cat:'مكياج',q:3,min:8,cost:60,sup:'مورّد الجمال'},
];
function invStatus(it){if(it.q<=Math.ceil(it.min*0.4))return['يحتاج طلب','gold'];if(it.q<it.min)return['منخفض','gold'];return['متوفر','green'];}
window.SALON_INV={
  open(){document.getElementById('inv-modal').style.display='flex';},
  close(){document.getElementById('inv-modal').style.display='none';},
  add(){
    const g=id=>document.getElementById(id).value.trim();
    const n=g('iv-n');if(!n){document.getElementById('iv-n').focus();return;}
    window.INVENTORY.unshift({n,cat:g('iv-cat')||'عام',q:+g('iv-q')||0,min:+g('iv-min')||5,cost:+g('iv-cost')||0,sup:g('iv-sup')||'—'});
    this.close();SALON.go('inventory');
  }
};
SCREENS.inventory=()=>{
  const items=window.INVENTORY;
  const low=items.filter(i=>i.q<i.min).length;
  const value=items.reduce((s,i)=>s+i.q*i.cost,0);
  return `
  <style>.ivtab{background:var(--surface);border:1px solid var(--line);border-radius:16px;overflow:hidden}.ivh,.ivr{display:grid;grid-template-columns:2fr 1fr 0.9fr 0.9fr 1fr 1.1fr;gap:12px;align-items:center;padding:14px 20px}.ivh{background:var(--surface2);border-bottom:1px solid var(--line);font-size:11.5px;color:var(--gold);font-weight:600}.ivr{border-bottom:1px solid var(--line-soft)}.ivr:last-child{border-bottom:none}.ivr:hover{background:var(--surface2)}.ivr .nm{font-size:14px;color:var(--white);font-weight:500}.ivr .num{font-family:'Bodoni Moda',serif;font-size:18px;color:var(--white);direction:ltr}.ivr .num.warn{color:var(--gold-light)}.ivr .mut{font-size:13px;color:var(--cream)}.bar{height:6px;background:var(--surface3);border-radius:10px;overflow:hidden;margin-top:5px}.bar span{display:block;height:100%;border-radius:10px}@media(max-width:1080px){.ivh{display:none}.ivr{grid-template-columns:1fr auto}.ivr .hide{display:none}}
  .modal{display:none;position:fixed;inset:0;z-index:90;background:rgba(8,6,4,0.7);backdrop-filter:blur(6px);align-items:center;justify-content:center}
  .sheet{width:480px;max-width:92vw;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:26px;box-shadow:0 30px 80px rgba(0,0,0,0.6)}
  .sheet h3{font-size:18px;color:var(--white);font-weight:600;margin-bottom:4px}.sheet .sub{font-size:12.5px;color:var(--muted);margin-bottom:18px}
  .frow{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}.frow label{font-size:12.5px;color:var(--gold-pale)}.fin{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px 14px;color:var(--white);font-family:'Cairo',sans-serif;font-size:14px;outline:none}.fin:focus{border-color:var(--gold-deep)}.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}</style>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px"><div><div style="font-weight:600;font-size:19px;color:var(--white)">مخزون الصالون</div><div style="font-size:13px;color:var(--gold-pale);margin-top:2px">المستلزمات وتنبيهات النفاد</div></div><button class="btn btn-gold" onclick="SALON_INV.open()">${icon('plus',16)} إضافة للمخزون</button></div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px">
    <div class="stat"><div class="glow"></div><div class="top"><div class="ico">${icon('boxes',19)}</div></div><div class="val">${items.length}</div><div class="k">أصناف في المخزون</div></div>
    <div class="stat"><div class="glow"></div><div class="top"><div class="ico">${icon('clock',19)}</div>${low?`<div class="delta" style="color:var(--gold-light);background:rgba(156,124,58,0.16)">⚠ ${low}</div>`:''}</div><div class="val">${low}</div><div class="k">أصناف تحت الحد الأدنى</div></div>
    <div class="stat"><div class="glow"></div><div class="top"><div class="ico">${icon('wallet',19)}</div></div><div class="val">${value.toLocaleString('en')}<span class="u">ر.س</span></div><div class="k">قيمة المخزون</div></div>
  </div>
  <div class="ivtab"><div class="ivh"><span>الصنف</span><span>القسم</span><span>المتوفر</span><span>الحد الأدنى</span><span>المورّد</span><span>الحالة</span></div>
  ${items.map(it=>{const[lb,sc]=invStatus(it);const pct=Math.min(100,it.q/(it.min*1.6)*100);const col=sc==='green'?'#6fa86a':'#ccab64';return `<div class="ivr"><div><div class="nm">${it.n}</div><div class="bar hide"><span style="width:${pct}%;background:${col}"></span></div></div><span class="mut hide">${it.cat}</span><span class="num ${it.q<it.min?'warn':''}">${it.q}</span><span class="num mut hide" style="color:var(--muted)">${it.min}</span><span class="mut hide">${it.sup}</span><span><span class="badge ${sc}">${lb}</span></span></div>`;}).join('')}
  </div>
  <div class="modal" id="inv-modal" onclick="if(event.target===this)SALON_INV.close()">
    <div class="sheet">
      <h3>إضافة صنف للمخزون</h3><div class="sub">املأي بيانات الصنف الجديد</div>
      <div class="frow"><label>اسم الصنف</label><input class="fin" id="iv-n" placeholder="مثالًا: كريم أساس"/></div>
      <div class="two"><div class="frow"><label>القسم</label><input class="fin" id="iv-cat" placeholder="مكياج / شعر..."/></div><div class="frow"><label>المورّد</label><input class="fin" id="iv-sup" placeholder="اسم المورّد"/></div></div>
      <div class="two"><div class="frow"><label>الكمية المتوفرة</label><input class="fin" id="iv-q" type="number" placeholder="0"/></div><div class="frow"><label>الحد الأدنى</label><input class="fin" id="iv-min" type="number" placeholder="5"/></div></div>
      <div class="frow"><label>تكلفة الوحدة (ر.س)</label><input class="fin" id="iv-cost" type="number" placeholder="0"/></div>
      <div style="display:flex;gap:12px;margin-top:8px"><button class="btn btn-gold" style="flex:1;justify-content:center" onclick="SALON_INV.add()">إضافة</button><button class="btn btn-ghost" onclick="SALON_INV.close()">إلغاء</button></div>
    </div>
  </div>`;
};

const NAV=[
  {id:'overview',label:'نظرة عامة',icon:'grid',crumb:'SALON'},
  {id:'board',label:'لوحة الحجوزات',icon:'board',crumb:'SALON'},
  {id:'staff',label:'الطاقم',icon:'staff',crumb:'SALON'},
  {id:'clients',label:'العملاء',icon:'users',crumb:'SALON'},
  {id:'services',label:'الخدمات',icon:'scissors',crumb:'SALON'},
  {id:'products',label:'المنتجات',icon:'bag',crumb:'SALON'},
  {id:'inventory',label:'المخزون',icon:'boxes',crumb:'SALON'},
  {id:'subscriptions',label:'الاشتراكات',icon:'ticket',crumb:'SALON'},
  {id:'invoices',label:'الفواتير البيعية',icon:'invoice',crumb:'FINANCE'},
  {id:'marketing',label:'التسويق',icon:'mega',crumb:'GROWTH'},
  {id:'finance',label:'المالية',icon:'wallet',crumb:'FINANCE'},
  {id:'branches',label:'الفروع',icon:'pin',crumb:'SALON'},
  {id:'settings',label:'الإعدادات',icon:'gear',crumb:'SYSTEM'},
];
const NAV_FLAT={};NAV.forEach(n=>NAV_FLAT[n.id]=n);
document.getElementById('sb-nav').innerHTML=NAV.map(it=>`<div class="nav-item" data-id="${it.id}" onclick="SALON.go('${it.id}')"><span class="ico">${icon(it.icon,20)}</span><span class="lbl">${it.label}</span><span class="dot"></span></div>`).join('');

const SALON={
  go(id){
    const it=NAV_FLAT[id];if(!it)return;location.hash=id;
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.id===id));
    document.getElementById('tb-crumb').textContent=it.crumb;document.getElementById('tb-title').textContent=it.label;
    const host=document.getElementById('screen');host.classList.remove('fade-in');void host.offsetWidth;host.classList.add('fade-in');
    if(SCREENS[id])host.innerHTML=SCREENS[id]();
    else host.innerHTML=`<div class="empty-screen"><div class="ico">${icon(it.icon,30)}</div><h3>${it.label}</h3><p>هذه الشاشة ضمن المراحل القادمة. القائمة ولوحة الحجوزات تعمل بالكامل.</p></div>`;
    window.scrollTo({top:0});
  },
  addStaff(){
    const roles=['مكياج','شعر','بشرة','أظافر','رموش','سبا'];
    const body=`
      <div class="lux-lead">أدخلي بيانات الموظفة الجديدة — ستظهر مباشرة في قائمة الطاقم وفي لوحة الحجوزات.</div>
      <div class="lux-f"><label>اسم الموظفة</label><input name="name" placeholder="مثال: لينا"/></div>
      <div class="lux-two">
        <div class="lux-f"><label>التخصص</label><select name="role">${roles.map(r=>`<option>${r}</option>`).join('')}</select></div>
        <div class="lux-f"><label>الدوام</label><select name="shift"><option>دوام كامل</option><option>دوام جزئي</option></select></div>
      </div>
      <div class="lux-f"><label>رقم الجوال (اختياري)</label><input name="phone" dir="ltr" style="text-align:right" placeholder="05xxxxxxxx"/></div>
      <div class="lux-foot"><button class="lux-btn lux-ghost" data-c style="flex:1">إلغاء</button><button class="lux-btn lux-gold" data-ok style="flex:1.4">إضافة الموظفة</button></div>`;
    LUX.modal('إضافة موظفة جديدة',body,{onMount(ov,close){
      ov.querySelector('[data-c]').onclick=close;
      ov.querySelector('[data-ok]').onclick=()=>{
        const name=ov.querySelector('[name=name]');
        if(!name.value.trim()){name.style.borderColor='#c0566a';name.focus();return;}
        const color=STAFF_COLORS[STAFF.filter(s=>s.custom).length%STAFF_COLORS.length];
        STAFF.push({id:'s'+Date.now(),n:name.value.trim(),role:ov.querySelector('[name=role]').value,
          shift:ov.querySelector('[name=shift]').value,phone:ov.querySelector('[name=phone]').value.trim(),
          color,custom:true});
        saveStaff();close();SALON.go('staff');
        LUX.toast('تمت إضافة '+name.value.trim()+' إلى الطاقم ✓','ok');
      };
    }});
  },
  addClient(){
    const body=`
      <div class="lux-lead">أدخلي بيانات العميلة الجديدة — ستظهر مباشرة في قاعدة عملاء الصالون.</div>
      <div class="lux-f"><label>اسم العميلة</label><input name="name" placeholder="مثال: جوري السالم"/></div>
      <div class="lux-f"><label>رقم الجوال</label><input name="phone" dir="ltr" style="text-align:right" placeholder="05xxxxxxxx"/></div>
      <div class="lux-two">
        <div class="lux-f"><label>الموظفة المفضّلة</label><select name="staff"><option>بدون تفضيل</option>${STAFF.map(s=>`<option>${s.n}</option>`).join('')}</select></div>
        <div class="lux-f"><label>كيف عرفت الصالون؟</label><select name="src"><option>زيارة مباشرة</option><option>سوق لوما</option><option>توصية صديقة</option><option>إنستقرام</option><option>أخرى</option></select></div>
      </div>
      <div class="lux-f"><label>ملاحظات (اختياري)</label><textarea name="notes" rows="2" placeholder="حساسية، تفضيلات، مناسبة قادمة…"></textarea></div>
      <div class="lux-foot"><button class="lux-btn lux-ghost" data-c style="flex:1">إلغاء</button><button class="lux-btn lux-gold" data-ok style="flex:1.4">إضافة العميلة</button></div>`;
    LUX.modal('إضافة عميلة جديدة',body,{onMount(ov,close){
      ov.querySelector('[data-c]').onclick=close;
      ov.querySelector('[data-ok]').onclick=()=>{
        const name=ov.querySelector('[name=name]');
        if(!name.value.trim()){name.style.borderColor='#c0566a';name.focus();return;}
        const phone=ov.querySelector('[name=phone]').value.trim();
        if(phone&&!/^0?5\d{8}$/.test(phone.replace(/[\s-]/g,''))){const p=ov.querySelector('[name=phone]');p.style.borderColor='#c0566a';p.focus();LUX.toast('رقم الجوال غير صحيح — مثال: 0551234567','err');return;}
        const staff=ov.querySelector('[name=staff]').value;
        CLIENTS.unshift({n:name.value.trim(),v:0,sp:'0',last:'—',staff:staff==='بدون تفضيل'?'—':staff,
          tag:'جديدة',tc:'soft',phone,src:ov.querySelector('[name=src]').value,
          notes:ov.querySelector('[name=notes]').value.trim(),custom:true});
        saveClients();close();SALON.go('clients');
        LUX.toast('تمت إضافة '+name.value.trim()+' إلى قاعدة العملاء ✓','ok');
      };
    }});
  }
};
window.SALON=SALON;
const start=(location.hash||'').replace('#','')||'overview';SALON.go(NAV_FLAT[start]?start:'overview');
</script>
<script src="luma-ui.js"></script>
</body>
</html>
