<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#131217; --surface:#18171d; --surface2:#1b1a21; --surface3:#201f26;
    --gold:#9c8047; --gold-light:#ccab64; --gold-bright:#dbbd81; --gold-pale:#e6ce95; --gold-deep:#846a38;
    --white:#f6f2ec; --cream:#ece6da; --muted:#86818d; --muted-deep:#58545f;
    --line:#26242d; --line-soft:#1e1d24;
    --green:#6fa86a; --green-bg:rgba(111,168,106,0.12); --red:#c2705f; --rose:#d98a93; --blue:#6f93b8;
    --sidebar-w:262px;
  }
  body{background:var(--bg);color:var(--white);font-family:'IBM Plex Sans Arabic','Cairo',sans-serif;font-weight:300;line-height:1.7;-webkit-font-smoothing:antialiased;}
  .serif{font-family:'Bodoni Moda',serif;} .mono{font-family:'IBM Plex Mono',monospace;letter-spacing:0.14em;direction:ltr;}
  .num{font-family:'Bodoni Moda',serif;font-weight:500;direction:ltr;}
  .gold-fill{background:linear-gradient(120deg,#dbbd81,#ccab64 35%,#9c8047);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  ::selection{background:var(--gold);color:#131217;} a{color:inherit;text-decoration:none;}
  ::-webkit-scrollbar{width:9px;height:9px;}::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:6px;border:2px solid var(--bg);}::-webkit-scrollbar-thumb:hover{background:var(--gold-deep);}
  .app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh;}

  .sidebar{background:linear-gradient(190deg,#1c160f,#120d08);border-left:1px solid var(--line);height:100vh;position:sticky;top:0;display:flex;flex-direction:column;}
  .sb-head{padding:24px;border-bottom:1px solid var(--line-soft);}
  .sb-head .brand{font-family:'Bodoni Moda',serif;font-weight:500;font-size:25px;letter-spacing:0.28em;color:var(--gold-light);direction:ltr;}
  .sb-head .salon{display:flex;align-items:center;gap:10px;margin-top:14px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:9px 11px;}
  .sb-head .salon .lg{width:34px;height:34px;border-radius:9px;background:linear-gradient(140deg,#201f26,#18171d);border:1px solid var(--gold-deep);display:flex;align-items:center;justify-content:center;color:var(--gold-light);font-family:'Bodoni Moda',serif;font-size:16px;}
  .sb-head .salon .nm b{font-size:13px;color:var(--white);font-weight:600;display:block;} .sb-head .salon .nm span{font-size:10.5px;color:var(--muted);}
  .sb-nav{flex:1;overflow-y:auto;padding:16px 14px;}
  .nav-item{display:flex;align-items:center;gap:13px;padding:12px 14px;border-radius:10px;cursor:pointer;color:var(--cream);font-size:14.5px;transition:background .2s,color .2s;position:relative;margin-bottom:2px;}
  .nav-item .ico{width:20px;height:20px;color:var(--muted);transition:color .2s;display:flex;}
  .nav-item .lbl{flex:1;} .nav-item .dot{width:6px;height:6px;border-radius:50%;background:var(--gold-light);opacity:0;}
  .nav-item:hover{background:var(--surface);color:var(--white);} .nav-item:hover .ico{color:var(--gold-pale);}
  .nav-item.active{background:linear-gradient(100deg,rgba(156,124,58,0.18),rgba(156,124,58,0.05));color:var(--gold-light);font-weight:500;}
  .nav-item.active .ico{color:var(--gold-light);} .nav-item.active .dot{opacity:1;}
  .nav-item.active::before{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--gold-light);border-radius:3px;}

  .main{min-width:0;display:flex;flex-direction:column;}
  .topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:18px;padding:16px 30px;background:rgba(23,18,13,0.85);backdrop-filter:blur(18px);border-bottom:1px solid var(--line);}
  .topbar .pg .crumb{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:0.14em;color:var(--gold);direction:ltr;}
  .topbar .pg h1{font-family:'IBM Plex Sans Arabic','Cairo',sans-serif;font-weight:600;font-size:20px;color:var(--white);}
  .topbar .right{margin-right:auto;display:flex;align-items:center;gap:12px;}
  .topbar .me{display:flex;align-items:center;gap:10px;} .topbar .me .av{width:40px;height:40px;border-radius:50%;background:linear-gradient(140deg,#201f26,#18171d);border:1px solid var(--gold-deep);display:flex;align-items:center;justify-content:center;color:var(--gold-light);font-family:'Bodoni Moda',serif;font-size:17px;}
  .topbar .me .nm b{font-size:13px;color:var(--white);font-weight:600;display:block;} .topbar .me .nm span{font-size:11px;color:var(--muted);}
  .screen{padding:30px;max-width:1560px;width:100%;}

  .sec-label{display:flex;align-items:center;gap:12px;font-size:12px;font-weight:600;color:var(--gold);margin-bottom:16px;}
  .sec-label .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent);}
  .sec-label .more{font-size:12px;font-weight:400;color:var(--muted);cursor:pointer;} .sec-label .more:hover{color:var(--gold-light);}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:20px;}
  .stat{position:relative;background:linear-gradient(160deg,var(--surface2),var(--surface));border:1px solid var(--line);border-radius:16px;padding:20px;overflow:hidden;transition:border-color .3s,transform .3s;}
  .stat:hover{border-color:var(--gold-deep);transform:translateY(-3px);}
  .stat .glow{position:absolute;top:-40%;left:-10%;width:55%;height:80%;background:radial-gradient(ellipse,rgba(156,124,58,0.14),transparent 70%);}
  .stat .top{display:flex;align-items:center;justify-content:space-between;position:relative;}
  .stat .top .ico{width:38px;height:38px;border-radius:10px;background:var(--surface3);border:0.5px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--gold-light);}
  .stat .top .delta{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:4px 9px;border-radius:20px;direction:ltr;color:var(--green);background:var(--green-bg);}
  .stat .val{font-family:'Bodoni Moda',serif;font-weight:500;font-size:38px;color:var(--white);direction:ltr;line-height:1;margin-top:16px;display:flex;align-items:baseline;gap:6px;}
  .stat .val .u{font-family:'IBM Plex Sans Arabic','Cairo',sans-serif;font-size:13px;color:var(--muted);} .stat .k{font-size:13px;color:var(--gold-pale);margin-top:7px;}
  .badge{font-size:11px;padding:4px 11px;border-radius:20px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
  .badge.gold{color:var(--gold-light);background:rgba(156,124,58,0.16);border:0.5px solid var(--gold-deep);}
  .badge.green{color:var(--green);background:var(--green-bg);} .badge.soft{color:var(--muted);background:var(--surface3);}
  .btn{font-family:'IBM Plex Sans Arabic','Cairo',sans-serif;font-weight:500;font-size:13.5px;padding:11px 20px;border-radius:9px;cursor:pointer;border:none;transition:all .25s;white-space:nowrap;display:inline-flex;align-items:center;gap:8px;}
  .btn-gold{background:linear-gradient(120deg,#dbbd81,#ccab64 45%,#9c8047);color:#131217;} .btn-gold:hover{filter:brightness(1.07);}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--cream);} .btn-ghost:hover{border-color:var(--gold-deep);color:var(--gold-light);}
  .empty-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 20px;gap:16px;}
  .empty-screen .ico{width:70px;height:70px;border-radius:50%;border:1px solid var(--gold-deep);display:flex;align-items:center;justify-content:center;color:var(--gold-light);}
  .empty-screen h3{font-weight:600;font-size:21px;color:var(--white);} .empty-screen p{font-size:14px;color:var(--muted);max-width:42ch;line-height:1.8;}
  .fade-in{animation:fade .5s ease both;}@keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  @media(prefers-reduced-motion:reduce){.fade-in{animation:none;}}
</style>

  <aside class="sidebar">

      <a class="brand" href="index.html" title="العودة للرئيسية" style="text-decoration:none;cursor:pointer">LUMA</a>

    <div style="margin-top:auto;padding:14px;border-top:1px solid var(--line-soft)">
      <a href="login.html" title="تسجيل الخروج" style="display:flex;align-items:center;justify-content:center;gap:8px;color:var(--gold-pale);font-size:13px;border:1px solid var(--line);border-radius:10px;padding:10px;text-decoration:none" onmouseover="this.style.borderColor='var(--gold-deep)';this.style.color='var(--gold-light)'" onmouseout="this.style.borderColor='var(--line)';this.style.color='var(--gold-pale)'"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></svg> تسجيل الخروج</a>
    </div>
  </aside>
  <div class="main">

<script>
const IC={
  grid:'<rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>',
  board:'<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 3v18M3 9h18"/>',
  staff:'<circle cx="9" cy="8" r="3.4"/><path d="M2.5 20a6.5 6.5 0 0113 0"/><path d="M16 5.2a3.4 3.4 0 010 6M21.5 20a6.5 6.5 0 00-4-6"/>',
  users:'<circle cx="9" cy="8" r="3.4"/><path d="M2.5 20a6.5 6.5 0 0113 0"/><path d="M16 5.2a3.4 3.4 0 010 6M21.5 20a6.5 6.5 0 00-4-6"/>',
  scissors:'<circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M8.5 8L20 18M8.5 16L20 6"/>',
  wallet:'<rect x="3" y="6" width="18" height="13" rx="2.5"/><path d="M3 10h18M16 14h2"/>',
  chart:'<path d="M4 20V4M4 20h16"/><rect x="7" y="12" width="3" height="5"/><rect x="12" y="8" width="3" height="9"/><rect x="17" y="5" width="3" height="12"/>',
  pin:'<path d="M12 21s-7-6-7-11a7 7 0 0114 0c0 5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/>',
  gear:'<circle cx="12" cy="12" r="3.2"/><path d="M12 2v3M12 19v3M5 5l2 2M17 17l2 2M2 12h3M19 12h3M5 19l2-2M17 7l2-2"/>',
  clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
  walk:'<circle cx="13" cy="4" r="2"/><path d="M9 21l2-7-3-2 1-4 4 2 2 3M11 14l-2 7M14 13l2 4"/>',
  star:'<path d="M12 3l2.6 5.6 6 .8-4.4 4.2 1.1 6L12 17.8 6.7 19.6l1.1-6L3.4 9.4l6-.8z"/>',
  chair:'<path d="M6 19v-7a3 3 0 013-3h6a3 3 0 013 3v7M6 14h12M8 19v2M16 19v2"/>',
  bag:'<path d="M6 7h12l1 13a1 1 0 01-1 1H6a1 1 0 01-1-1z"/><path d="M9 7a3 3 0 016 0"/>',
  ticket:'<path d="M3 9a2 2 0 012-2h14a2 2 0 012 2 2 2 0 000 4 2 2 0 01-2 2H5a2 2 0 01-2-2 2 2 0 000-4z"/><path d="M14 7v10" stroke-dasharray="1 2"/>',
  invoice:'<path d="M6 2h9l4 4v15l-2.2-1.4L14.6 21l-2.6-1.5L9.4 21 7.2 19.6 5 21V4a2 2 0 012-2z"/><path d="M9 8h6M9 12h6M9 16h3"/>',
  mega:'<path d="M3 11v3a1 1 0 001 1h2l8 4V6L6 10H4a1 1 0 00-1 1z"/><path d="M16 9a3 3 0 010 6M18.5 6.5a6 6 0 010 11"/>',
  boxes:'<path d="M3 7l9-4 9 4v10l-9 4-9-4z"/><path d="M3 7l9 4 9-4M12 11v10"/>',
  plus:'<path d="M12 5v14M5 12h14"/>',
};
const icon=(n,s=20)=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${IC[n]||''}</svg>`;
window.icon=icon;

/* ── STAFF + APPOINTMENTS (booking board core) ── */
const STAFF=[
  {id:'amal',n:'أمل',role:'مكياج',color:'#ccab64'},
  {id:'sara',n:'سارة',role:'شعر',color:'#d98a93'},
  {id:'nora',n:'نورة',role:'بشرة',color:'#7d9bc0'},
  {id:'reem',n:'ريم',role:'أظافر',color:'#6fa86a'},
];
/* staff added from the UI persist across reloads */
const STAFF_KEY='luma_salon_staff';
try{(JSON.parse(localStorage.getItem(STAFF_KEY))||[]).forEach(s=>{if(s&&s.id&&!STAFF.some(x=>x.id===s.id))STAFF.push(s);});}catch(e){}
function saveStaff(){try{localStorage.setItem(STAFF_KEY,JSON.stringify(STAFF.filter(s=>s.custom)));}catch(e){}}
const STAFF_COLORS=['#c98ab6','#8ac9b8','#9b8ac9','#c97f6f','#6fb0c9','#b8c96f'];

/* ── staff profile overlay: photo, contact, documents, status — the full HR file ── */
const SP_KEY='luma_staff_profiles', SP_ARCH_KEY='luma_staff_archived';
const spLoad=(k,f)=>{try{return JSON.parse(localStorage.getItem(k))??f}catch(e){return f}};
const spSave=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}};
const spAll=()=>spLoad(SP_KEY,{});
const spOf=id=>({status:'active',docs:[],...(spAll()[id]||{})});
function spSet(id,patch){const all=spAll();all[id]={...spOf(id),...patch};spSave(SP_KEY,all);}
/* archived staff disappear everywhere; name/role overrides apply at load */
{
  const arch=spLoad(SP_ARCH_KEY,[]);
  for(let i=STAFF.length-1;i>=0;i--){
    if(arch.includes(STAFF[i].id)){STAFF.splice(i,1);continue;}
    const p=spAll()[STAFF[i].id];
    if(p&&p.n)STAFF[i].n=p.n;
    if(p&&p.role2)STAFF[i].role=p.role2;
  }
}
function spArchive(id){
  const arch=spLoad(SP_ARCH_KEY,[]);if(!arch.includes(id))arch.push(id);
  spSave(SP_ARCH_KEY,arch);
  const i=STAFF.findIndex(s=>s.id===id);if(i>-1)STAFF.splice(i,1);
  saveStaff();
}
/* compress an image file → dataURL (photo + document uploads) */
function spReadImage(file,maxPx,cb){
  const rd=new FileReader();
  rd.onload=()=>{const im=new Image();im.onload=()=>{
    const sc=Math.min(1,maxPx/Math.max(im.width,im.height));
    const cv=document.createElement('canvas');cv.width=Math.round(im.width*sc);cv.height=Math.round(im.height*sc);
    cv.getContext('2d').drawImage(im,0,0,cv.width,cv.height);
    cb(cv.toDataURL('image/jpeg',0.72));
  };im.src=rd.result;};
  rd.readAsDataURL(file);
}
function spAvatar(s,size){
  const p=spOf(s.id);
  return p.photo
    ?`<img src="${p.photo}" alt="" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;border:1px solid ${s.color};flex-shrink:0"/>`
    :`<span style="width:${size}px;height:${size}px;border-radius:50%;background:var(--surface3);border:1px solid ${s.color};display:flex;align-items:center;justify-content:center;font-family:'Bodoni Moda',serif;color:${s.color};font-size:${Math.round(size*0.42)}px;flex-shrink:0">${s.n.charAt(0)}</span>`;
}
const START_HOUR=10, SLOTS=20, ROW_H=44; /* 10:00 → 20:00, 30-min slots */
function slotLabel(i){const t=START_HOUR*60+i*30;let h=Math.floor(t/60),m=t%60;const ap=h>=12?'م':'ص';let h12=h>12?h-12:h;return `${h12}:${m===0?'00':'30'} ${ap}`;}
/* appts: {staff, start(slot index), dur(slots), client, service, st} */
const APPTS=[
  {staff:'amal',start:0,dur:2,client:'نوف العتيبي',service:'مكياج سهرة',st:'confirmed'},
  {staff:'amal',start:4,dur:4,client:'دانة السالم',service:'مكياج عروس',st:'confirmed'},
  {staff:'amal',start:10,dur:2,client:'ريم القحطاني',service:'مكياج ناعم',st:'pending'},
  {staff:'sara',start:1,dur:3,client:'لمياء الحربي',service:'صبغة + قص',st:'confirmed'},
  {staff:'sara',start:6,dur:2,client:'هند الشمري',service:'تسريحة',st:'confirmed'},
  {staff:'sara',start:12,dur:4,client:'وعد الزهراني',service:'كيراتين',st:'confirmed'},
  {staff:'nora',start:0,dur:3,client:'سارة الأحمدي',service:'هيدرافيشل',st:'confirmed'},
  {staff:'nora',start:5,dur:2,client:'منيرة الدوسري',service:'تنظيف بشرة',st:'pending'},
  {staff:'nora',start:9,dur:2,client:'أمل السبيعي',service:'تقشير',st:'confirmed'},
  {staff:'reem',start:2,dur:2,client:'جواهر الشهري',service:'منيكير جل',st:'confirmed'},
  {staff:'reem',start:5,dur:3,client:'لطيفة المطيري',service:'منيكير + بديكير',st:'confirmed'},
  {staff:'reem',start:11,dur:2,client:'عبير الغامدي',service:'تركيب أظافر',st:'walkin'},
];
const ST_STYLE={confirmed:{bg:'rgba(111,168,106,0.16)',bd:'#6fa86a',lb:'مؤكد'},pending:{bg:'rgba(205,172,80,0.16)',bd:'#ccab64',lb:'بانتظار الدفع'},walkin:{bg:'rgba(125,155,192,0.16)',bd:'#7d9bc0',lb:'حضور مباشر'}};

const SCREENS={};

SCREENS.overview=()=>{
  const onDuty=STAFF.length;
  const todayCount=APPTS.length;
  const revenue='6,840';
  /* 7-day upcoming: confirmed + cancelled */
  const WEEK=[['الثلاثاء',9,0],['الأربعاء',9,1],['الخميس',12,0],['الجمعة',9,0],['السبت',1,0],['الأحد',3,0],['الإثنين',1,0]];
  const SALES=[['16',9],['17',11.5],['18',14],['19',10.4],['20',16],['21',12.6],['22',6.8]];
  const APVAL=[['16',5.4],['17',6.8],['18',5.1],['19',9.2],['20',11.4],['21',9.1],['22',4.2]];
  function apptBars(){
    const W=540,H=230,pad={t:18,r:8,b:34,l:30},iw=W-pad.l-pad.r,ih=H-pad.t-pad.b,max=12,step=iw/WEEK.length,bw=Math.min(30,step*0.42);
    let grid='';for(let g=0;g<=4;g++){const y=pad.t+ih-(g/4)*ih;grid+=`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="#26242d" stroke-width="1"/><text x="${pad.l-6}" y="${y+4}" fill="#58545f" font-size="9.5" font-family="IBM Plex Mono" text-anchor="end">${((g/4)*max).toFixed(0)}</text>`;}
    let bars=WEEK.map((d,i)=>{const x=pad.l+i*step+(step-bw)/2;const hc=(d[1]/max)*ih,hx=(d[2]/max)*ih;const yC=pad.t+ih-hc,yX=yC-hx;return `<g><rect x="${x}" y="${yC}" width="${bw}" height="${hc}" rx="3" fill="url(#abg)"/>${d[2]?`<rect x="${x}" y="${yX}" width="${bw}" height="${hx}" rx="3" fill="#c2705f"/>`:''}<text x="${x+bw/2}" y="${H-14}" fill="#86818d" font-size="9.5" font-family="IBM Plex Sans Arabic" text-anchor="middle">${d[0]}</text></g>`;}).join('');
    return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible"><defs><linearGradient id="abg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#dbbd81"/><stop offset="1" stop-color="#9c8047"/></linearGradient></defs>${grid}${bars}</svg>`;

/* ══════════ HR — الموارد البشرية (إجازات برصيد وتعارضات · دوام وحضور · رواتب متعددة المصادر) ══════════ */
const HR_LEAVE_KEY='luma_hr_leaves', HR_PAY_KEY='luma_hr_pay2', HR_SHIFT_KEY='luma_hr_shifts',
      HR_ATT_KEY='luma_hr_att', HR_ADV_KEY='luma_hr_advances', HR_CLOSE_KEY='luma_hr_closed';
const HR_DAYS=['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const HR_QUOTA=21; /* الرصيد السنوي للإجازات */
const hrLoad=(k,f)=>{try{return JSON.parse(localStorage.getItem(k))??f}catch(e){return f}};
const hrSave=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}};
const hrMonth=()=>new Date().toISOString().slice(0,7);

let HR_LEAVES=hrLoad(HR_LEAVE_KEY,null);
if(!HR_LEAVES){
  HR_LEAVES=[
    {id:1,staff:'sara',from:'2026-07-14',to:'2026-07-16',type:'سنوية',reason:'سفر عائلي',status:'pending'},
    {id:2,staff:'reem',from:'2026-07-10',to:'2026-07-10',type:'طارئة',reason:'',status:'pending'},
    {id:3,staff:'nora',from:'2026-06-22',to:'2026-06-24',type:'مرضية',reason:'',status:'approved'},
  ];
  hrSave(HR_LEAVE_KEY,HR_LEAVES);
}
/* حضور تجريبي: تأخيرات وغياب هذا الأسبوع */
let HR_ATT=hrLoad(HR_ATT_KEY,null);
if(!HR_ATT){HR_ATT={sara:{1:{late:45}},reem:{3:{late:20}},nora:{2:{absent:true}}};hrSave(HR_ATT_KEY,HR_ATT);}
/* مبيعات منتجات وبقشيش تجريبية لكل موظفة (شهرياً) */
const HR_PROD={amal:5200,sara:3400,nora:6100,reem:2800};
const HR_TIPS={amal:640,sara:380,nora:520,reem:290};

const hrPay=()=>hrLoad(HR_PAY_KEY,{});
const hrPayOf=sid=>({base:3500,pct:10,prodPct:15,tierAt:15000,tierPct:12,...(hrPay()[sid]||{})});
const hrAdvances=()=>hrLoad(HR_ADV_KEY,{});
const hrAdvOf=sid=>((hrAdvances()[hrMonth()]||{})[sid])||0;
const hrClosed=()=>!!(hrLoad(HR_CLOSE_KEY,{})[hrMonth()]);
const hrShifts=()=>hrLoad(HR_SHIFT_KEY,{});
const hrShiftOf=(sid,d)=>{const s=(hrShifts()[sid]||{})[d];return s||((d===5)?{off:true}:{off:false,start:'10:00',end:'20:00'});};
const hrStaffName=id=>{const s=STAFF.find(x=>x.id===id);return s?s.n:id;};
const hrAttOf=(sid,d)=>((HR_ATT[sid]||{})[d])||null;
function hrOnLeaveToday(sid){
  const t=new Date().toISOString().slice(0,10);
  return HR_LEAVES.some(l=>l.staff===sid&&l.status==='approved'&&l.from<=t&&l.to>=t);
}
/* رصيد الإجازات: الحصة السنوية − أيام السنوية المعتمدة هذه السنة */
function hrBalance(sid){
  const yr=new Date().getFullYear();
  const used=HR_LEAVES.filter(l=>l.staff===sid&&l.status==='approved'&&l.type==='سنوية'&&l.from.startsWith(yr))
    .reduce((t,l)=>t+((new Date(l.to)-new Date(l.from))/86400000+1),0);
  return Math.max(0,HR_QUOTA-used);
}
/* حجوزات متعارضة مع فترة الإجازة (نموذج اليوم الواحد في اللوحة) */
function hrConflicts(l){
  const t=new Date().toISOString().slice(0,10);
  if(l.from>t||l.to<t)return [];
  return APPTS.filter(a=>a.staff===l.staff&&a.st!=='cancelled');
}
/* الرواتب متعددة المصادر: خدمات (بشرائح) + منتجات + بقشيش − سلف */
function hrLedger(sid){
  const p=hrPayOf(sid);
  const svc=APPTS.filter(a=>a.staff===sid&&a.st!=='cancelled').length*380*24;
  const rate=svc>=p.tierAt?p.tierPct:p.pct;
  const svcComm=Math.round(svc*rate/100);
  const prod=HR_PROD[sid]||0, prodComm=Math.round(prod*p.prodPct/100);
  const tips=HR_TIPS[sid]||0, adv=hrAdvOf(sid);
  const att=HR_ATT[sid]||{};
  const late=Object.values(att).reduce((t,d)=>t+(d.late||0),0);
  const abs=Object.values(att).filter(d=>d.absent).length;
  return {p,svc,rate,svcComm,prod,prodComm,tips,adv,late,abs,
          net:p.base+svcComm+prodComm+tips-adv};
}

const HR={
  tab:'staff',
  go(t){this.tab=t;SALON.go('hr');},
  review(id,ok){
    const l=HR_LEAVES.find(x=>x.id===id);if(!l)return;
    if(ok&&l.type==='سنوية'){
      const days=(new Date(l.to)-new Date(l.from))/86400000+1;
      if(days>hrBalance(l.staff)){LUX.toast('رصيد '+hrStaffName(l.staff)+' لا يكفي ('+hrBalance(l.staff)+' يوماً متبقياً)','err');return;}
    }
    l.status=ok?'approved':'rejected';
    hrSave(HR_LEAVE_KEY,HR_LEAVES);
    if(ok){
      const cf=hrConflicts(l);
      if(cf.length){this.conflictModal(l,cf);return;}
      LUX.toast('تم الاعتماد — حُدّث جدول الدوام وحُظرت مواعيد الحجز تلقائياً ✓','ok');

  conflictModal(l,cf){
    const rows=cf.map(a=>`<div class="lux-row"><span class="k" dir="ltr">${slotLabel(a.start)}</span><span class="v">${a.client} · ${a.service}</span></div>`).join('');
    LUX.modal('هناك حجوزات نشطة خلال هذه الفترة',`
      <div class="lux-lead">لدى <b style="color:var(--gold-light)">${hrStaffName(l.staff)}</b> ${cf.length} حجزاً مؤكداً يتقاطع مع إجازتها المعتمدة — اختاري طريقة المعالجة:</div>
      ${rows}
      <button class="lux-btn lux-gold" data-dist style="width:100%;margin-top:16px">توزيع الحجوزات تلقائياً على زميلات متاحات</button>
      <button class="lux-btn lux-ghost" data-notify style="width:100%;margin-top:8px">إرسال إشعار اعتذار وإعادة جدولة للعملاء</button>`,{onMount(ov,close){
      ov.querySelector('[data-dist]').onclick=()=>{
        let moved=0,stuck=0;
        cf.forEach(a=>{
          const target=STAFF.find(s=>s.id!==l.staff&&!hrOnLeaveToday(s.id)&&spOf(s.id).status==='active'&&
            !APPTS.some(b=>b.staff===s.id&&b.st!=='cancelled'&&b.start<a.start+a.dur&&a.start<b.start+b.dur));
          if(target){a.staff=target.id;moved++;}else{a.st='cancelled';stuck++;}
        });
        close();SALON.go('hr');
        LUX.toast('وُزّع '+moved+' حجزاً تلقائياً'+(stuck?' — '+stuck+' بحاجة لإعادة جدولة':'')+' ✓','ok');
      };
      ov.querySelector('[data-notify]').onclick=()=>{
        cf.forEach(a=>a.st='cancelled');close();SALON.go('hr');
        LUX.toast('أُرسل إشعار الاعتذار وإعادة الجدولة لـ '+cf.length+' عميلة ✓','ok');
      };
    }});
  },
  newLeave(){
    const body=`
      <div class="lux-lead">قدّمي طلب إجازة — يظهر بحالة «قيد المراجعة» حتى يُعتمد.</div>
      <div class="lux-f"><label>الموظفة</label><select name="staff">${STAFF.map(s=>`<option value="${s.id}">${s.n} (رصيد: ${hrBalance(s.id)} يوماً)</option>`).join('')}</select></div>
      <div class="lux-two">
        <div class="lux-f"><label>من</label><input type="date" name="from"/></div>
        <div class="lux-f"><label>إلى</label><input type="date" name="to"/></div>
      </div>
      <div class="lux-f"><label>النوع</label><select name="type"><option>سنوية</option><option>مرضية</option><option>طارئة</option><option>بدون راتب</option></select></div>
      <div class="lux-f"><label>السبب (اختياري)</label><input name="reason" placeholder="…"/></div>
      <div class="lux-foot"><button class="lux-btn lux-ghost" data-c style="flex:1">إلغاء</button><button class="lux-btn lux-gold" data-ok style="flex:1.4">إرسال الطلب</button></div>`;
    LUX.modal('طلب إجازة جديد',body,{onMount(ov,close){
      ov.querySelector('[data-c]').onclick=close;
      ov.querySelector('[data-ok]').onclick=()=>{
        const g=n=>ov.querySelector('[name='+n+']');
        if(!g('from').value||!g('to').value){LUX.toast('حدّدي التاريخين','err');return;}
        if(g('to').value<g('from').value){LUX.toast('تاريخ النهاية قبل البداية','err');return;}
        const clash=HR_LEAVES.some(l=>l.staff===g('staff').value&&['pending','approved'].includes(l.status)&&l.from<=g('to').value&&l.to>=g('from').value);
        if(clash){LUX.toast('يوجد طلب إجازة آخر يتقاطع مع هذه الفترة','err');return;}
        HR_LEAVES.unshift({id:Date.now(),staff:g('staff').value,from:g('from').value,to:g('to').value,type:g('type').value,reason:g('reason').value.trim(),status:'pending'});
        hrSave(HR_LEAVE_KEY,HR_LEAVES);close();SALON.go('hr');LUX.toast('أُرسل الطلب ✓','ok');

  editShift(sid){
    const rows=HR_DAYS.map((d,i)=>{const sh=hrShiftOf(sid,i);return `
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line-soft)">

        <input type="time" data-s="${i}" value="${sh.start||'10:00'}" ${sh.off?'disabled':''} style="background:#0e0d11;border:1px solid var(--line);border-radius:6px;color:var(--white);padding:6px 8px;font-size:12px"/>
        <span style="color:var(--muted)">←</span>
        <input type="time" data-e="${i}" value="${sh.end||'20:00'}" ${sh.off?'disabled':''} style="background:#0e0d11;border:1px solid var(--line);border-radius:6px;color:var(--white);padding:6px 8px;font-size:12px"/>

    LUX.modal('دوام '+hrStaffName(sid),`<div class="lux-lead">هذه الساعات هي مصدر الحقيقة لمواعيد الحجز المتاحة في صفحة العملاء.</div>`+rows+`<button class="lux-btn lux-gold" data-ok style="margin-top:16px;width:100%">حفظ الجدول</button>`,{onMount(ov,close){
      ov.querySelectorAll('[data-off]').forEach(cb=>cb.onchange=()=>{const i=cb.dataset.off;ov.querySelector(`[data-s="${i}"]`).disabled=cb.checked;ov.querySelector(`[data-e="${i}"]`).disabled=cb.checked;});
      ov.querySelector('[data-ok]').onclick=()=>{

    }});
  },
  editPay(sid){

    const p=hrPayOf(sid);
    LUX.modal('راتب وعمولات '+hrStaffName(sid),`
      <div class="lux-f"><label>الراتب الأساسي (ر.س/شهر)</label><input name="base" dir="ltr" style="text-align:right" value="${p.base}"/></div>
      <div class="lux-two">
        <div class="lux-f"><label>عمولة الخدمات (٪)</label><input name="pct" dir="ltr" style="text-align:right" value="${p.pct}"/></div>
        <div class="lux-f"><label>عمولة المنتجات (٪)</label><input name="prodPct" dir="ltr" style="text-align:right" value="${p.prodPct}"/></div>
      </div>
      <div class="lux-lead" style="margin:4px 0 8px">الشريحة التحفيزية: إذا تجاوزت مبيعات الخدمات الحد، ترتفع النسبة تلقائياً.</div>
      <div class="lux-two">

        <div class="lux-f"><label>نسبة الشريحة (٪)</label><input name="tierPct" dir="ltr" style="text-align:right" value="${p.tierPct}"/></div>
      </div>
      <button class="lux-btn lux-gold" data-ok style="width:100%;margin-top:6px">حفظ</button>`,{onMount(ov,close){
      ov.querySelector('[data-ok]').onclick=()=>{

        const all=hrPay();all[sid]={base:num('base',99999),pct:num('pct',100),prodPct:num('prodPct',100),tierAt:num('tierAt',999999),tierPct:num('tierPct',100)};
        hrSave(HR_PAY_KEY,all);close();SALON.go('hr');LUX.toast('تم تحديث الراتب ✓','ok');
      };
    }});
  },
  addAdvance(sid){
    if(hrClosed()){LUX.toast('الشهر مُصفّى — لا يمكن إضافة سلف','err');return;}
    LUX.modal('سلفة — '+hrStaffName(sid),`
      <div class="lux-f"><label>مبلغ السلفة (ر.س) — يُخصم من صافي هذا الشهر</label><input name="amt" dir="ltr" style="text-align:right" placeholder="0"/></div>
      <button class="lux-btn lux-gold" data-ok style="width:100%">تسجيل السلفة</button>`,{onMount(ov,close){
      ov.querySelector('[data-ok]').onclick=()=>{
        const v=parseFloat(ov.querySelector('[name=amt]').value)||0;
        if(v<=0){LUX.toast('أدخلي مبلغاً صحيحاً','err');return;}
        const all=hrAdvances();const m=hrMonth();all[m]=all[m]||{};all[m][sid]=(all[m][sid]||0)+v;
        hrSave(HR_ADV_KEY,all);close();SALON.go('hr');LUX.toast('سُجّلت السلفة وخُصمت من الصافي ✓','ok');
      };
    }});
  },
  closeMonth(){
    if(hrClosed())return;
    const total=STAFF.reduce((t,s)=>t+hrLedger(s.id).net,0);
    LUX.confirm('تصفية واعتماد رواتب شهر '+hrMonth()+' بإجمالي '+total.toLocaleString('en')+' ر.س؟ بعد الاعتماد تُجمَّد الأرقام وتُصدر قسائم الرواتب.',()=>{
      const all=hrLoad(HR_CLOSE_KEY,{});
      all[hrMonth()]={total,at:new Date().toISOString(),slips:STAFF.map(s=>({staff:s.n,...hrLedger(s.id)}))};
      hrSave(HR_CLOSE_KEY,all);SALON.go('hr');
      LUX.toast('تمت التصفية ✓ صدرت '+STAFF.length+' قسائم راتب وحُدّث النظام المحاسبي','ok');
    });
  },
};

SCREENS.hr=()=>{

  </div>`;

      <div class="card" style="display:flex;align-items:center;gap:14px;margin-bottom:10px;flex-wrap:wrap">
        <span style="width:42px;height:42px;border-radius:50%;background:var(--surface3);border:1px solid var(--gold-deep);display:flex;align-items:center;justify-content:center;color:var(--gold-light)">${hrStaffName(l.staff).charAt(0)}</span>
        <div style="flex:1;min-width:200px">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">

            <span class="badge soft" style="font-size:10.5px">الرصيد المتبقي: ${hrBalance(l.staff)} يوماً</span>
          </div>
          <div style="font-size:12px;color:var(--muted);margin-top:3px">${l.type} · <span dir="ltr">${l.from}</span> ← <span dir="ltr">${l.to}</span>${l.reason?` · «${l.reason}»`:''}</div>
        </div>
        ${l.status==='pending'
          ?`<button class="btn btn-gold" style="padding:8px 18px" onclick="HR.review(${l.id},true)">اعتماد</button>
             <button class="btn btn-ghost" style="padding:8px 18px;border-color:#7c4a55;color:#e29aa6" onclick="HR.review(${l.id},false)">رفض</button>`
          :`<span class="badge ${ST[l.status][1]}">${ST[l.status][0]}</span>`}
      </div>`).join('');
    return head+(rows||'<div class="card" style="text-align:center;color:var(--muted)">لا توجد طلبات إجازة.</div>');

            ${HR_DAYS.map((_,i)=>{const sh=hrShiftOf(s.id,i);const att=hrAttOf(s.id,i);
              return `<td style="padding:8px;text-align:center;${att?'background:rgba(192,86,106,0.10)':''}">${sh.off?'<span style="color:var(--muted-deep);font-size:11.5px">إجازة</span>':`<span dir="ltr" style="background:var(--surface3);border-radius:6px;padding:3px 7px;font-size:11px;color:var(--gold-pale)">${sh.start}–${sh.end}</span>`}${att?`<div style="font-size:10px;color:#e29aa6;margin-top:4px">${att.absent?'غياب':'تأخير '+att.late+' دقيقة'}</div>`:''}</td>`;}).join('')}
            <td style="padding:8px"><button class="btn btn-ghost" style="padding:6px 14px;font-size:12px" onclick="HR.editShift('${s.id}')">تعديل</button></td>

      <td style="padding:8px">${closed?'<span style="font-size:10.5px;color:var(--muted)">قسيمة ✓</span>':`<button class="btn btn-ghost" style="padding:6px 12px;font-size:11px" onclick="HR.editPay('${s.id}')">تعديل</button>`}</td>
    </tr>`;}).join('');
  const totalAll=STAFF.reduce((t,s)=>t+hrLedger(s.id).net,0);
  return head+`
  <div class="card" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:12px">
    <div><span style="font-size:13px;color:var(--gold-pale)">إجمالي رواتب شهر ${hrMonth()} — سجل نهائي متعدد المصادر (خدمات + منتجات + بقشيش − سلف)</span>

  <div class="card" style="overflow-x:auto;padding:0">

      <thead><tr style="background:var(--surface2);color:var(--gold)">

SCREENS.clients=()=>{

      <div class="lux-f"><label>محل الإقامة <span style="color:#c0566a">*</span></label>
        <div style="display:flex;gap:18px;padding:6px 2px">
          <label style="display:flex;align-items:center;gap:7px;font-size:13.5px;color:var(--cream,#ece6da);cursor:pointer"><input type="radio" name="res" value="داخل السعودية" ${p.res!=='خارج السعودية'?'checked':''}/> داخل السعودية</label>
          <label style="display:flex;align-items:center;gap:7px;font-size:13.5px;color:var(--cream,#ece6da);cursor:pointer"><input type="radio" name="res" value="خارج السعودية" ${p.res==='خارج السعودية'?'checked':''}/> خارج السعودية</label>
        </div></div>
      <div class="lux-f"><label>الهوية الوطنية أو الإقامة أو رقم الحدود <span style="color:#c0566a">*</span></label><input name="nid" dir="ltr" style="text-align:right" value="${g(p.nid)}" placeholder="أدخل 9 أرقام على الأقل"/></div>
      ${sect('البيانات الوظيفية')}
      <div class="lux-two">
        <div class="lux-f"><label>نوع الوظيفة <span style="color:#c0566a">*</span></label><select name="shift"><option ${s&&s.shift==='دوام كامل'?'selected':''}>دوام كامل</option><option ${s&&s.shift==='دوام جزئي'?'selected':''}>دوام جزئي</option></select></div>
        <div class="lux-f"><label>المسمى الوظيفي / التخصص <span style="color:#c0566a">*</span></label><select name="role">${roles.map(r=>`<option ${s&&s.role===r?'selected':''}>${r}</option>`).join('')}</select></div>
      </div>
      <div class="lux-two">
        <div class="lux-f"><label>تاريخ الالتحاق</label><input type="date" name="hired" value="${g(p.hired)}"/></div>
        <div class="lux-f"><label>ملاحظات إدارية</label><input name="notes" value="${g(p.notes)}" placeholder="شهادات، مهارات…"/></div>
      </div>
      <div class="lux-foot"><button class="lux-btn lux-ghost" data-c style="flex:1">إغلاق</button><button class="lux-btn lux-gold" data-ok style="flex:1.4">${editId?'حفظ التعديلات':'إضافة الموظف'}</button></div>`;
    LUX.modal(editId?'تعديل ملف '+s.n:'إضافة ملف موظف',body,{onMount(ov,close){
      let photo=p.photo||null;
      ov.querySelector('#spPhotoFile').onchange=e=>{
        const f=e.target.files&&e.target.files[0];if(!f)return;
        spReadImage(f,400,url=>{photo=url;ov.querySelector('#spPhotoPrev').innerHTML=`<img src="${url}" style="width:58px;height:58px;border-radius:50%;object-fit:cover;border:1px solid var(--gold-light)"/>`;});
      };
      ov.querySelector('[data-c]').onclick=close;
      ov.querySelector('[data-ok]').onclick=()=>{
        const q=n=>ov.querySelector('[name='+n+']');
        const bad=el=>{el.style.borderColor='#c0566a';el.focus();};
        if(!q('name').value.trim())return bad(q('name'));
        if(!q('nameEn').value.trim())return bad(q('nameEn'));
        if(!q('nat').value)return bad(q('nat'));
        const nid=q('nid').value.replace(/\s/g,'');
        if(!/^\d{9,}$/.test(nid)){bad(q('nid'));LUX.toast('الهوية/الإقامة: 9 أرقام على الأقل','err');return;}
        const ph=q('phone').value.trim();
        if(ph&&!/^0?5\d{8}$/.test(ph.replace(/[\s-]/g,''))){bad(q('phone'));LUX.toast('رقم الجوال غير صحيح — مثال: 0551234567','err');return;}
        const prof={photo,nameEn:q('nameEn').value.trim(),empId:q('empId').value.trim(),nat:q('nat').value,
          res:ov.querySelector('[name=res]:checked').value,phone:ph,email:q('email').value.trim(),
          nid,hired:q('hired').value,notes:q('notes').value.trim()};
        if(editId){
          s.n=q('name').value.trim();s.role=q('role').value;s.shift=q('shift').value;
          if(s.custom)saveStaff();else spSet(editId,{n:s.n,role2:s.role});
          spSet(editId,prof);
          close();SALON.go('staff');LUX.toast('تم حفظ التعديلات ✓','ok');
        }else{
          const color=STAFF_COLORS[STAFF.filter(x=>x.custom).length%STAFF_COLORS.length];
          const id='s'+Date.now();
          STAFF.push({id,n:q('name').value.trim(),role:q('role').value,shift:q('shift').value,color,custom:true});
          saveStaff();spSet(id,prof);
          close();SALON.go('staff');LUX.toast('أُنشئ ملف '+q('name').value.trim()+' — مُعرف الموظف '+prof.empId+' ✓','ok');
        }
      };
    }});
  },
  viewStaff(id){
    const s=STAFF.find(x=>x.id===id);if(!s)return;
    const p=spOf(id);
    const susp=p.status!=='active';
    const cnt=APPTS.filter(a=>a.staff===id).length;
    const L=hrLedger(id);
    const row=(k,v)=>v?`<div class="lux-row"><span class="k">${k}</span><span class="v">${v}</span></div>`:'';
    const docs=p.docs.map((d,i)=>`
      <div style="display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)">
        ${d.img?`<img src="${d.img}" style="width:44px;height:44px;border-radius:8px;object-fit:cover;border:1px solid var(--gold-deep,#7c6335);cursor:zoom-in" onclick="SALON.zoomDoc(${i},'${id}')"/>`:`<span style="width:44px;height:44px;border-radius:8px;background:#0e0d11;border:1px solid #26242d;display:flex;align-items:center;justify-content:center">📄</span>`}
        <div style="flex:1;min-width:0"><div style="font-size:13px;color:#f6f2ec;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.name}</div><div style="font-size:10.5px;color:#86818d">${d.date}</div></div>
        <button style="background:none;border:none;color:#c0566a;cursor:pointer;font-size:15px" title="حذف المستند" onclick="SALON.delDoc('${id}',${i})">🗑</button>
      </div>`).join('')||'<div style="color:#86818d;font-size:12.5px;padding:10px 0">لا مستندات بعد — ارفعي الهوية، العقد، أو الشهادات.</div>';
    LUX.modal('ملف '+s.n,`
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
        ${spAvatar(s,64)}
        <div style="flex:1"><div style="font-size:17px;color:#f6f2ec;font-weight:700">${s.n} ${susp?'<span style="font-size:11px;color:#e29aa6">· موقوفة</span>':'<span style="font-size:11px;color:#9fce99">· نشطة</span>'}</div>
        <div style="font-size:12.5px;color:#e6ce95">${s.role} · ${s.shift||'دوام كامل'}</div></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;text-align:center">
        <div style="background:#0e0d11;border-radius:9px;padding:9px"><div style="color:#ccab64;font-size:16px;font-weight:700">${cnt}</div><div style="font-size:10px;color:#86818d">مواعيد اليوم</div></div>
        <div style="background:#0e0d11;border-radius:9px;padding:9px"><div style="color:#ccab64;font-size:16px;font-weight:700">${L.net.toLocaleString('en')}</div><div style="font-size:10px;color:#86818d">صافي الشهر (ر.س)</div></div>
        <div style="background:#0e0d11;border-radius:9px;padding:9px"><div style="color:${L.late||L.abs?'#e29aa6':'#9fce99'};font-size:16px;font-weight:700">${L.late||L.abs?L.late+' د':'✓'}</div><div style="font-size:10px;color:#86818d">${L.abs?L.abs+' غياب':'الانضباط'}</div></div>
      </div>
      <div style="font-size:12px;color:#9c8047;font-weight:700;margin:6px 0 2px">بيانات الموظف</div>
      ${row('الاسم (إنجليزي)',p.nameEn?`<bdo dir="ltr">${p.nameEn}</bdo>`:'')}
      ${row('مُعرف الموظف',p.empId?`<bdo dir="ltr">${p.empId}</bdo>`:'')}
      ${row('الجنسية',p.nat)}
      ${row('رقم الهاتف',p.phone?`<bdo dir="ltr">${p.phone}</bdo>`:'')}
      ${row('البريد الإلكتروني',p.email?`<bdo dir="ltr">${p.email}</bdo>`:'')}
      ${row('محل الإقامة',p.res)}
      ${row('الهوية / الإقامة / رقم الحدود',p.nid?`<bdo dir="ltr">${p.nid}</bdo>`:'')}
      <div style="font-size:12px;color:#9c8047;font-weight:700;margin:12px 0 2px">البيانات الوظيفية</div>
      ${row('نوع الوظيفة',s.shift||'دوام كامل')}
      ${row('المسمى الوظيفي',s.role)}
      ${row('تاريخ الالتحاق',p.hired?`<bdo dir="ltr">${p.hired}</bdo>`:'')}
      ${row('رصيد الإجازات',hrBalance(id)+' يوماً')}
      ${row('ملاحظات',p.notes)}
      <div style="font-size:12px;color:#9c8047;font-weight:700;margin:14px 0 4px">المستندات (هوية، عقد، شهادات…)</div>
      ${docs}
      <input type="file" id="spDocFile" accept="image/*,.pdf" style="display:none"/>
      <button class="lux-btn lux-ghost" style="width:100%;margin-top:10px" onclick="document.getElementById('spDocFile').click()">📎 رفع مستند جديد</button>
      <div class="lux-foot" style="margin-top:12px">
        <button class="lux-btn lux-ghost" data-edit style="flex:1">تعديل البيانات</button>
        <button class="lux-btn lux-ghost" data-tgl style="flex:1;${susp?'':'border-color:#7c6335;color:#e6ce95'}">${susp?'إعادة تفعيل':'إيقاف مؤقت'}</button>
        <button class="lux-btn" data-del style="flex:1;background:#b14a5c22;border:1px solid #b14a5c;color:#e29aa6">حذف الملف</button>
      </div>`,{onMount(ov,close){
      ov.querySelector('#spDocFile').onchange=e=>{
        const f=e.target.files&&e.target.files[0];if(!f)return;
        const add=img=>{
          const docs2=spOf(id).docs;docs2.push({name:f.name,img,date:new Date().toISOString().slice(0,10)});
          spSet(id,{docs:docs2});close();SALON.viewStaff(id);LUX.toast('رُفع المستند وحُفظ في ملف '+s.n+' ✓','ok');
        };
        if(f.type.startsWith('image/'))spReadImage(f,900,add);else add(null);
      };
      ov.querySelector('[data-edit]').onclick=()=>{close();SALON.addStaff(id);};
      ov.querySelector('[data-tgl]').onclick=()=>{
        spSet(id,{status:susp?'active':'suspended'});close();SALON.go('staff');
        LUX.toast(susp?'أُعيد تفعيل '+s.n+' ✓':'أُوقفت '+s.n+' مؤقتاً — لن تستقبل حجوزات جديدة','ok');
      };
      ov.querySelector('[data-del]').onclick=()=>{
        close();
        LUX.confirm('حذف ملف '+s.n+' نهائياً من الطاقم؟ ستُزال من لوحة الحجوزات وكل الشاشات.',()=>{
          spArchive(id);SALON.go('staff');LUX.toast('حُذف ملف '+s.n,'err');
        },true);
      };
    }});
  },
  zoomDoc(i,id){
    const d=spOf(id).docs[i];if(!d||!d.img)return;
    const z=document.createElement('div');
    z.style.cssText='position:fixed;inset:0;z-index:9300;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;padding:26px;cursor:zoom-out';
    z.innerHTML=`<img src="${d.img}" style="max-width:92vw;max-height:88vh;border-radius:12px"/>`;
    z.onclick=()=>z.remove();document.body.appendChild(z);
  },
  delDoc(id,i){
    const docs=spOf(id).docs;docs.splice(i,1);spSet(id,{docs});
    document.querySelectorAll('.lux-ov').forEach(o=>o.remove());
    SALON.viewStaff(id);LUX.toast('حُذف المستند','ok');
  },
  addClient(){
    const body=`
      <div class="lux-lead">أدخلي بيانات العميلة الجديدة — ستظهر مباشرة في قاعدة عملاء الصالون.</div>
      <div class="lux-f"><label>اسم العميلة</label><input name="name" placeholder="مثال: جوري السالم"/></div>
      <div class="lux-f"><label>رقم الجوال</label><input name="phone" dir="ltr" style="text-align:right" placeholder="05xxxxxxxx"/></div>
      <div class="lux-two">
        <div class="lux-f"><label>الموظفة المفضّلة</label><select name="staff"><option>بدون تفضيل</option>${STAFF.map(s=>`<option>${s.n}</option>`).join('')}</select></div>
        <div class="lux-f"><label>كيف عرفت الصالون؟</label><select name="src"><option>زيارة مباشرة</option><option>سوق لوما</option><option>توصية صديقة</option><option>إنستقرام</option><option>أخرى</option></select></div>
      </div>
      <div class="lux-f"><label>ملاحظات (اختياري)</label><textarea name="notes" rows="2" placeholder="حساسية، تفضيلات، مناسبة قادمة…"></textarea></div>
      <div class="lux-foot"><button class="lux-btn lux-ghost" data-c style="flex:1">إلغاء</button><button class="lux-btn lux-gold" data-ok style="flex:1.4">إضافة العميلة</button></div>`;
    LUX.modal('إضافة عميلة جديدة',body,{onMount(ov,close){
      ov.querySelector('[data-c]').onclick=close;
      ov.querySelector('[data-ok]').onclick=()=>{
        const name=ov.querySelector('[name=name]');
        if(!name.value.trim()){name.style.borderColor='#c0566a';name.focus();return;}
        const phone=ov.querySelector('[name=phone]').value.trim();
        if(phone&&!/^0?5\d{8}$/.test(phone.replace(/[\s-]/g,''))){const p=ov.querySelector('[name=phone]');p.style.borderColor='#c0566a';p.focus();LUX.toast('رقم الجوال غير صحيح — مثال: 0551234567','err');return;}
        const staff=ov.querySelector('[name=staff]').value;
        CLIENTS.unshift({n:name.value.trim(),v:0,sp:'0',last:'—',staff:staff==='بدون تفضيل'?'—':staff,
          tag:'جديدة',tc:'soft',phone,src:ov.querySelector('[name=src]').value,
          notes:ov.querySelector('[name=notes]').value.trim(),custom:true});
        saveClients();close();SALON.go('clients');
        LUX.toast('تمت إضافة '+name.value.trim()+' إلى قاعدة العملاء ✓','ok');
      };
    }});
  }
};
window.SALON=SALON;
const start=(location.hash||'').replace('#','')||'overview';SALON.go((NAV_FLAT[start]||start==='staff')?start:'overview');
</script>
<script src="luma-ui.js"></script>
<script src="luma-theme.js"></script>
</body>
</html>
