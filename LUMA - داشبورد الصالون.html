<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#131217; --surface:#18171d; --surface2:#1b1a21; --surface3:#201f26;
    --gold:#9c8047; --gold-light:#ccab64; --gold-bright:#dbbd81; --gold-pale:#e6ce95; --gold-deep:#846a38;
    --white:#f6f2ec; --cream:#ece6da; --muted:#86818d; --muted-deep:#58545f;
    --line:#26242d; --line-soft:#1e1d24;
    --green:#6fa86a; --green-bg:rgba(111,168,106,0.12); --red:#c2705f; --rose:#d98a93; --blue:#6f93b8;
    --sidebar-w:262px;
  }
  body{background:var(--bg);color:var(--white);font-family:'IBM Plex Sans Arabic','Cairo',sans-serif;font-weight:300;line-height:1.7;-webkit-font-smoothing:antialiased;}
  .serif{font-family:'Bodoni Moda',serif;} .mono{font-family:'IBM Plex Mono',monospace;letter-spacing:0.14em;direction:ltr;}
  .num{font-family:'Bodoni Moda',serif;font-weight:500;direction:ltr;}
  .gold-fill{background:linear-gradient(120deg,#dbbd81,#ccab64 35%,#9c8047);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  ::selection{background:var(--gold);color:#131217;} a{color:inherit;text-decoration:none;}
  ::-webkit-scrollbar{width:9px;height:9px;}::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:6px;border:2px solid var(--bg);}::-webkit-scrollbar-thumb:hover{background:var(--gold-deep);}
  .app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh;}

  .sidebar{background:linear-gradient(190deg,#1c160f,#120d08);border-left:1px solid var(--line);height:100vh;position:sticky;top:0;display:flex;flex-direction:column;}
  .sb-head{padding:24px;border-bottom:1px solid var(--line-soft);}
  .sb-head .brand{font-family:'Bodoni Moda',serif;font-weight:500;font-size:25px;letter-spacing:0.28em;color:var(--gold-light);direction:ltr;}
  .sb-head .salon{display:flex;align-items:center;gap:10px;margin-top:14px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:9px 11px;}
  .sb-head .salon .lg{width:34px;height:34px;border-radius:9px;background:linear-gradient(140deg,#201f26,#18171d);border:1px solid var(--gold-deep);display:flex;align-items:center;justify-content:center;color:var(--gold-light);font-family:'Bodoni Moda',serif;font-size:16px;}
  .sb-head .salon .nm b{font-size:13px;color:var(--white);font-weight:600;display:block;} .sb-head .salon .nm span{font-size:10.5px;color:var(--muted);}
  .sb-nav{flex:1;overflow-y:auto;padding:16px 14px;}
  .nav-item{display:flex;align-items:center;gap:13px;padding:12px 14px;border-radius:10px;cursor:pointer;color:var(--cream);font-size:14.5px;transition:background .2s,color .2s;position:relative;margin-bottom:2px;}
  .nav-item .ico{width:20px;height:20px;color:var(--muted);transition:color .2s;display:flex;}
  .nav-item .lbl{flex:1;} .nav-item .dot{width:6px;height:6px;border-radius:50%;background:var(--gold-light);opacity:0;}
  .nav-item:hover{background:var(--surface);color:var(--white);} .nav-item:hover .ico{color:var(--gold-pale);}
  .nav-item.active{background:linear-gradient(100deg,rgba(156,124,58,0.18),rgba(156,124,58,0.05));color:var(--gold-light);font-weight:500;}
  .nav-item.active .ico{color:var(--gold-light);} .nav-item.active .dot{opacity:1;}
  .nav-item.active::before{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--gold-light);border-radius:3px;}

  .main{min-width:0;display:flex;flex-direction:column;}
  .topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:18px;padding:16px 30px;background:rgba(23,18,13,0.85);backdrop-filter:blur(18px);border-bottom:1px solid var(--line);}
  .topbar .pg .crumb{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:0.14em;color:var(--gold);direction:ltr;}
  .topbar .pg h1{font-family:'IBM Plex Sans Arabic','Cairo',sans-serif;font-weight:600;font-size:20px;color:var(--white);}
  .topbar .right{margin-right:auto;display:flex;align-items:center;gap:12px;}
  .topbar .me{display:flex;align-items:center;gap:10px;} .topbar .me .av{width:40px;height:40px;border-radius:50%;background:linear-gradient(140deg,#201f26,#18171d);border:1px solid var(--gold-deep);display:flex;align-items:center;justify-content:center;color:var(--gold-light);font-family:'Bodoni Moda',serif;font-size:17px;}
  .topbar .me .nm b{font-size:13px;color:var(--white);font-weight:600;display:block;} .topbar .me .nm span{font-size:11px;color:var(--muted);}
  .screen{padding:30px;max-width:1560px;width:100%;}

  .sec-label{display:flex;align-items:center;gap:12px;font-size:12px;font-weight:600;color:var(--gold);margin-bottom:16px;}
  .sec-label .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent);}
  .sec-label .more{font-size:12px;font-weight:400;color:var(--muted);cursor:pointer;} .sec-label .more:hover{color:var(--gold-light);}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:20px;}
  .stat{position:relative;background:linear-gradient(160deg,var(--surface2),var(--surface));border:1px solid var(--line);border-radius:16px;padding:20px;overflow:hidden;transition:border-color .3s,transform .3s;}
  .stat:hover{border-color:var(--gold-deep);transform:translateY(-3px);}
  .stat .glow{position:absolute;top:-40%;left:-10%;width:55%;height:80%;background:radial-gradient(ellipse,rgba(156,124,58,0.14),transparent 70%);}
  .stat .top{display:flex;align-items:center;justify-content:space-between;position:relative;}
  .stat .top .ico{width:38px;height:38px;border-radius:10px;background:var(--surface3);border:0.5px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--gold-light);}
  .stat .top .delta{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:4px 9px;border-radius:20px;direction:ltr;color:var(--green);background:var(--green-bg);}
  .stat .val{font-family:'Bodoni Moda',serif;font-weight:500;font-size:38px;color:var(--white);direction:ltr;line-height:1;margin-top:16px;display:flex;align-items:baseline;gap:6px;}
  .stat .val .u{font-family:'IBM Plex Sans Arabic','Cairo',sans-serif;font-size:13px;color:var(--muted);} .stat .k{font-size:13px;color:var(--gold-pale);margin-top:7px;}
  .badge{font-size:11px;padding:4px 11px;border-radius:20px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
  .badge.gold{color:var(--gold-light);background:rgba(156,124,58,0.16);border:0.5px solid var(--gold-deep);}
  .badge.green{color:var(--green);background:var(--green-bg);} .badge.soft{color:var(--muted);background:var(--surface3);}
  .btn{font-family:'IBM Plex Sans Arabic','Cairo',sans-serif;font-weight:500;font-size:13.5px;padding:11px 20px;border-radius:9px;cursor:pointer;border:none;transition:all .25s;white-space:nowrap;display:inline-flex;align-items:center;gap:8px;}
  .btn-gold{background:linear-gradient(120deg,#dbbd81,#ccab64 45%,#9c8047);color:#131217;} .btn-gold:hover{filter:brightness(1.07);}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--cream);} .btn-ghost:hover{border-color:var(--gold-deep);color:var(--gold-light);}
  .empty-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 20px;gap:16px;}
  .empty-screen .ico{width:70px;height:70px;border-radius:50%;border:1px solid var(--gold-deep);display:flex;align-items:center;justify-content:center;color:var(--gold-light);}
  .empty-screen h3{font-weight:600;font-size:21px;color:var(--white);} .empty-screen p{font-size:14px;color:var(--muted);max-width:42ch;line-height:1.8;}
  .fade-in{animation:fade .5s ease both;}@keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  @media(prefers-reduced-motion:reduce){.fade-in{animation:none;}}
</style>

      <a href="login.html" title="تسجيل الخروج" style="display:flex;align-items:center;justify-content:center;gap:8px;color:var(--gold-pale);font-size:13px;border:1px solid var(--line);border-radius:10px;padding:10px;text-decoration:none" onmouseover="this.style.borderColor='var(--gold-deep)';this.style.color='var(--gold-light)'" onmouseout="this.style.borderColor='var(--line)';this.style.color='var(--gold-pale)'"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></svg> تسجيل الخروج</a>

<script>
const IC={
  grid:'<rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>',
  board:'<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 3v18M3 9h18"/>',
  staff:'<circle cx="9" cy="8" r="3.4"/><path d="M2.5 20a6.5 6.5 0 0113 0"/><path d="M16 5.2a3.4 3.4 0 010 6M21.5 20a6.5 6.5 0 00-4-6"/>',
  users:'<circle cx="9" cy="8" r="3.4"/><path d="M2.5 20a6.5 6.5 0 0113 0"/><path d="M16 5.2a3.4 3.4 0 010 6M21.5 20a6.5 6.5 0 00-4-6"/>',
  scissors:'<circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M8.5 8L20 18M8.5 16L20 6"/>',
  wallet:'<rect x="3" y="6" width="18" height="13" rx="2.5"/><path d="M3 10h18M16 14h2"/>',
  chart:'<path d="M4 20V4M4 20h16"/><rect x="7" y="12" width="3" height="5"/><rect x="12" y="8" width="3" height="9"/><rect x="17" y="5" width="3" height="12"/>',
  pin:'<path d="M12 21s-7-6-7-11a7 7 0 0114 0c0 5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/>',
  gear:'<circle cx="12" cy="12" r="3.2"/><path d="M12 2v3M12 19v3M5 5l2 2M17 17l2 2M2 12h3M19 12h3M5 19l2-2M17 7l2-2"/>',
  clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
  walk:'<circle cx="13" cy="4" r="2"/><path d="M9 21l2-7-3-2 1-4 4 2 2 3M11 14l-2 7M14 13l2 4"/>',
  star:'<path d="M12 3l2.6 5.6 6 .8-4.4 4.2 1.1 6L12 17.8 6.7 19.6l1.1-6L3.4 9.4l6-.8z"/>',
  chair:'<path d="M6 19v-7a3 3 0 013-3h6a3 3 0 013 3v7M6 14h12M8 19v2M16 19v2"/>',
  bag:'<path d="M6 7h12l1 13a1 1 0 01-1 1H6a1 1 0 01-1-1z"/><path d="M9 7a3 3 0 016 0"/>',
  ticket:'<path d="M3 9a2 2 0 012-2h14a2 2 0 012 2 2 2 0 000 4 2 2 0 01-2 2H5a2 2 0 01-2-2 2 2 0 000-4z"/><path d="M14 7v10" stroke-dasharray="1 2"/>',
  invoice:'<path d="M6 2h9l4 4v15l-2.2-1.4L14.6 21l-2.6-1.5L9.4 21 7.2 19.6 5 21V4a2 2 0 012-2z"/><path d="M9 8h6M9 12h6M9 16h3"/>',
  mega:'<path d="M3 11v3a1 1 0 001 1h2l8 4V6L6 10H4a1 1 0 00-1 1z"/><path d="M16 9a3 3 0 010 6M18.5 6.5a6 6 0 010 11"/>',
  boxes:'<path d="M3 7l9-4 9 4v10l-9 4-9-4z"/><path d="M3 7l9 4 9-4M12 11v10"/>',
  plus:'<path d="M12 5v14M5 12h14"/>',
};
const icon=(n,s=20)=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${IC[n]||''}</svg>`;
window.icon=icon;

/* ── STAFF + APPOINTMENTS (booking board core) ── */
const STAFF=[
  {id:'amal',n:'أمل',role:'مكياج',color:'#ccab64'},
  {id:'sara',n:'سارة',role:'شعر',color:'#d98a93'},
  {id:'nora',n:'نورة',role:'بشرة',color:'#7d9bc0'},
  {id:'reem',n:'ريم',role:'أظافر',color:'#6fa86a'},
];
/* staff added from the UI persist across reloads */
const STAFF_KEY='luma_salon_staff';
try{(JSON.parse(localStorage.getItem(STAFF_KEY))||[]).forEach(s=>{if(s&&s.id&&!STAFF.some(x=>x.id===s.id))STAFF.push(s);});}catch(e){}
function saveStaff(){try{localStorage.setItem(STAFF_KEY,JSON.stringify(STAFF.filter(s=>s.custom)));}catch(e){}}
const STAFF_COLORS=['#c98ab6','#8ac9b8','#9b8ac9','#c97f6f','#6fb0c9','#b8c96f'];

/* ── staff profile overlay: photo, contact, documents, status — the full HR file ── */
const SP_KEY='luma_staff_profiles', SP_ARCH_KEY='luma_staff_archived';
const spLoad=(k,f)=>{try{return JSON.parse(localStorage.getItem(k))??f}catch(e){return f}};
const spSave=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}};
const spAll=()=>spLoad(SP_KEY,{});
const spOf=id=>({status:'active',docs:[],...(spAll()[id]||{})});
function spSet(id,patch){const all=spAll();all[id]={...spOf(id),...patch};spSave(SP_KEY,all);}
/* archived staff disappear everywhere; name/role overrides apply at load */
{
  const arch=spLoad(SP_ARCH_KEY,[]);
  for(let i=STAFF.length-1;i>=0;i--){
    if(arch.includes(STAFF[i].id)){STAFF.splice(i,1);continue;}
    const p=spAll()[STAFF[i].id];
    if(p&&p.n)STAFF[i].n=p.n;
    if(p&&p.role2)STAFF[i].role=p.role2;
  }
}
function spArchive(id){
  const arch=spLoad(SP_ARCH_KEY,[]);if(!arch.includes(id))arch.push(id);
  spSave(SP_ARCH_KEY,arch);
  const i=STAFF.findIndex(s=>s.id===id);if(i>-1)STAFF.splice(i,1);
  saveStaff();
}
/* compress an image file → dataURL (photo + document uploads) */
function spReadImage(file,maxPx,cb){
  const rd=new FileReader();
  rd.onload=()=>{const im=new Image();im.onload=()=>{
    const sc=Math.min(1,maxPx/Math.max(im.width,im.height));
    const cv=document.createElement('canvas');cv.width=Math.round(im.width*sc);cv.height=Math.round(im.height*sc);
    cv.getContext('2d').drawImage(im,0,0,cv.width,cv.height);
    cb(cv.toDataURL('image/jpeg',0.72));
  };im.src=rd.result;};
  rd.readAsDataURL(file);
}
function spAvatar(s,size){
  const p=spOf(s.id);
  return p.photo
    ?`<img src="${p.photo}" alt="" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;border:1px solid ${s.color};flex-shrink:0"/>`
    :`<span style="width:${size}px;height:${size}px;border-radius:50%;background:var(--surface3);border:1px solid ${s.color};display:flex;align-items:center;justify-content:center;font-family:'Bodoni Moda',serif;color:${s.color};font-size:${Math.round(size*0.42)}px;flex-shrink:0">${s.n.charAt(0)}</span>`;
}
const START_HOUR=10, SLOTS=20, ROW_H=44; /* 10:00 → 20:00, 30-min slots */
function slotLabel(i){const t=START_HOUR*60+i*30;let h=Math.floor(t/60),m=t%60;const ap=h>=12?'م':'ص';let h12=h>12?h-12:h;return `${h12}:${m===0?'00':'30'} ${ap}`;}
/* appts: {staff, start(slot index), dur(slots), client, service, st} */
const APPTS=[
  {staff:'amal',start:0,dur:2,client:'نوف العتيبي',service:'مكياج سهرة',st:'confirmed'},
  {staff:'amal',start:4,dur:4,client:'دانة السالم',service:'مكياج عروس',st:'confirmed'},
  {staff:'amal',start:10,dur:2,client:'ريم القحطاني',service:'مكياج ناعم',st:'pending'},
  {staff:'sara',start:1,dur:3,client:'لمياء الحربي',service:'صبغة + قص',st:'confirmed'},
  {staff:'sara',start:6,dur:2,client:'هند الشمري',service:'تسريحة',st:'confirmed'},
  {staff:'sara',start:12,dur:4,client:'وعد الزهراني',service:'كيراتين',st:'confirmed'},
  {staff:'nora',start:0,dur:3,client:'سارة الأحمدي',service:'هيدرافيشل',st:'confirmed'},
  {staff:'nora',start:5,dur:2,client:'منيرة الدوسري',service:'تنظيف بشرة',st:'pending'},
  {staff:'nora',start:9,dur:2,client:'أمل السبيعي',service:'تقشير',st:'confirmed'},
  {staff:'reem',start:2,dur:2,client:'جواهر الشهري',service:'منيكير جل',st:'confirmed'},
  {staff:'reem',start:5,dur:3,client:'لطيفة المطيري',service:'منيكير + بديكير',st:'confirmed'},
  {staff:'reem',start:11,dur:2,client:'عبير الغامدي',service:'تركيب أظافر',st:'walkin'},
];
/* bookings & blocked slots added from the UI persist across reloads */
const APPTS_KEY='luma_salon_appts';
try{(JSON.parse(localStorage.getItem(APPTS_KEY))||[]).forEach(a=>{if(a&&a.staff&&!APPTS.some(x=>x.id&&x.id===a.id))APPTS.push(a);});}catch(e){}
function saveAppts(){try{localStorage.setItem(APPTS_KEY,JSON.stringify(APPTS.filter(a=>a.custom)));}catch(e){}}
APPTS.forEach((a,i)=>{if(!a.id)a.id='s'+i;});
/* دفعات وفواتير الحجوزات */
const PAID_KEY='luma_paid', INV_SEQ_KEY='luma_inv_seq';
const paidAll=()=>{try{return JSON.parse(localStorage.getItem(PAID_KEY))||{}}catch(e){return{}}};
const paidOf=id=>paidAll()[id]||null;
function markPaid(id,rec){const all=paidAll();all[id]=rec;try{localStorage.setItem(PAID_KEY,JSON.stringify(all));}catch(e){}}
function nextInvNo(){let n=parseInt(localStorage.getItem(INV_SEQ_KEY))||1000;n++;try{localStorage.setItem(INV_SEQ_KEY,n);}catch(e){}return 'INV-'+n;}
const SVC_CATALOG=[['مكياج سهرة',2,350],['مكياج عروس',4,850],['مكياج ناعم',2,250],['صبغة + قص',3,550],['تسريحة',2,200],['كيراتين',4,700],['هيدرافيشل',3,480],['تنظيف بشرة',2,320],['تقشير',2,280],['منيكير جل',2,160],['منيكير + بديكير',3,240],['تركيب أظافر',3,220]];
const svcPrice=n=>{const x=SVC_CATALOG.find(s=>s[0]===n);return x?x[2]:350;};
const ST_STYLE={confirmed:{bg:'rgba(111,168,106,0.16)',bd:'#6fa86a',lb:'مؤكد'},pending:{bg:'rgba(205,172,80,0.16)',bd:'#ccab64',lb:'بانتظار الدفع'},walkin:{bg:'rgba(125,155,192,0.16)',bd:'#7d9bc0',lb:'حضور مباشر'},blocked:{bg:'rgba(134,129,141,0.16)',bd:'#86818d',lb:'وقت محجوب'}};

const SCREENS={};

SCREENS.overview=()=>{
  const onDuty=STAFF.length;
  const todayCount=APPTS.length;
  const revenue='6,840';
  /* 7-day upcoming: confirmed + cancelled */
  const WEEK=[['الثلاثاء',9,0],['الأربعاء',9,1],['الخميس',12,0],['الجمعة',9,0],['السبت',1,0],['الأحد',3,0],['الإثنين',1,0]];
  const SALES=[['16',9],['17',11.5],['18',14],['19',10.4],['20',16],['21',12.6],['22',6.8]];
  const APVAL=[['16',5.4],['17',6.8],['18',5.1],['19',9.2],['20',11.4],['21',9.1],['22',4.2]];
  function apptBars(){
    const W=540,H=230,pad={t:18,r:8,b:34,l:30},iw=W-pad.l-pad.r,ih=H-pad.t-pad.b,max=12,step=iw/WEEK.length,bw=Math.min(30,step*0.42);
    let grid='';for(let g=0;g<=4;g++){const y=pad.t+ih-(g/4)*ih;grid+=`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="#26242d" stroke-width="1"/><text x="${pad.l-6}" y="${y+4}" fill="#58545f" font-size="9.5" font-family="IBM Plex Mono" text-anchor="end">${((g/4)*max).toFixed(0)}</text>`;}
    let bars=WEEK.map((d,i)=>{const x=pad.l+i*step+(step-bw)/2;const hc=(d[1]/max)*ih,hx=(d[2]/max)*ih;const yC=pad.t+ih-hc,yX=yC-hx;return `<g><rect x="${x}" y="${yC}" width="${bw}" height="${hc}" rx="3" fill="url(#abg)"/>${d[2]?`<rect x="${x}" y="${yX}" width="${bw}" height="${hx}" rx="3" fill="#c2705f"/>`:''}<text x="${x+bw/2}" y="${H-14}" fill="#86818d" font-size="9.5" font-family="IBM Plex Sans Arabic" text-anchor="middle">${d[0]}</text></g>`;}).join('');
    return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible"><defs><linearGradient id="abg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#dbbd81"/><stop offset="1" stop-color="#9c8047"/></linearGradient></defs>${grid}${bars}</svg>`;
  }
  function salesLines(){
    const W=540,H=230,pad={t:18,r:10,b:30,l:38},iw=W-pad.l-pad.r,ih=H-pad.t-pad.b,max=28,step=iw/(SALES.length-1);
    const toPts=arr=>arr.map((d,i)=>[pad.l+i*step,pad.t+ih-(d[1]/max)*ih]);
    const p1=toPts(SALES),p2=toPts(APVAL);
    const path=p=>p.map((q,i)=>`${i?'L':'M'}${q[0].toFixed(1)} ${q[1].toFixed(1)}`).join(' ');
    let grid='';for(let g=0;g<=4;g++){const y=pad.t+ih-(g/4)*ih;grid+=`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="#26242d" stroke-width="1"/><text x="${pad.l-6}" y="${y+4}" fill="#58545f" font-size="9" font-family="IBM Plex Mono" text-anchor="end">${((g/4)*max).toFixed(0)}k</text>`;}
    const dots=(p,c)=>p.map(q=>`<circle cx="${q[0].toFixed(1)}" cy="${q[1].toFixed(1)}" r="2.6" fill="${c}"/>`).join('');
    const labels=SALES.map((d,i)=>`<text x="${(pad.l+i*step).toFixed(1)}" y="${H-12}" fill="#86818d" font-size="9.5" font-family="IBM Plex Sans Arabic" text-anchor="middle">${d[0]}</text>`).join('');
    return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible">${grid}<path d="${path(p2)}" fill="none" stroke="#6fa86a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="${path(p1)}" fill="none" stroke="#ccab64" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>${dots(p2,'#6fa86a')}${dots(p1,'#ccab64')}${labels}</svg>`;
  }
  const STATS=[
    {ic:'board',k:'حجوزات اليوم',v:todayCount,u:'',d:'+4'},
    {ic:'wallet',k:'دخل اليوم المتوقع',v:revenue,u:'ر.س',d:'+12%'},
    {ic:'staff',k:'موظفات على رأس العمل',v:onDuty,u:`/ ${STAFF.length}`,d:''},
    {ic:'chair',k:'إشغال الكراسي',v:'82',u:'%',d:'+6%'},
  ];
  const staffRows=STAFF.map(s=>{const cnt=APPTS.filter(a=>a.staff===s.id).length;return `<div style="display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--line-soft)"><span style="width:38px;height:38px;border-radius:50%;background:var(--surface3);border:1px solid ${s.color};display:flex;align-items:center;justify-content:center;font-family:'Bodoni Moda',serif;color:${s.color};font-size:16px">${s.n.charAt(0)}</span><div style="flex:1"><div style="font-size:14px;color:var(--white);font-weight:500">${s.n}</div><div style="font-size:12px;color:var(--muted)">${s.role}</div></div><span class="badge soft">${cnt} مواعيد</span><span class="badge green">متاحة</span></div>`;}).join('');
  const next=APPTS.slice().sort((a,b)=>a.start-b.start).slice(0,5).map(a=>{const s=STAFF.find(x=>x.id===a.staff);return `<div style="display:flex;align-items:center;gap:13px;padding:12px 0;border-bottom:1px solid var(--line-soft)"><div class="mono" style="font-size:12.5px;color:var(--gold-light);min-width:60px;text-align:center">${slotLabel(a.start)}</div><div style="width:1px;height:30px;background:var(--line)"></div><div style="flex:1"><div style="font-size:13.5px;color:var(--white);font-weight:500">${a.client}</div><div style="font-size:11.5px;color:var(--muted)">${a.service} · مع ${s.n}</div></div><span class="badge ${a.st==='pending'?'gold':'green'}">${ST_STYLE[a.st].lb}</span></div>`;}).join('');
  return `
  <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:14px">
    <div><div style="font-weight:600;font-size:25px;color:var(--white)">صباح الخير، صالون لمسة <span style="color:var(--gold-light)">✦</span></div>
    <div style="font-size:13.5px;color:var(--gold-pale);margin-top:2px"><b style="color:var(--white)">${todayCount} موعد</b> اليوم موزّعة على ${STAFF.length} موظفات.</div></div>
    <button class="btn btn-ghost" onclick="SALON.go('board')">${icon('board',16)} لوحة الحجوزات</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px">
    ${STATS.map(s=>`<div class="stat"><div class="glow"></div><div class="top"><div class="ico">${icon(s.ic,19)}</div>${s.d?`<div class="delta">▲ ${s.d}</div>`:''}</div><div class="val">${s.v}${s.u?`<span class="u">${s.u}</span>`:''}</div><div class="k">${s.k}</div></div>`).join('')}
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px;align-items:start">
    <div class="card">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px"><div><div style="font-weight:600;font-size:16px;color:var(--white)">المواعيد القادمة</div><div style="font-size:12px;color:var(--muted)">الأيام السبعة القادمة</div></div><div style="text-align:left"><div class="num" style="font-size:26px;color:var(--white)">45</div><div style="font-size:11px;color:var(--gold-pale)">محجوز</div></div></div>
      <div style="display:flex;gap:16px;margin:4px 0 8px;font-size:11.5px"><span style="color:var(--muted)">مؤكد <b style="color:var(--white)">44</b></span><span style="color:var(--muted)">ملغى <b style="color:var(--red)">1</b></span></div>
      ${apptBars()}
      <div style="display:flex;gap:18px;justify-content:flex-end;margin-top:4px;font-size:11px"><span style="display:flex;align-items:center;gap:6px;color:var(--cream)"><span style="width:10px;height:10px;border-radius:3px;background:#ccab64"></span>مؤكد</span><span style="display:flex;align-items:center;gap:6px;color:var(--cream)"><span style="width:10px;height:10px;border-radius:3px;background:#c2705f"></span>ملغى</span></div>
    </div>
    <div class="card">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px"><div><div style="font-weight:600;font-size:16px;color:var(--white)">المبيعات الأخيرة</div><div style="font-size:12px;color:var(--muted)">آخر ٧ أيام · بالألف ر.س</div></div><div style="text-align:left"><div class="num gold-fill" style="font-size:24px">128,025</div><div style="font-size:11px;color:var(--gold-pale)">إجمالي المبيعات (ر.س)</div></div></div>
      ${salesLines()}
      <div style="display:flex;gap:18px;justify-content:flex-end;margin-top:4px;font-size:11px"><span style="display:flex;align-items:center;gap:6px;color:var(--cream)"><span style="width:10px;height:3px;border-radius:3px;background:#ccab64"></span>المبيعات</span><span style="display:flex;align-items:center;gap:6px;color:var(--cream)"><span style="width:10px;height:3px;border-radius:3px;background:#6fa86a"></span>قيمة المواعيد</span></div>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px;align-items:start">
    <div class="card"><div class="sec-label">المواعيد القادمة اليوم <span class="ln"></span><span class="more" onclick="SALON.go('board')">اللوحة الكاملة ←</span></div>${next}</div>
    <div class="card"><div class="sec-label">الطاقم اليوم <span class="ln"></span><span class="more" onclick="SALON.go('staff')">إدارة ←</span></div>${staffRows}</div>
  </div>`;
};

/* ── THE BOOKING BOARD: staff columns × time rows + agenda view ── */
SCREENS.board=()=>{
  const live=APPTS.filter(a=>a.st!=='cancelled');
  /* «الآن»: خط الوقت الحالي داخل ساعات الدوام */
  const nowMin=(()=>{const d=new Date();return (d.getHours()*60+d.getMinutes())-START_HOUR*60;})();
  const nowLine=(nowMin>0&&nowMin<SLOTS*30)?`<div class="nowline" style="top:${Math.round(nowMin/30*ROW_H)}px"></div>`:'';
  const colTracks=STAFF.map(s=>{
    const blocks=live.filter(a=>a.staff===s.id).map(a=>{
      const st=ST_STYLE[a.st];
      const top=a.start*ROW_H+2, h=a.dur*ROW_H-4;
      const paid=a.st!=='blocked'&&paidOf(a.id);
      return `<div class="appt" onclick="event.stopPropagation();SALON.apptDetail('${a.id}')" style="top:${top}px;height:${h}px;background:${st.bg};border-color:${st.bd}${a.st==='blocked'?';border-style:dashed':''}">
        <div class="ap-t">${slotLabel(a.start)} – ${slotLabel(a.start+a.dur)}${paid?' <span style="color:#9fce99">· مدفوعة ✓</span>':''}</div>
        <div class="ap-c">${a.st==='blocked'?'⛔ '+a.client:a.client}</div>
        <div class="ap-s">${a.service}</div>
      </div>`;
    }).join('');
    return `<div class="col"><div class="col-track" data-staff="${s.id}" title="اضغطي على خانة فارغة لحجز موعد" onclick="if(!event.target.closest('.appt'))SALON.newBooking({staff:this.dataset.staff,start:Math.floor(event.offsetY/${ROW_H})})" style="height:${SLOTS*ROW_H}px">${gridLines()}${nowLine}${blocks}</div></div>`;
  }).join('');
  const heads=STAFF.map(s=>{const blocked=hrOnLeaveToday(s.id)?'في إجازة — محظورة الحجز':(spOf(s.id).status!=='active'?'موقوفة — محظورة الحجز':null);
    return `<div class="col-h" ${blocked?'style="opacity:.55"':''}><span class="ch-av" style="border-color:${s.color};color:${s.color}">${s.n.charAt(0)}</span><div><div class="ch-n">${s.n}</div><div class="ch-r">${blocked?'<span style="color:#ccab64">'+blocked+'</span>':s.role}</div></div></div>`;}).join('');
  const timeCol=Array.from({length:SLOTS}).map((_,i)=>`<div class="tl" style="height:${ROW_H}px">${i%2===0?slotLabel(i):''}</div>`).join('');
  /* agenda view: compact time+client bars sorted by start (like a month-cell) */
  const agenda=live.slice().sort((a,b)=>a.start-b.start).map(a=>{
    const st=ST_STYLE[a.st];const s=STAFF.find(x=>x.id===a.staff)||{n:'—'};
    const pd=a.st!=='blocked'&&paidOf(a.id);
    return `<div class="agitem" onclick="SALON.apptDetail('${a.id}')" style="background:${st.bg};border-color:${st.bd}${a.st==='blocked'?';border-style:dashed':''}">
      <span class="ag-t">${slotLabel(a.start)}</span>
      <b>${a.st==='blocked'?'وقت محجوب — '+a.client:a.client}</b>
      <span class="ag-s">${a.service} · ${s.n}</span>
      <span class="badge ${pd?'green':a.st==='pending'?'gold':a.st==='blocked'?'soft':'green'}" style="margin-right:auto;font-size:10px">${pd?'مدفوعة ✓':st.lb}</span>
    </div>`;
  }).join('')||'<div class="card" style="text-align:center;color:var(--muted)">لا حجوزات اليوم.</div>';
  const view=SALON.boardView||'grid';
  return `
  <style>
    .bd-top{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap;}
    .date-pill{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:9px 16px;}
    .date-pill .nav{width:28px;height:28px;border-radius:8px;border:1px solid var(--line);background:var(--surface2);color:var(--gold-pale);cursor:pointer;}
    .date-pill .dt{font-size:14px;color:var(--white);font-weight:600;} .date-pill .dt span{font-size:11.5px;color:var(--muted);font-weight:300;margin-right:6px;}
    .legend{display:flex;gap:16px;flex-wrap:wrap;margin-right:auto;}
    .legend .lg{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--cream);} .legend .lg .sw{width:11px;height:11px;border-radius:3px;border:1px solid;}
    .vsw{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
    .vsw button{background:none;border:none;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--muted);padding:9px 16px;cursor:pointer;}
    .vsw button.on{background:linear-gradient(120deg,rgba(220,192,106,.18),rgba(156,124,58,.06));color:var(--gold-light);}
    .board{background:var(--surface);border:1px solid var(--line);border-radius:16px;overflow:hidden;}
    .board-head{display:grid;grid-template-columns:66px repeat(${STAFF.length},1fr);border-bottom:1px solid var(--line);background:var(--surface2);}
    .board-head .corner{border-left:1px solid var(--line);}
    .col-h{display:flex;align-items:center;gap:10px;padding:14px 16px;border-left:1px solid var(--line);}
    .col-h:last-child{border-left:none;}
    .col-h .ch-av{width:34px;height:34px;border-radius:50%;background:var(--surface3);border:1px solid;display:flex;align-items:center;justify-content:center;font-family:'Bodoni Moda',serif;font-size:15px;}
    .col-h .ch-n{font-size:14px;color:var(--white);font-weight:600;} .col-h .ch-r{font-size:11.5px;color:var(--muted);}
    .board-body{display:grid;grid-template-columns:66px repeat(${STAFF.length},1fr);max-height:calc(100vh - 280px);overflow-y:auto;}
    .timecol{border-left:1px solid var(--line);}
    .tl{display:flex;align-items:flex-start;justify-content:center;padding-top:3px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--muted-deep);direction:ltr;border-bottom:1px solid var(--line-soft);}
    .col{position:relative;border-left:1px solid var(--line);} .col:last-child{border-left:none;}
    .col-track{position:relative;}
    .gl{position:absolute;left:0;right:0;border-bottom:1px solid var(--line-soft);}
    .appt{position:absolute;left:5px;right:5px;border-radius:8px;border:1px solid;border-right-width:3px;padding:7px 9px;overflow:hidden;cursor:pointer;transition:transform .15s;}
    .appt:hover{transform:scale(1.015);z-index:5;box-shadow:0 10px 26px rgba(0,0,0,.4);}
    .col-track{cursor:cell;}
    .col-track:hover .gl{border-bottom-color:var(--line);}
    .nowline{position:absolute;left:0;right:0;height:0;border-top:2px solid #c2705f;z-index:4;pointer-events:none;}
    .nowline::before{content:'الآن';position:absolute;right:4px;top:-9px;background:#c2705f;color:#fff;font-size:8.5px;padding:1px 7px;border-radius:8px;}
    .appt .ap-t{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--gold-pale);direction:ltr;}
    .appt .ap-c{font-size:12.5px;color:var(--white);font-weight:600;margin-top:1px;} .appt .ap-s{font-size:11px;color:var(--cream);opacity:0.85;margin-top:1px;}
    .agitem{display:flex;align-items:center;gap:11px;border:1px solid;border-right-width:4px;border-radius:9px;padding:9px 13px;margin-bottom:7px;cursor:pointer;font-size:13px;color:var(--white);}
    .agitem b{font-weight:600;} .agitem .ag-t{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--gold-pale);direction:ltr;min-width:44px;}
    .agitem .ag-s{font-size:11.5px;color:var(--muted);}
  </style>
  <div class="bd-top">
    <div class="date-pill"><button class="nav">›</button><div class="dt">اليوم <span>الأحد ٢١ يونيو</span></div><button class="nav">‹</button></div>
    <button class="btn btn-gold" onclick="SALON.newBooking()">+ موعد / وقت محجوب</button>
    <div class="vsw"><button class="${view==='grid'?'on':''}" onclick="SALON.setBoardView('grid')">اللوحة</button><button class="${view==='list'?'on':''}" onclick="SALON.setBoardView('list')">الأجندة</button></div>
    <div class="legend">${Object.keys(ST_STYLE).map(k=>`<span class="lg"><span class="sw" style="background:${ST_STYLE[k].bg};border-color:${ST_STYLE[k].bd}"></span>${ST_STYLE[k].lb}</span>`).join('')}</div>
  </div>
  ${view==='list'
    ?`<div class="card" style="padding:16px">${agenda}</div>`
    :`<div class="board">
    <div class="board-head"><div class="corner"></div>${heads}</div>
    <div class="board-body"><div class="timecol">${timeCol}</div>${colTracks}</div>
  </div>`}`;
};
function gridLines(){let g='';for(let i=1;i<SLOTS;i++)g+=`<div class="gl" style="top:${i*ROW_H}px"></div>`;return g;}

/* ── STAFF files tab (merged into the HR screen) ── */
function hrStaffTab(){
  const active=STAFF.filter(s=>spOf(s.id).status==='active').length;
  const rows=STAFF.map(s=>{
    const p=spOf(s.id);
    const cnt=APPTS.filter(a=>a.staff===s.id&&a.st!=='cancelled'&&a.st!=='blocked').length;const rev=cnt*380;
    const susp=p.status!=='active';
    return `<div class="card" style="display:flex;align-items:center;gap:16px;margin-bottom:12px;flex-wrap:wrap;${susp?'opacity:.65':''}">
    ${spAvatar(s,52)}
    <div style="flex:1;min-width:170px">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="font-size:16px;color:var(--white);font-weight:600">${s.n}</span>${susp?'<span class="badge soft">موقوفة</span>':'<span class="badge green">نشطة</span>'}${p.docs.length?`<span class="badge gold" style="font-size:10px">📎 ${p.docs.length} مستند</span>`:''}</div>
      <div style="font-size:12.5px;color:var(--gold-pale);margin-top:2px">${s.role} · ${s.shift||'دوام كامل'}${p.phone?` · <span dir="ltr">${p.phone}</span>`:''}</div>
    </div>
    <div style="text-align:center"><div class="num" style="font-size:22px;color:var(--white)">${cnt}</div><div style="font-size:11px;color:var(--muted)">مواعيد اليوم</div></div>
    <div style="text-align:center"><div class="num" style="font-size:22px;color:var(--gold-light)">${rev.toLocaleString('en')}</div><div style="font-size:11px;color:var(--muted)">دخل اليوم (ر.س)</div></div>
    <button class="btn btn-gold" style="padding:8px 18px" onclick="SALON.viewStaff('${s.id}')">الملف الكامل</button>
  </div>`;}).join('');
  return `
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px">
    <div class="stat"><div class="glow"></div><div class="top"><div class="ico">${icon('staff',19)}</div></div><div class="val">${STAFF.length}</div><div class="k">إجمالي الطاقم</div></div>
    <div class="stat"><div class="glow"></div><div class="top"><div class="ico">${icon('users',19)}</div></div><div class="val">${active}</div><div class="k">نشطات · على رأس العمل</div></div>
    <div class="stat"><div class="glow"></div><div class="top"><div class="ico">${icon('invoice',19)}</div></div><div class="val">${STAFF.reduce((t,s)=>t+spOf(s.id).docs.length,0)}</div><div class="k">مستندات محفوظة</div></div>
  </div>
  <div class="sec-label">الموظفات <span class="ln"></span></div>
  ${rows}`;
}

/* ══════════ HR — الموارد البشرية (إجازات برصيد وتعارضات · دوام وحضور · رواتب متعددة المصادر) ══════════ */
const HR_LEAVE_KEY='luma_hr_leaves', HR_PAY_KEY='luma_hr_pay2', HR_SHIFT_KEY='luma_hr_shifts',
      HR_ATT_KEY='luma_hr_att', HR_ADV_KEY='luma_hr_advances', HR_CLOSE_KEY='luma_hr_closed';
const HR_DAYS=['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const HR_QUOTA=21; /* الرصيد السنوي للإجازات */
const hrLoad=(k,f)=>{try{return JSON.parse(localStorage.getItem(k))??f}catch(e){return f}};
const hrSave=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}};
const hrMonth=()=>new Date().toISOString().slice(0,7);

let HR_LEAVES=hrLoad(HR_LEAVE_KEY,null);
if(!HR_LEAVES){
  HR_LEAVES=[
    {id:1,staff:'sara',from:'2026-07-14',to:'2026-07-16',type:'سنوية',reason:'سفر عائلي',status:'pending'},
    {id:2,staff:'reem',from:'2026-07-10',to:'2026-07-10',type:'طارئة',reason:'',status:'pending'},
    {id:3,staff:'nora',from:'2026-06-22',to:'2026-06-24',type:'مرضية',reason:'',status:'approved'},
  ];
  hrSave(HR_LEAVE_KEY,HR_LEAVES);
}
/* حضور تجريبي: تأخيرات وغياب هذا الأسبوع */
let HR_ATT=hrLoad(HR_ATT_KEY,null);
if(!HR_ATT){HR_ATT={sara:{1:{late:45}},reem:{3:{late:20}},nora:{2:{absent:true}}};hrSave(HR_ATT_KEY,HR_ATT);}
/* مبيعات منتجات وبقشيش تجريبية لكل موظفة (شهرياً) */
const HR_PROD={amal:5200,sara:3400,nora:6100,reem:2800};
const HR_TIPS={amal:640,sara:380,nora:520,reem:290};

const hrPay=()=>hrLoad(HR_PAY_KEY,{});
const hrPayOf=sid=>({base:3500,pct:10,prodPct:15,tierAt:15000,tierPct:12,...(hrPay()[sid]||{})});
const hrAdvances=()=>hrLoad(HR_ADV_KEY,{});
const hrAdvOf=sid=>((hrAdvances()[hrMonth()]||{})[sid])||0;
const hrClosed=()=>!!(hrLoad(HR_CLOSE_KEY,{})[hrMonth()]);
const hrShifts=()=>hrLoad(HR_SHIFT_KEY,{});
const hrShiftOf=(sid,d)=>{const s=(hrShifts()[sid]||{})[d];return s||((d===5)?{off:true}:{off:false,start:'10:00',end:'20:00'});};
const hrStaffName=id=>{const s=STAFF.find(x=>x.id===id);return s?s.n:id;};
const hrAttOf=(sid,d)=>((HR_ATT[sid]||{})[d])||null;
function hrOnLeaveToday(sid){
  const t=new Date().toISOString().slice(0,10);
  return HR_LEAVES.some(l=>l.staff===sid&&l.status==='approved'&&l.from<=t&&l.to>=t);
}
/* رصيد الإجازات: الحصة السنوية − أيام السنوية المعتمدة هذه السنة */
function hrBalance(sid){
  const yr=new Date().getFullYear();
  const used=HR_LEAVES.filter(l=>l.staff===sid&&l.status==='approved'&&l.type==='سنوية'&&l.from.startsWith(yr))
    .reduce((t,l)=>t+((new Date(l.to)-new Date(l.from))/86400000+1),0);
  return Math.max(0,HR_QUOTA-used);
}
/* حجوزات متعارضة مع فترة الإجازة (نموذج اليوم الواحد في اللوحة) */
function hrConflicts(l){
  const t=new Date().toISOString().slice(0,10);
  if(l.from>t||l.to<t)return [];
  return APPTS.filter(a=>a.staff===l.staff&&a.st!=='cancelled'&&a.st!=='blocked');
}
/* الرواتب متعددة المصادر: خدمات (بشرائح) + منتجات + بقشيش − سلف */
function hrLedger(sid){
  const p=hrPayOf(sid);
  const svc=APPTS.filter(a=>a.staff===sid&&a.st!=='cancelled'&&a.st!=='blocked').length*380*24;
  const rate=svc>=p.tierAt?p.tierPct:p.pct;
  const svcComm=Math.round(svc*rate/100);
  const prod=HR_PROD[sid]||0, prodComm=Math.round(prod*p.prodPct/100);
  const tips=HR_TIPS[sid]||0, adv=hrAdvOf(sid);
  const att=HR_ATT[sid]||{};
  const late=Object.values(att).reduce((t,d)=>t+(d.late||0),0);
  const abs=Object.values(att).filter(d=>d.absent).length;
  return {p,svc,rate,svcComm,prod,prodComm,tips,adv,late,abs,
          net:p.base+svcComm+prodComm+tips-adv};
}

/* ── custom request types (owner-defined forms) + approval chains ── */
const REQ_TYPES_KEY='luma_req_types', REQ_CHAINS_KEY='luma_req_chains',
      REQS_KEY='luma_requests', LEAVE_CHAIN_KEY='luma_leave_chain';
let HR_CHAINS=hrLoad(REQ_CHAINS_KEY,null);
if(!HR_CHAINS){
  HR_CHAINS=[
    {id:'c1',name:'اعتماد مباشر',steps:['المالكة']},
    {id:'c2',name:'سلسلة مزدوجة',steps:['مديرة الصالون','المالكة']},
  ];
  hrSave(REQ_CHAINS_KEY,HR_CHAINS);
}
let HR_RTYPES=hrLoad(REQ_TYPES_KEY,null);
if(!HR_RTYPES){
  HR_RTYPES=[
    {id:'t1',name:'طلب سلفة',chain:'c2',fields:[{label:'المبلغ (ر.س)',type:'number',req:1},{label:'سبب السلفة',type:'text',req:0}]},
    {id:'t2',name:'خطاب تعريف',chain:'c1',fields:[{label:'الجهة الموجَّه لها',type:'text',req:1},{label:'اللغة',type:'select',options:['عربي','إنجليزي'],req:1}]},
  ];
  hrSave(REQ_TYPES_KEY,HR_RTYPES);
}
let HR_REQS=hrLoad(REQS_KEY,[]);
const hrChainOf=id=>HR_CHAINS.find(c=>c.id===id)||HR_CHAINS[0]||{id:'x',name:'اعتماد مباشر',steps:['المالكة']};
const hrTypeOf=id=>HR_RTYPES.find(t=>t.id===id);
const hrLeaveChain=()=>hrChainOf(hrLoad(LEAVE_CHAIN_KEY,'c1'));
/* visual stepper: ✓ done · ● current · ○ upcoming */
function hrStepper(chain,step,status){
  return `<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:8px">${chain.steps.map((nm,i)=>{
    const done=status==='approved'||i<step, cur=status==='pending'&&i===step;
    return `${i?'<span style="color:var(--muted-deep)">←</span>':''}
      <span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;border-radius:20px;
        ${done?'background:rgba(111,168,106,.14);color:#9fce99;border:1px solid rgba(111,168,106,.4)'
        :cur?'background:rgba(205,172,80,.14);color:var(--gold-light);border:1px solid var(--gold-deep)'
        :'background:var(--surface3);color:var(--muted);border:1px solid var(--line)'}">
        ${done?'✓':cur?'●':'○'} ${nm}</span>`;}).join('')}</div>`;
}

const HR={
  tab:'staff',
  go(t){this.tab=t;SALON.go('hr');},
  review(id,ok){
    const l=HR_LEAVES.find(x=>x.id===id);if(!l)return;
    const chain=hrLeaveChain();l.step=l.step||0;
    /* توقيع خطوة وسيطة في سلسلة الموافقات — الطلب يبقى قيد المراجعة */
    if(ok&&l.step<chain.steps.length-1){
      l.step++;hrSave(HR_LEAVE_KEY,HR_LEAVES);SALON.go('hr');
      LUX.toast('وقّعت «'+chain.steps[l.step-1]+'» — بانتظار موافقة «'+chain.steps[l.step]+'»','ok');
      return;
    }
    if(ok&&l.type==='سنوية'){
      const days=(new Date(l.to)-new Date(l.from))/86400000+1;
      if(days>hrBalance(l.staff)){LUX.toast('رصيد '+hrStaffName(l.staff)+' لا يكفي ('+hrBalance(l.staff)+' يوماً متبقياً)','err');return;}
    }
    l.status=ok?'approved':'rejected';
    hrSave(HR_LEAVE_KEY,HR_LEAVES);
    if(ok){
      const cf=hrConflicts(l);
      if(cf.length){this.conflictModal(l,cf);return;}
      LUX.toast('اكتملت سلسلة الموافقات — حُدّث الدوام وحُظرت مواعيد الحجز تلقائياً ✓','ok');
    }else LUX.toast('تم رفض الطلب','ok');
    SALON.go('hr');
  },
  /* ─── الطلبات العامة: تقديم بحسب نوع وفورم تحدّدهما المالكة ─── */
  newRequest(){
    const opts=[{id:'__leave',name:'إجازة (نظامي)'}].concat(HR_RTYPES);
    LUX.modal('طلب جديد',`
      <div class="lux-lead">اختاري الموظفة ونوع الطلب — النموذج يظهر حسب النوع الذي عرّفتِه في «أنواع الطلبات».</div>
      <div class="lux-f"><label>الموظفة</label><select name="staff">${STAFF.map(s=>`<option value="${s.id}">${s.n}</option>`).join('')}</select></div>
      <div class="lux-f"><label>نوع الطلب</label><select name="type">${opts.map(t=>`<option value="${t.id}">${t.name}</option>`).join('')}</select></div>
      <button class="lux-btn lux-gold" data-ok style="width:100%">متابعة</button>`,{onMount(ov,close){
      ov.querySelector('[data-ok]').onclick=()=>{
        const staff=ov.querySelector('[name=staff]').value, tid=ov.querySelector('[name=type]').value;
        close();
        if(tid==='__leave')return HR.newLeave();
        HR.requestForm(tid,staff);
      };
    }});
  },
  requestForm(tid,staff){
    const t=hrTypeOf(tid);if(!t)return;
    const chain=hrChainOf(t.chain);
    const fld=(f,i)=>{
      const req=f.req?' <span style="color:#c0566a">*</span>':'';
      if(f.type==='select')return `<div class="lux-f"><label>${f.label}${req}</label><select data-f="${i}">${(f.options||[]).map(o=>`<option>${o}</option>`).join('')}</select></div>`;
      if(f.type==='date')return `<div class="lux-f"><label>${f.label}${req}</label><input type="date" data-f="${i}"/></div>`;
      if(f.type==='number')return `<div class="lux-f"><label>${f.label}${req}</label><input type="number" data-f="${i}" dir="ltr" style="text-align:right"/></div>`;
      return `<div class="lux-f"><label>${f.label}${req}</label><input data-f="${i}"/></div>`;
    };
    LUX.modal(t.name+' — '+hrStaffName(staff),`
      <div class="lux-lead">سلسلة الاعتماد: <b style="color:var(--gold-light,#ccab64)">${chain.steps.join(' ← ')}</b></div>
      ${t.fields.map(fld).join('')}
      <button class="lux-btn lux-gold" data-ok style="width:100%;margin-top:6px">إرسال الطلب</button>`,{onMount(ov,close){
      ov.querySelector('[data-ok]').onclick=()=>{
        const values={};
        for(let i=0;i<t.fields.length;i++){
          const el=ov.querySelector(`[data-f="${i}"]`);
          if(t.fields[i].req&&!el.value.trim()){el.style.borderColor='#c0566a';el.focus();return;}
          values[t.fields[i].label]=el.value.trim();
        }
        HR_REQS.unshift({id:Date.now(),type:tid,staff,values,step:0,status:'pending',at:new Date().toISOString().slice(0,10)});
        hrSave(REQS_KEY,HR_REQS);close();SALON.go('hr');
        LUX.toast('أُرسل الطلب — بانتظار «'+chain.steps[0]+'» ✓','ok');
      };
    }});
  },
  reviewReq(id,ok){
    const r=HR_REQS.find(x=>x.id===id);if(!r)return;
    const chain=hrChainOf((hrTypeOf(r.type)||{}).chain);
    if(!ok){r.status='rejected';}
    else if(r.step<chain.steps.length-1){
      r.step++;hrSave(REQS_KEY,HR_REQS);SALON.go('hr');
      LUX.toast('وقّعت «'+chain.steps[r.step-1]+'» — بانتظار «'+chain.steps[r.step]+'»','ok');return;
    }
    else r.status='approved';
    hrSave(REQS_KEY,HR_REQS);SALON.go('hr');
    LUX.toast(ok?'اكتملت سلسلة الموافقات — الطلب معتمد نهائياً ✓':'تم رفض الطلب','ok');
  },
  /* ─── إدارة أنواع الطلبات (فورم من تصميم المالكة) ─── */
  manageTypes(){
    const rows=HR_RTYPES.map(t=>`
      <div class="lux-row"><span class="k">${t.name}<br><span style="font-size:10.5px">${t.fields.length} حقول · سلسلة: ${hrChainOf(t.chain).name}</span></span>
      <span class="v"><button class="lux-btn lux-ghost" style="padding:6px 12px;font-size:11px" onclick="HR.delType('${t.id}')">حذف</button></span></div>`).join('')
      ||'<div class="lux-lead">لا أنواع مخصصة بعد.</div>';
    LUX.modal('أنواع الطلبات',`
      <div class="lux-lead">النوع يحدد النموذج الذي تعبّئه الموظفة وسلسلة الموافقات التي يمر بها.</div>
      <div class="lux-row"><span class="k">إجازة (نظامي)<br><span style="font-size:10.5px">نموذج ثابت + رصيد وتعارضات</span></span>
        <span class="v"><select id="lvChain" style="background:#0e0d11;border:1px solid var(--line,#26242d);border-radius:7px;color:#f6f2ec;padding:7px 9px;font-family:inherit;font-size:12px">${HR_CHAINS.map(c=>`<option value="${c.id}" ${hrLeaveChain().id===c.id?'selected':''}>${c.name}</option>`).join('')}</select></span></div>
      ${rows}
      <button class="lux-btn lux-gold" data-new style="width:100%;margin-top:14px">+ نوع طلب جديد</button>`,{onMount(ov,close){
      ov.querySelector('#lvChain').onchange=e=>{hrSave(LEAVE_CHAIN_KEY,e.target.value);LUX.toast('حُدّثت سلسلة موافقات الإجازات ✓','ok');};
      ov.querySelector('[data-new]').onclick=()=>{close();HR.typeBuilder();};
    }});
  },
  typeBuilder(){
    let fields=[];
    const render=ov=>{
      ov.querySelector('#tbFields').innerHTML=fields.map((f,i)=>`
        <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12.5px">
          <span style="flex:1;color:#f6f2ec">${f.label}</span>
          <span style="color:#86818d">${{text:'نص',number:'رقم',date:'تاريخ',select:'قائمة'}[f.type]}${f.req?' · إلزامي':''}</span>
          <button style="background:none;border:none;color:#c0566a;cursor:pointer" onclick="this.dispatchEvent(new CustomEvent('rmf',{bubbles:true,detail:${i}}))">×</button>
        </div>`).join('')||'<div style="color:#86818d;font-size:12px;padding:6px 0">أضيفي حقول النموذج…</div>';
    };
    LUX.modal('نوع طلب جديد',`
      <div class="lux-f"><label>اسم النوع</label><input name="tname" placeholder="مثال: طلب دورة تدريبية"/></div>
      <div class="lux-f"><label>سلسلة الموافقات</label><select name="tchain">${HR_CHAINS.map(c=>`<option value="${c.id}">${c.name} (${c.steps.join(' ← ')})</option>`).join('')}</select></div>
      <div style="font-size:12px;color:#9c8047;font-weight:700;margin:12px 0 6px">حقول النموذج</div>
      <div id="tbFields"></div>
      <div style="display:flex;gap:7px;margin-top:10px;flex-wrap:wrap">
        <input id="tbLabel" placeholder="تسمية الحقل" style="flex:2;min-width:120px;background:#0e0d11;border:1px solid var(--line,#26242d);border-radius:7px;color:#f6f2ec;padding:9px 11px;font-family:inherit;font-size:12.5px"/>
        <select id="tbType" style="background:#0e0d11;border:1px solid var(--line,#26242d);border-radius:7px;color:#f6f2ec;padding:9px;font-family:inherit;font-size:12.5px"><option value="text">نص</option><option value="number">رقم</option><option value="date">تاريخ</option><option value="select">قائمة خيارات</option></select>
        <label style="display:flex;align-items:center;gap:4px;font-size:11.5px;color:#86818d"><input type="checkbox" id="tbReq"/> إلزامي</label>
      </div>
      <input id="tbOpts" placeholder="الخيارات مفصولة بفاصلة (للقائمة فقط)" style="display:none;width:100%;margin-top:8px;background:#0e0d11;border:1px solid var(--line,#26242d);border-radius:7px;color:#f6f2ec;padding:9px 11px;font-family:inherit;font-size:12.5px"/>
      <button class="lux-btn lux-ghost" data-addf style="width:100%;margin-top:10px;padding:9px">+ إضافة الحقل</button>
      <button class="lux-btn lux-gold" data-ok style="width:100%;margin-top:12px">حفظ نوع الطلب</button>`,{onMount(ov,close){
      render(ov);
      ov.addEventListener('rmf',e=>{fields.splice(e.detail,1);render(ov);});
      ov.querySelector('#tbType').onchange=e=>ov.querySelector('#tbOpts').style.display=e.target.value==='select'?'':'none';
      ov.querySelector('[data-addf]').onclick=()=>{
        const lb=ov.querySelector('#tbLabel').value.trim();if(!lb)return;
        const ty=ov.querySelector('#tbType').value;
        const f={label:lb,type:ty,req:ov.querySelector('#tbReq').checked?1:0};
        if(ty==='select')f.options=ov.querySelector('#tbOpts').value.split(',').map(x=>x.trim()).filter(Boolean);
        fields.push(f);ov.querySelector('#tbLabel').value='';render(ov);
      };
      ov.querySelector('[data-ok]').onclick=()=>{
        const nm=ov.querySelector('[name=tname]').value.trim();
        if(!nm){ov.querySelector('[name=tname]').style.borderColor='#c0566a';return;}
        if(!fields.length){LUX.toast('أضيفي حقلاً واحداً على الأقل','err');return;}
        HR_RTYPES.push({id:'t'+Date.now(),name:nm,chain:ov.querySelector('[name=tchain]').value,fields});
        hrSave(REQ_TYPES_KEY,HR_RTYPES);close();SALON.go('hr');LUX.toast('أُنشئ نوع «'+nm+'» ✓','ok');
      };
    }});
  },
  delType(id){
    const i=HR_RTYPES.findIndex(t=>t.id===id);if(i<0)return;
    HR_RTYPES.splice(i,1);hrSave(REQ_TYPES_KEY,HR_RTYPES);
    document.querySelectorAll('.lux-ov').forEach(o=>o.remove());HR.manageTypes();
  },
  /* ─── إدارة سلاسل الموافقات ─── */
  manageChains(){
    const rows=HR_CHAINS.map(c=>`
      <div class="lux-row"><span class="k">${c.name}<br><span style="font-size:10.5px">${c.steps.join(' ← ')}</span></span>
      <span class="v">${HR_CHAINS.length>1?`<button class="lux-btn lux-ghost" style="padding:6px 12px;font-size:11px" onclick="HR.delChain('${c.id}')">حذف</button>`:''}</span></div>`).join('');
    LUX.modal('سلاسل الموافقات',`
      <div class="lux-lead">السلسلة تحدّد مَن يوقّع على الطلب وبأي ترتيب — يعتمد الطلب نهائياً بعد آخر توقيع.</div>
      ${rows}
      <div style="font-size:12px;color:#9c8047;font-weight:700;margin:14px 0 6px">سلسلة جديدة</div>
      <div class="lux-f"><label>اسم السلسلة</label><input id="chName" placeholder="مثال: اعتماد ثلاثي"/></div>
      <div class="lux-f"><label>الخطوات بالترتيب (مفصولة بفاصلة)</label><input id="chSteps" placeholder="مديرة الفرع، مديرة الموارد البشرية، المالكة"/></div>
      <button class="lux-btn lux-gold" data-ok style="width:100%">إضافة السلسلة</button>`,{onMount(ov,close){
      ov.querySelector('[data-ok]').onclick=()=>{
        const nm=ov.querySelector('#chName').value.trim();
        const steps=ov.querySelector('#chSteps').value.split(/[،,]/).map(x=>x.trim()).filter(Boolean);
        if(!nm){ov.querySelector('#chName').style.borderColor='#c0566a';return;}
        if(!steps.length){ov.querySelector('#chSteps').style.borderColor='#c0566a';LUX.toast('أدخلي خطوة واحدة على الأقل','err');return;}
        HR_CHAINS.push({id:'c'+Date.now(),name:nm,steps});
        hrSave(REQ_CHAINS_KEY,HR_CHAINS);close();SALON.go('hr');
        LUX.toast('أُنشئت سلسلة «'+nm+'» ('+steps.length+' خطوات) ✓','ok');
      };
    }});
  },
  delChain(id){
    if(HR_CHAINS.length<=1)return;
    const used=HR_RTYPES.some(t=>t.chain===id)||hrLoad(LEAVE_CHAIN_KEY,'c1')===id;
    if(used){LUX.toast('السلسلة مستخدمة في نوع طلب — غيّري النوع أولاً','err');return;}
    const i=HR_CHAINS.findIndex(c=>c.id===id);HR_CHAINS.splice(i,1);hrSave(REQ_CHAINS_KEY,HR_CHAINS);
    document.querySelectorAll('.lux-ov').forEach(o=>o.remove());HR.manageChains();
  },
  conflictModal(l,cf){
    const rows=cf.map(a=>`<div class="lux-row"><span class="k" dir="ltr">${slotLabel(a.start)}</span><span class="v">${a.client} · ${a.service}</span></div>`).join('');
    LUX.modal('هناك حجوزات نشطة خلال هذه الفترة',`
      <div class="lux-lead">لدى <b style="color:var(--gold-light)">${hrStaffName(l.staff)}</b> ${cf.length} حجزاً مؤكداً يتقاطع مع إجازتها المعتمدة — اختاري طريقة المعالجة:</div>
      ${rows}
      <button class="lux-btn lux-gold" data-dist style="width:100%;margin-top:16px">توزيع الحجوزات تلقائياً على زميلات متاحات</button>
      <button class="lux-btn lux-ghost" data-notify style="width:100%;margin-top:8px">إرسال إشعار اعتذار وإعادة جدولة للعملاء</button>`,{onMount(ov,close){
      ov.querySelector('[data-dist]').onclick=()=>{
        let moved=0,stuck=0;
        cf.forEach(a=>{
          const target=STAFF.find(s=>s.id!==l.staff&&!hrOnLeaveToday(s.id)&&spOf(s.id).status==='active'&&
            !APPTS.some(b=>b.staff===s.id&&b.st!=='cancelled'&&b.start<a.start+a.dur&&a.start<b.start+b.dur));
          if(target){a.staff=target.id;moved++;}else{a.st='cancelled';stuck++;}
        });
        close();SALON.go('hr');
        LUX.toast('وُزّع '+moved+' حجزاً تلقائياً'+(stuck?' — '+stuck+' بحاجة لإعادة جدولة':'')+' ✓','ok');
      };
      ov.querySelector('[data-notify]').onclick=()=>{
        cf.forEach(a=>a.st='cancelled');close();SALON.go('hr');
        LUX.toast('أُرسل إشعار الاعتذار وإعادة الجدولة لـ '+cf.length+' عميلة ✓','ok');
      };
    }});
  },
  newLeave(){
    const body=`
      <div class="lux-lead">قدّمي طلب إجازة — يظهر بحالة «قيد المراجعة» حتى يُعتمد.</div>
      <div class="lux-f"><label>الموظفة</label><select name="staff">${STAFF.map(s=>`<option value="${s.id}">${s.n} (رصيد: ${hrBalance(s.id)} يوماً)</option>`).join('')}</select></div>
      <div class="lux-two">
        <div class="lux-f"><label>من</label><input type="date" name="from"/></div>
        <div class="lux-f"><label>إلى</label><input type="date" name="to"/></div>
      </div>
      <div class="lux-f"><label>النوع</label><select name="type"><option>سنوية</option><option>مرضية</option><option>طارئة</option><option>بدون راتب</option></select></div>
      <div class="lux-f"><label>السبب (اختياري)</label><input name="reason" placeholder="…"/></div>
      <div class="lux-foot"><button class="lux-btn lux-ghost" data-c style="flex:1">إلغاء</button><button class="lux-btn lux-gold" data-ok style="flex:1.4">إرسال الطلب</button></div>`;
    LUX.modal('طلب إجازة جديد',body,{onMount(ov,close){
      ov.querySelector('[data-c]').onclick=close;
      ov.querySelector('[data-ok]').onclick=()=>{
        const g=n=>ov.querySelector('[name='+n+']');
        if(!g('from').value||!g('to').value){LUX.toast('حدّدي التاريخين','err');return;}
        if(g('to').value<g('from').value){LUX.toast('تاريخ النهاية قبل البداية','err');return;}
        const clash=HR_LEAVES.some(l=>l.staff===g('staff').value&&['pending','approved'].includes(l.status)&&l.from<=g('to').value&&l.to>=g('from').value);
        if(clash){LUX.toast('يوجد طلب إجازة آخر يتقاطع مع هذه الفترة','err');return;}
        HR_LEAVES.unshift({id:Date.now(),staff:g('staff').value,from:g('from').value,to:g('to').value,type:g('type').value,reason:g('reason').value.trim(),status:'pending'});
        hrSave(HR_LEAVE_KEY,HR_LEAVES);close();SALON.go('hr');LUX.toast('أُرسل الطلب ✓','ok');
      };
    }});
  },
  editShift(sid){
    const rows=HR_DAYS.map((d,i)=>{const sh=hrShiftOf(sid,i);return `
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line-soft)">
        <span style="width:70px;font-size:13px;color:var(--cream)">${d}</span>
        <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted)"><input type="checkbox" data-off="${i}" ${sh.off?'checked':''}/> إجازة</label>
        <input type="time" data-s="${i}" value="${sh.start||'10:00'}" ${sh.off?'disabled':''} style="background:#0e0d11;border:1px solid var(--line);border-radius:6px;color:var(--white);padding:6px 8px;font-size:12px"/>
        <span style="color:var(--muted)">←</span>
        <input type="time" data-e="${i}" value="${sh.end||'20:00'}" ${sh.off?'disabled':''} style="background:#0e0d11;border:1px solid var(--line);border-radius:6px;color:var(--white);padding:6px 8px;font-size:12px"/>
      </div>`;}).join('');
    LUX.modal('دوام '+hrStaffName(sid),`<div class="lux-lead">هذه الساعات هي مصدر الحقيقة لمواعيد الحجز المتاحة في صفحة العملاء.</div>`+rows+`<button class="lux-btn lux-gold" data-ok style="margin-top:16px;width:100%">حفظ الجدول</button>`,{onMount(ov,close){
      ov.querySelectorAll('[data-off]').forEach(cb=>cb.onchange=()=>{const i=cb.dataset.off;ov.querySelector(`[data-s="${i}"]`).disabled=cb.checked;ov.querySelector(`[data-e="${i}"]`).disabled=cb.checked;});
      ov.querySelector('[data-ok]').onclick=()=>{
        const all=hrShifts();all[sid]={};
        for(let i=0;i<7;i++){
          const off=ov.querySelector(`[data-off="${i}"]`).checked;
          const st=ov.querySelector(`[data-s="${i}"]`).value,en=ov.querySelector(`[data-e="${i}"]`).value;
          if(!off&&en<=st){LUX.toast('نهاية الوردية يجب أن تكون بعد بدايتها ('+HR_DAYS[i]+')','err');return;}
          all[sid][i]=off?{off:true}:{off:false,start:st,end:en};
        }
        hrSave(HR_SHIFT_KEY,all);close();SALON.go('hr');LUX.toast('تم تحديث الدوام — وانعكس فوراً على مواعيد الحجز ✓','ok');
      };
    }});
  },
  editPay(sid){
    if(hrClosed()){LUX.toast('الشهر مُصفّى — الأرقام مجمّدة','err');return;}
    const p=hrPayOf(sid);
    LUX.modal('راتب وعمولات '+hrStaffName(sid),`
      <div class="lux-f"><label>الراتب الأساسي (ر.س/شهر)</label><input name="base" dir="ltr" style="text-align:right" value="${p.base}"/></div>
      <div class="lux-two">
        <div class="lux-f"><label>عمولة الخدمات (٪)</label><input name="pct" dir="ltr" style="text-align:right" value="${p.pct}"/></div>
        <div class="lux-f"><label>عمولة المنتجات (٪)</label><input name="prodPct" dir="ltr" style="text-align:right" value="${p.prodPct}"/></div>
      </div>
      <div class="lux-lead" style="margin:4px 0 8px">الشريحة التحفيزية: إذا تجاوزت مبيعات الخدمات الحد، ترتفع النسبة تلقائياً.</div>
      <div class="lux-two">
        <div class="lux-f"><label>حد الشريحة (ر.س)</label><input name="tierAt" dir="ltr" style="text-align:right" value="${p.tierAt}"/></div>
        <div class="lux-f"><label>نسبة الشريحة (٪)</label><input name="tierPct" dir="ltr" style="text-align:right" value="${p.tierPct}"/></div>
      </div>
      <button class="lux-btn lux-gold" data-ok style="width:100%;margin-top:6px">حفظ</button>`,{onMount(ov,close){
      ov.querySelector('[data-ok]').onclick=()=>{
        const num=(n,mx)=>Math.min(mx,Math.max(0,parseFloat(ov.querySelector('[name='+n+']').value)||0));
        const all=hrPay();all[sid]={base:num('base',99999),pct:num('pct',100),prodPct:num('prodPct',100),tierAt:num('tierAt',999999),tierPct:num('tierPct',100)};
        hrSave(HR_PAY_KEY,all);close();SALON.go('hr');LUX.toast('تم تحديث الراتب ✓','ok');
      };
    }});
  },
  addAdvance(sid){
    if(hrClosed()){LUX.toast('الشهر مُصفّى — لا يمكن إضافة سلف','err');return;}
    LUX.modal('سلفة — '+hrStaffName(sid),`
      <div class="lux-f"><label>مبلغ السلفة (ر.س) — يُخصم من صافي هذا الشهر</label><input name="amt" dir="ltr" style="text-align:right" placeholder="0"/></div>
      <button class="lux-btn lux-gold" data-ok style="width:100%">تسجيل السلفة</button>`,{onMount(ov,close){
      ov.querySelector('[data-ok]').onclick=()=>{
        const v=parseFloat(ov.querySelector('[name=amt]').value)||0;
        if(v<=0){LUX.toast('أدخلي مبلغاً صحيحاً','err');return;}
        const all=hrAdvances();const m=hrMonth();all[m]=all[m]||{};all[m][sid]=(all[m][sid]||0)+v;
        hrSave(HR_ADV_KEY,all);close();SALON.go('hr');LUX.toast('سُجّلت السلفة وخُصمت من الصافي ✓','ok');
      };
    }});
  },
  closeMonth(){
    if(hrClosed())return;
    const total=STAFF.reduce((t,s)=>t+hrLedger(s.id).net,0);
    LUX.confirm('تصفية واعتماد رواتب شهر '+hrMonth()+' بإجمالي '+total.toLocaleString('en')+' ر.س؟ بعد الاعتماد تُجمَّد الأرقام وتُصدر قسائم الرواتب.',()=>{
      const all=hrLoad(HR_CLOSE_KEY,{});
      all[hrMonth()]={total,at:new Date().toISOString(),slips:STAFF.map(s=>({staff:s.n,...hrLedger(s.id)}))};
      hrSave(HR_CLOSE_KEY,all);SALON.go('hr');
      LUX.toast('تمت التصفية ✓ صدرت '+STAFF.length+' قسائم راتب وحُدّث النظام المحاسبي','ok');
    });
  },
};
window.HR=HR;

SCREENS.hr=()=>{
  const tabs=[['staff','الموظفات'],['leaves','الطلبات'],['shifts','جدول الدوام'],['payroll','الرواتب والعمولات']];
  const pending=HR_LEAVES.filter(l=>l.status==='pending').length;
  const head=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px">
    <div><div style="font-weight:600;font-size:19px;color:var(--white)">الطاقم والموارد البشرية</div><div style="font-size:13px;color:var(--gold-pale);margin-top:2px">ملفات الموظفات، الإجازات، الدوام والحضور، والرواتب — كلها تتزامن مع الحجوزات تلقائياً</div></div>
    ${HR.tab==='staff'?`<button class="btn btn-gold" onclick="SALON.addStaff()">+ إضافة موظفة</button>`:''}
    ${HR.tab==='leaves'?`<div style="display:flex;gap:9px;flex-wrap:wrap">
      <button class="btn btn-ghost" onclick="HR.manageChains()">سلاسل الموافقات</button>
      <button class="btn btn-ghost" onclick="HR.manageTypes()">أنواع الطلبات</button>
      <button class="btn btn-gold" onclick="HR.newRequest()">+ طلب جديد</button>
    </div>`:''}
  </div>
  <div style="display:flex;gap:8px;border-bottom:1px solid var(--line);margin-bottom:20px;overflow-x:auto">
    ${tabs.map(([k,lb])=>`<button onclick="HR.go('${k}')" style="background:none;border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;padding:10px 16px;white-space:nowrap;border-bottom:2px solid ${HR.tab===k?'var(--gold-light)':'transparent'};color:${HR.tab===k?'var(--gold-light)':'var(--muted)'}">${lb}${k==='staff'?` · ${STAFF.length}`:''}${k==='leaves'&&pending?` · ${pending}`:''}</button>`).join('')}
  </div>`;

  if(HR.tab==='staff')return head+hrStaffTab();

  if(HR.tab==='leaves'){
    const ST={pending:['قيد المراجعة','gold'],approved:['معتمدة','green'],rejected:['مرفوضة','soft']};
    const lvChain=hrLeaveChain();
    const rows=HR_LEAVES.map(l=>`
      <div class="card" style="margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
          <span style="width:42px;height:42px;border-radius:50%;background:var(--surface3);border:1px solid var(--gold-deep);display:flex;align-items:center;justify-content:center;color:var(--gold-light)">${hrStaffName(l.staff).charAt(0)}</span>
          <div style="flex:1;min-width:200px">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span style="font-size:14.5px;color:var(--white);font-weight:600">${hrStaffName(l.staff)}</span>
              <span class="badge soft" style="font-size:10.5px">إجازة</span>
              <span class="badge soft" style="font-size:10.5px">الرصيد المتبقي: ${hrBalance(l.staff)} يوماً</span>
            </div>
            <div style="font-size:12px;color:var(--muted);margin-top:3px">${l.type} · <span dir="ltr">${l.from}</span> ← <span dir="ltr">${l.to}</span>${l.reason?` · «${l.reason}»`:''}</div>
          </div>
          ${l.status==='pending'
            ?`<button class="btn btn-gold" style="padding:8px 18px" onclick="HR.review(${l.id},true)">اعتماد «${lvChain.steps[l.step||0]}»</button>
               <button class="btn btn-ghost" style="padding:8px 18px;border-color:#7c4a55;color:#e29aa6" onclick="HR.review(${l.id},false)">رفض</button>`
            :`<span class="badge ${ST[l.status][1]}">${ST[l.status][0]}</span>`}
        </div>
        ${l.status!=='rejected'?hrStepper(lvChain,l.step||0,l.status):''}
      </div>`).join('');
    const reqRows=HR_REQS.map(r=>{
      const t=hrTypeOf(r.type)||{name:'نوع محذوف',fields:[]};
      const chain=hrChainOf(t.chain);
      const vals=Object.entries(r.values).filter(([k,v])=>v).map(([k,v])=>`<span style="color:var(--muted)">${k}:</span> ${v}`).join(' · ');
      return `
      <div class="card" style="margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
          <span style="width:42px;height:42px;border-radius:11px;background:var(--surface3);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--gold-light)">📄</span>
          <div style="flex:1;min-width:200px">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span style="font-size:14.5px;color:var(--white);font-weight:600">${hrStaffName(r.staff)}</span>
              <span class="badge gold" style="font-size:10.5px">${t.name}</span>
              <span style="font-size:11px;color:var(--muted-deep)" dir="ltr">${r.at}</span>
            </div>
            <div style="font-size:12px;color:var(--cream);margin-top:3px">${vals||'—'}</div>
          </div>
          ${r.status==='pending'
            ?`<button class="btn btn-gold" style="padding:8px 18px" onclick="HR.reviewReq(${r.id},true)">اعتماد «${chain.steps[r.step]}»</button>
               <button class="btn btn-ghost" style="padding:8px 18px;border-color:#7c4a55;color:#e29aa6" onclick="HR.reviewReq(${r.id},false)">رفض</button>`
            :`<span class="badge ${ST[r.status][1]}">${ST[r.status][0]}</span>`}
        </div>
        ${r.status!=='rejected'?hrStepper(chain,r.step,r.status):''}
      </div>`;}).join('');
    return head+`
    <div class="sec-label">طلبات الإجازة <span class="ln"></span><span style="font-size:11px;color:var(--muted)">سلسلة الاعتماد: ${lvChain.name}</span></div>
    ${rows||'<div class="card" style="text-align:center;color:var(--muted);margin-bottom:10px">لا توجد طلبات إجازة.</div>'}
    <div class="sec-label" style="margin-top:22px">الطلبات العامة <span class="ln"></span><span style="font-size:11px;color:var(--muted)">${HR_RTYPES.length} أنواع معرّفة</span></div>
    ${reqRows||'<div class="card" style="text-align:center;color:var(--muted)">لا طلبات عامة بعد — قدّمي طلباً من زر «+ طلب جديد».</div>'}`;
  }

  if(HR.tab==='shifts'){
    return head+`
    <div class="card" style="overflow-x:auto;padding:0">
      <table style="width:100%;min-width:820px;border-collapse:collapse;font-size:13px">
        <thead><tr style="background:var(--surface2);color:var(--gold)">
          <th style="padding:12px 16px;text-align:right">الموظفة</th>
          ${HR_DAYS.map(d=>`<th style="padding:12px 8px">${d}</th>`).join('')}<th></th></tr></thead>
        <tbody>${STAFF.map(s=>{
          const led=hrLedger(s.id);
          return `
          <tr style="border-top:1px solid var(--line-soft)">
            <td style="padding:12px 16px;color:var(--white);font-weight:600">${s.n}${hrOnLeaveToday(s.id)?' <span class="badge gold" style="margin-right:6px">في إجازة اليوم</span>':''}
              ${led.late||led.abs?`<div style="font-size:10px;color:#e29aa6;font-weight:400;margin-top:3px">هذا الشهر: ${led.late?led.late+' دقيقة تأخير':''}${led.late&&led.abs?' · ':''}${led.abs?led.abs+' غياب':''}</div>`:''}</td>
            ${HR_DAYS.map((_,i)=>{const sh=hrShiftOf(s.id,i);const att=hrAttOf(s.id,i);
              return `<td style="padding:8px;text-align:center;${att?'background:rgba(192,86,106,0.10)':''}">${sh.off?'<span style="color:var(--muted-deep);font-size:11.5px">إجازة</span>':`<span dir="ltr" style="background:var(--surface3);border-radius:6px;padding:3px 7px;font-size:11px;color:var(--gold-pale)">${sh.start}–${sh.end}</span>`}${att?`<div style="font-size:10px;color:#e29aa6;margin-top:4px">${att.absent?'غياب':'تأخير '+att.late+' دقيقة'}</div>`:''}</td>`;}).join('')}
            <td style="padding:8px"><button class="btn btn-ghost" style="padding:6px 14px;font-size:12px" onclick="HR.editShift('${s.id}')">تعديل</button></td>
          </tr>`;}).join('')}</tbody>
      </table>
    </div>
    <div style="font-size:11.5px;color:var(--muted);margin-top:12px">الساعات أعلاه هي مصدر الحقيقة لمواعيد الحجز المتاحة · التأخيرات والغيابات تُرحَّل تلقائياً إلى حاسبة الرواتب نهاية الشهر.</div>`;
  }

  /* payroll — multi-source ledger */
  const closed=hrClosed();
  const rows=STAFF.map(s=>{
    const L=hrLedger(s.id);
    return `<tr style="border-top:1px solid var(--line-soft)">
      <td style="padding:11px 14px;color:var(--white);font-weight:600">${s.n}<span style="font-size:11px;color:var(--muted);margin-right:8px">${s.role}</span></td>
      <td style="padding:11px" class="num">${L.p.base.toLocaleString('en')}</td>
      <td style="padding:11px" class="num">${L.svc.toLocaleString('en')}</td>
      <td style="padding:11px;color:var(--gold-pale)" class="num">${L.svcComm.toLocaleString('en')} <span style="font-size:10px;color:${L.rate!==L.p.pct?'#9fce99':'var(--muted)'}">(${L.rate}٪${L.rate!==L.p.pct?' شريحة ▲':''})</span></td>
      <td style="padding:11px;color:var(--gold-pale)" class="num">${L.prodComm.toLocaleString('en')} <span style="font-size:10px;color:var(--muted)">(${L.p.prodPct}٪ من ${L.prod.toLocaleString('en')})</span></td>
      <td style="padding:11px;color:#9fce99" class="num">${L.tips.toLocaleString('en')}</td>
      <td style="padding:11px;color:#e29aa6" class="num">−${L.adv.toLocaleString('en')}${closed?'':` <button class="btn btn-ghost" style="padding:3px 9px;font-size:10px" onclick="HR.addAdvance('${s.id}')">+ سلفة</button>`}</td>
      <td style="padding:11px;font-size:11px;color:${L.late||L.abs?'#e29aa6':'#9fce99'}">${L.late||L.abs?L.late+' د · '+L.abs+' غياب':'منتظم ✓'}</td>
      <td style="padding:11px;color:var(--gold-light);font-weight:700" class="num">${L.net.toLocaleString('en')}</td>
      <td style="padding:8px">${closed?'<span style="font-size:10.5px;color:var(--muted)">قسيمة ✓</span>':`<button class="btn btn-ghost" style="padding:6px 12px;font-size:11px" onclick="HR.editPay('${s.id}')">تعديل</button>`}</td>
    </tr>`;}).join('');
  const totalAll=STAFF.reduce((t,s)=>t+hrLedger(s.id).net,0);
  return head+`
  <div class="card" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:12px">
    <div><span style="font-size:13px;color:var(--gold-pale)">إجمالي رواتب شهر ${hrMonth()} — سجل نهائي متعدد المصادر (خدمات + منتجات + بقشيش − سلف)</span>
      <div class="num" style="font-size:26px;color:var(--gold-light);margin-top:4px">${totalAll.toLocaleString('en')} <span style="font-size:11px;color:var(--muted)">ر.س</span></div></div>
    ${closed
      ?'<span class="badge green" style="font-size:13px;padding:10px 20px">الشهر مُصفّى ومعتمد ✓</span>'
      :'<button class="btn btn-gold" onclick="HR.closeMonth()">تصفية واعتماد الرواتب</button>'}
  </div>
  <div class="card" style="overflow-x:auto;padding:0">
    <table style="width:100%;min-width:1020px;border-collapse:collapse;font-size:12.5px">
      <thead><tr style="background:var(--surface2);color:var(--gold)">
        ${['الموظفة','الأساسي','مبيعات الخدمات','عمولة الخدمات','عمولة المنتجات','بقشيش إلكتروني','سلف','الحضور','الصافي',''].map(h=>`<th style="padding:11px 14px;text-align:right;white-space:nowrap">${h}</th>`).join('')}</tr></thead>
      <tbody>${rows}</tbody>
    </table>

            :`<span style="width:46px;height:46px;border-radius:12px;border:1px solid ${ac};color:${ac};display:inline-flex;align-items:center;justify-content:center;font-family:'Bodoni Moda',serif;font-size:21px">${(c.title||'L').charAt(0)}</span>`}

            <div style="font-family:'Bodoni Moda',serif;font-size:10px;letter-spacing:.24em;color:${ac};margin-top:3px">LUMA BEAUTY SYSTEMS</div></div>

          ${c.vatno?`<div style="font-size:10px;color:#8d8172;margin-top:2px">الرقم الضريبي: <bdo dir="ltr">${c.vatno}</bdo></div>`:''}</div>

      </div>
      <table style="width:100%;font-size:13px;border-collapse:collapse;margin-top:6px">
        <tr style="color:${ac};font-size:11.5px"><td style="padding:9px 0">الخدمة</td><td style="text-align:left">المبلغ</td></tr>
        <tr style="border-top:1px solid #efe8db"><td style="padding:9px 0">${a.service}</td><td style="text-align:left" dir="ltr">${p.amount.toFixed(2)} SAR</td></tr>
        <tr style="border-top:1px solid #efe8db;color:#54473a;font-size:12px"><td style="padding:8px 0">ضريبة القيمة المضافة (15٪)</td><td style="text-align:left" dir="ltr">${p.vat.toFixed(2)} SAR</td></tr>
        ${p.tip?`<tr style="color:#54473a;font-size:12px"><td style="padding:8px 0">بقشيش الموظفة</td><td style="text-align:left" dir="ltr">${p.tip.toFixed(2)} SAR</td></tr>`:''}
        <tr style="border-top:2px solid ${ac};font-weight:700;font-size:15px"><td style="padding:11px 0">الإجمالي المدفوع · ${p.method}</td><td style="text-align:left;color:${ac}" dir="ltr">${p.total.toFixed(2)} SAR</td></tr>
      </table>
      <div style="text-align:center;font-size:11px;color:#8d8172;margin-top:16px">شكراً لكِ 🌸 نسعد بزيارتك دائماً${c.slug?` · luma.beauty/${c.slug}`:''}</div>
    </div>`;
  },
  showInvoice(id){

      <div class="lux-foot" style="margin-top:14px">

  addStaff(editId){
    const roles=['مكياج','شعر','بشرة','أظافر','رموش','سبا'];
    const NATS=['سعودية','مصرية','مغربية','لبنانية','سورية','أردنية','فلبينية','إندونيسية','هندية','باكستانية','أخرى'];

    const p=editId?spOf(editId):{};
    const g=v=>v||'';
    /* مُعرف الموظف: تسلسلي تلقائي (8001، 8002…) */
    const nextEmpId=()=>{const ids=STAFF.map(x=>parseInt(spOf(x.id).empId)||0);return Math.max(8000,...ids)+1;};
    const sect=t=>`<div style="font-size:12.5px;color:var(--gold,#9c8047);font-weight:700;margin:16px 0 10px;padding-bottom:7px;border-bottom:1px solid var(--line,#26242d)">${t}</div>`;
    const body=`
      <div class="lux-lead">لبداية دقيقة 💪 تأكدي من دقة جميع بيانات الموظفة لتفادي أي مشكلات في الوصول أو الرواتب.</div>
