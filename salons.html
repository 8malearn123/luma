<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<link rel="icon" href="favicon.svg" type="image/svg+xml"/>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#0C0B0E"/>
<script src="luma-store.js"></script>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>سوق لوما — الصوالين والمراكز</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Cairo:wght@200;300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0e0d11; --bg2:#0b0a0d; --panel:#141319; --panel2:#19181e; --panel3:#1b1a21;
    --gold:#937842; --gold-light:#caa85f; --gold-pale:#e3c98f; --gold-deep:#7c6335;
    --white:#f6f2ec; --cream:#f0ebe0; --muted:#7c7783; --muted-deep:#4f4c57; --line:#1e1d24;
  }
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--white);font-family:'IBM Plex Sans Arabic','Cairo',sans-serif;font-weight:300;line-height:1.7;-webkit-font-smoothing:antialiased;}
  .mono{font-family:'IBM Plex Mono',monospace;letter-spacing:0.2em;text-transform:uppercase;direction:ltr;}
  .gold-fill{background:linear-gradient(120deg,#dbbd81,#caa85f 30%,#937842 55%,#caa85f 80%,#dbbd81);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;}
  ::selection{background:var(--gold);color:#fff;} a{color:inherit;text-decoration:none;}
  .wrap{max-width:1320px;margin:0 auto;padding:0 40px;}
  @media(max-width:680px){.wrap{padding:0 20px;}}
  .btn{font-family:'IBM Plex Sans Arabic','Cairo',sans-serif;font-weight:500;font-size:14px;padding:11px 26px;border-radius:3px;cursor:pointer;border:none;transition:all .3s;white-space:nowrap;}
  .btn-ghost{background:transparent;border:1px solid var(--gold-deep);color:var(--gold-light);} .btn-ghost:hover{background:rgba(147,115,53,0.12);border-color:var(--gold-light);}
  .btn-gold{background:linear-gradient(120deg,#dbbd81,#caa85f 45%,#937842);color:#0e0d11;} .btn-gold:hover{filter:brightness(1.08);}

  .nav{position:sticky;top:0;z-index:80;display:flex;align-items:center;justify-content:space-between;padding:16px 40px;background:rgba(11,10,8,0.9);backdrop-filter:blur(20px);border-bottom:0.5px solid var(--line);}
  .nav .brand{font-family:'Bodoni Moda',serif;font-weight:400;font-size:24px;letter-spacing:0.26em;color:var(--gold-light);direction:ltr;}
  .nav .links{display:flex;gap:26px;align-items:center;}
  .nav .links a{font-size:14px;color:var(--cream);transition:color .25s;} .nav .links a:hover,.nav .links a.active{color:var(--gold-light);}
  @media(max-width:820px){.nav .links{display:none;}.nav{padding:14px 20px;}}

  .mhead{position:relative;padding:50px 0 30px;overflow:hidden;border-bottom:0.5px solid var(--line);}
  .mhead .lattice{position:absolute;inset:0;opacity:0.18;}
  .mhead .glow{position:absolute;inset:0;background:radial-gradient(ellipse 60% 100% at 80% 0%,rgba(147,115,53,0.12),transparent 60%);}
  .mhead-inner{position:relative;z-index:2;}
  .crumb{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.18em;color:var(--muted);direction:ltr;margin-bottom:14px;}
  .crumb a{color:var(--gold-pale);} .crumb a:hover{color:var(--gold-light);}
  .mhead .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.22em;color:var(--gold);direction:ltr;margin-bottom:12px;}
  .mhead h1{font-family:'IBM Plex Sans Arabic','Cairo',sans-serif;font-weight:600;font-size:clamp(28px,4.4vw,46px);line-height:1.15;color:var(--white);}
  .mhead h1 .badge{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--gold-light);vertical-align:middle;margin-left:8px;}
  .mhead p{font-size:15px;color:var(--gold-pale);margin-top:12px;max-width:54ch;}

  .chips{display:flex;gap:9px;flex-wrap:wrap;padding:24px 0 4px;}
  .chip{font-family:'IBM Plex Sans Arabic','Cairo',sans-serif;font-size:13px;color:var(--cream);background:var(--panel);border:0.5px solid var(--line);padding:9px 18px;border-radius:30px;cursor:pointer;transition:all .25s;}
  .chip:hover{border-color:var(--gold-deep);color:var(--gold-light);}
  .chip.active{background:linear-gradient(120deg,#dbbd81,#937842);border-color:transparent;color:#0e0d11;font-weight:600;}

  .reshead{display:flex;justify-content:space-between;align-items:center;margin:22px 0;flex-wrap:wrap;gap:12px;}
  .reshead .count{font-size:14.5px;color:var(--gold-pale);} .reshead .count b{color:var(--gold-light);font-family:'Bodoni Moda',serif;font-size:21px;margin:0 5px;direction:ltr;display:inline-block;}
  .sortsel{background:var(--panel);border:0.5px solid var(--line);color:var(--white);font-family:'IBM Plex Sans Arabic','Cairo',sans-serif;font-size:13.5px;padding:11px 16px;border-radius:4px;cursor:pointer;outline:none;}

  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding-bottom:80px;}
  @media(max-width:1100px){.grid{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:620px){.grid{grid-template-columns:1fr;}}
  .card{position:relative;border:0.5px solid var(--line);background:linear-gradient(168deg,var(--panel2),var(--panel));border-radius:8px;overflow:hidden;cursor:pointer;transition:border-color .35s,transform .35s,box-shadow .35s;display:flex;flex-direction:column;text-align:right;}
  .card:hover{border-color:var(--gold-deep);transform:translateY(-5px);box-shadow:0 22px 50px rgba(0,0,0,0.45);}
  .card .cover{position:relative;height:150px;display:flex;align-items:center;justify-content:center;overflow:hidden;border-bottom:0.5px solid var(--line);}
  .card .cover .pat{position:absolute;inset:0;opacity:0.45;}
  .card .logo{position:relative;z-index:2;width:64px;height:64px;border-radius:16px;background:linear-gradient(140deg,#1b1a21,#0c0b0e);border:1px solid var(--gold-deep);display:flex;align-items:center;justify-content:center;font-family:'Bodoni Moda',serif;font-size:30px;color:var(--gold-light);}
  .card .verif{position:absolute;top:13px;right:13px;z-index:3;background:rgba(11,10,8,0.7);backdrop-filter:blur(8px);border:0.5px solid var(--gold-deep);color:var(--gold-light);font-size:11px;padding:5px 11px;border-radius:30px;display:flex;align-items:center;gap:5px;}
  .card .type-badge{position:absolute;top:13px;left:13px;z-index:3;background:rgba(147,115,53,0.18);border:0.5px solid var(--gold-deep);color:var(--gold-pale);font-size:11px;padding:5px 11px;border-radius:6px;}
  .card .body{padding:18px 20px 20px;display:flex;flex-direction:column;gap:4px;flex:1;}
  .card .nm{font-family:'IBM Plex Sans Arabic','Cairo',sans-serif;font-weight:600;font-size:18px;color:var(--white);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .card .loc{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px;margin-top:2px;}
  .card .facts{display:flex;gap:8px;flex-wrap:wrap;margin:13px 0;}
  .card .facts span{font-size:11.5px;color:var(--gold-pale);border:0.5px solid var(--line);padding:5px 11px;border-radius:6px;display:flex;align-items:center;gap:6px;}
  .card .tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;}
  .card .tags span{font-size:11px;color:var(--muted);}
  .card .foot{margin-top:auto;padding-top:15px;border-top:0.5px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
  .card .rating{display:flex;align-items:center;gap:6px;font-size:13.5px;color:var(--cream);} .card .rating .star{color:var(--gold-light);} .card .rating .cnt{color:var(--muted);font-size:12px;}
  .card .price{text-align:left;} .card .price .from{font-size:11px;color:var(--muted);} .card .price .v{font-family:'Bodoni Moda',serif;font-size:23px;color:var(--gold-light);direction:ltr;line-height:1;} .card .price .v .u{font-family:'IBM Plex Sans Arabic','Cairo',sans-serif;font-size:11px;color:var(--muted);}
  .card .cta{margin:14px 20px 0;}
  .card .cta .btn{width:100%;text-align:center;}
  .card .body .cta{margin:14px 0 0;}

  footer{padding:40px;border-top:0.5px solid var(--line);background:var(--bg2);text-align:center;} footer .ar{font-size:12px;color:var(--muted-deep);}
</style>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <pattern id="lat" width="84" height="84" patternUnits="userSpaceOnUse"><g fill="none" stroke="#937842" stroke-width="1"><circle cx="0" cy="0" r="42"/><circle cx="84" cy="0" r="42"/><circle cx="0" cy="84" r="42"/><circle cx="84" cy="84" r="42"/><circle cx="42" cy="42" r="42"/></g></pattern>
</defs></svg>

<nav class="nav">
  <div class="brand"><a href="index.html">LUMA</a></div>
  <div class="links">
    <a href="index.html">الرئيسية</a>
    <a href="market.html">سوق لوما</a>
    <a href="store.html">الفنانات</a>
    <a href="#" class="active">الصوالين</a>
    <a href="store.html">المنتجات</a>
  </div>
  <a class="btn btn-ghost" href="login.html">تسجيل الدخول</a>
</nav>

<header class="mhead">
  <div class="lattice"><svg width="100%" height="100%"><rect width="100%" height="100%" fill="url(#lat)"/></svg></div>
  <div class="glow"></div>
  <div class="wrap mhead-inner">
    <div class="crumb"><a href="market.html">سوق لوما</a> / الصوالين</div>
    <div class="eyebrow">⬢ SALONS &amp; CENTERS</div>
    <h1>الصوالين والمراكز <span class="badge">منشآت معتمدة</span></h1>
    <p>صوالين ومراكز تجميل بعدة خبيرات وفروع — اختاري الصالون، ثم الخدمة والموظفة والفرع.</p>
    <div class="chips" id="chips"></div>
  </div>
</header>

<div class="wrap">
  <div class="reshead">
    <div class="count"><b id="rcount">0</b> صالون معتمد</div>
    <select class="sortsel" id="sort" onchange="render()">
      <option value="rec">الأكثر ملاءمة</option>
      <option value="rating">الأعلى تقييماً</option>
      <option value="reviews">الأكثر زيارة</option>
      <option value="branches">الأكثر فروعاً</option>
    </select>
  </div>
  <div class="grid" id="grid"></div>
</div>

<footer><span class="ar">جميع الحقوق محفوظة لشركة قمة كود · سوق الصوالين</span></footer>

<script>
const CATS=['الكل','متكامل','بشرة','شعر','أظافر','سبا'];
const SALONS=[
  {n:'صالون لمسة',cat:'متكامل',city:'جدة · الشاطئ',rating:4.9,reviews:512,from:200,verified:true,branches:2,staff:4,tags:['مكياج','شعر','بشرة','أظافر']},
  {n:'مركز إشراقة',cat:'بشرة',city:'الرياض · العليا',rating:4.8,reviews:389,from:280,verified:true,branches:1,staff:6,tags:['ليزر','هيدرافيشل']},
  {n:'استوديو نون',cat:'شعر',city:'الدمام',rating:4.7,reviews:264,from:180,verified:true,branches:1,staff:5,tags:['صبغات','تسريحات']},
  {n:'صالون رؤى',cat:'متكامل',city:'جدة · الروضة',rating:4.9,reviews:431,from:220,verified:true,branches:3,staff:9,tags:['عرائس','سبا','مكياج']},
  {n:'مركز لازوردي',cat:'سبا',city:'الرياض',rating:5.0,reviews:178,from:350,verified:true,branches:2,staff:7,tags:['مساج','عناية']},
  {n:'صالون ضي',cat:'أظافر',city:'مكة',rating:4.6,reviews:142,from:150,verified:false,branches:1,staff:3,tags:['منيكير','تركيب']},
  {n:'مركز بلورة',cat:'بشرة',city:'جدة',rating:4.8,reviews:206,from:260,verified:true,branches:2,staff:5,tags:['تنظيف','تقشير']},
  {n:'صالون ألق',cat:'متكامل',city:'جازان',rating:4.7,reviews:158,from:190,verified:true,branches:1,staff:4,tags:['مكياج','شعر']},
  {n:'مركز ورود',cat:'سبا',city:'الدمام',rating:4.9,reviews:97,from:320,verified:true,branches:1,staff:6,tags:['سبا','عناية','مساج']},
];
let state={cat:'الكل'};
document.getElementById('chips').innerHTML=CATS.map(c=>`<span class="chip ${c===state.cat?'active':''}" onclick="setCat('${c}')">${c}</span>`).join('');
function setCat(c){state.cat=c;document.querySelectorAll('.chip').forEach(el=>el.classList.toggle('active',el.textContent===c));render();}
function render(){
  let list=SALONS.filter(s=>state.cat==='الكل'||s.cat===state.cat);
  const sort=document.getElementById('sort').value;
  if(sort==='rating')list.sort((a,b)=>b.rating-a.rating);
  else if(sort==='reviews')list.sort((a,b)=>b.reviews-a.reviews);
  else if(sort==='branches')list.sort((a,b)=>b.branches-a.branches);
  else list.sort((a,b)=>(b.rating*b.reviews)-(a.rating*a.reviews));
  document.getElementById('rcount').textContent=list.length;
  document.getElementById('grid').innerHTML=list.map(s=>{
    const link='experience.html?name='+encodeURIComponent(s.n)+'&role='+encodeURIComponent('صالون · '+s.cat)+'&city='+encodeURIComponent(s.city);
    return `<a class="card" href="${link}">
      <div class="cover">
        <div class="pat"><svg width="100%" height="100%"><rect width="100%" height="100%" fill="url(#lat)"/></svg></div>
        <span class="logo">${s.n.replace('صالون ','').replace('مركز ','').replace('استوديو ','').charAt(0)}</span>
        <span class="type-badge">⬢ ${s.cat}</span>
        ${s.verified?'<span class="verif">◆ معتمد</span>':''}
      </div>
      <div class="body">
        <div class="nm">${s.n}</div>
        <div class="loc">⌖ ${s.city}</div>
        <div class="facts">
          <span>⬢ ${s.branches} ${s.branches===1?'فرع':'فروع'}</span>
          <span>● ${s.staff} خبيرات</span>
        </div>
        <div class="tags"><span>${s.tags.join(' · ')}</span></div>
        <div class="foot">
          <div class="rating"><span class="star">★</span> ${s.rating.toFixed(1)} <span class="cnt">(${s.reviews})</span></div>
          <div class="price"><div class="from">خدمات تبدأ من</div><div class="v">${s.from} <span class="u">ر.س</span></div></div>
        </div>
        <div class="cta"><span class="btn btn-gold">اعرضي الصالون ←</span></div>
      </div>
    </a>`;
  }).join('');
}
render();
</script>
<script src="luma-theme.js"></script>
</body>
</html>
