<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#131217; --bg2:#0c0b0e; --surface:#18171d; --surface2:#1b1a21; --surface3:#201f26;
    --gold:#9c8047; --gold-light:#ccab64; --gold-bright:#dbbd81; --gold-pale:#e6ce95; --gold-deep:#846a38;
    --white:#f6f2ec; --cream:#ece6da; --muted:#86818d; --muted-deep:#58545f;
    --line:#26242d; --line-soft:#1e1d24; --green:#6fa86a; --rose:#d98a93;
  }
  body{background:radial-gradient(ellipse at 50% 0%,#1f1812,#0c0b0e 70%);min-height:100vh;font-family:'IBM Plex Sans Arabic','Cairo',sans-serif;color:var(--white);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:34px 16px;}
  .serif{font-family:'Bodoni Moda',serif;}
  .mono{font-family:'IBM Plex Mono',monospace;letter-spacing:0.2em;direction:ltr;}
  .num{font-family:'Bodoni Moda',serif;font-weight:500;direction:ltr;}
  .gold-fill{background:linear-gradient(120deg,#dbbd81,#ccab64 35%,#9c8047);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  ::selection{background:var(--gold);color:#131217;}
  .head-brand{text-align:center;}
  .head-brand .b{font-family:'Bodoni Moda',serif;font-size:26px;letter-spacing:0.3em;color:var(--gold-light);direction:ltr;}
  .head-brand .s{font-size:12px;color:var(--muted);margin-top:3px;}

  /* phone */
  .phone{width:380px;max-width:94vw;height:760px;max-height:88vh;border-radius:46px;background:#0c0b0e;border:1px solid var(--line);padding:12px;box-shadow:0 40px 90px rgba(0,0,0,0.6);position:relative;}
  .phone .notch{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:130px;height:28px;background:#0c0b0e;border-radius:0 0 18px 18px;z-index:20;}
  .scr{width:100%;height:100%;border-radius:34px;overflow:hidden;position:relative;background:var(--bg);display:flex;flex-direction:column;}
  .status{height:46px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 6px;font-size:13px;color:var(--cream);flex-shrink:0;}
  .status .r{display:flex;gap:6px;align-items:center;}
  .view{flex:1;overflow-y:auto;padding:6px 18px 90px;}
  .view::-webkit-scrollbar{width:0;}
  .tabbar{position:absolute;bottom:0;left:0;right:0;height:78px;background:rgba(14,10,7,0.92);backdrop-filter:blur(16px);border-top:1px solid var(--line);display:flex;align-items:flex-start;padding:12px 14px 0;z-index:15;border-radius:0 0 34px 34px;}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;color:var(--muted);transition:color .2s;background:none;border:none;font-family:'IBM Plex Sans Arabic','Cairo',sans-serif;}
  .tab .ic{width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
  .tab .lb{font-size:10.5px;}
  .tab.on{color:var(--gold-light);}

  /* shared */
  .greet{padding:8px 4px 4px;}
  .greet .d{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:0.14em;color:var(--gold);direction:ltr;}
  .greet .h{font-family:'IBM Plex Sans Arabic','Cairo',sans-serif;font-weight:600;font-size:23px;color:var(--white);margin-top:6px;}
  .greet .h .w{color:var(--gold-light);}
  .greet .s{font-size:13px;color:var(--gold-pale);margin-top:3px;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px;}
  .seclab{display:flex;align-items:center;justify-content:space-between;margin:22px 0 12px;}
  .seclab .t{font-family:'IBM Plex Sans Arabic','Cairo',sans-serif;font-weight:600;font-size:15px;color:var(--white);}
  .seclab .m{font-size:12px;color:var(--gold-light);cursor:pointer;}
  .avc{border-radius:50%;background:linear-gradient(140deg,#201f26,#18171d);border:1px solid var(--gold-deep);display:flex;align-items:center;justify-content:center;font-family:'Bodoni Moda',serif;color:var(--gold-light);flex-shrink:0;}
  .stars{color:var(--gold-light);letter-spacing:1px;}
  .badge{font-size:11px;padding:4px 11px;border-radius:20px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
  .badge.gold{color:var(--gold-light);background:rgba(156,124,58,0.16);border:0.5px solid var(--gold-deep);}
  .badge.green{color:var(--green);background:rgba(111,168,106,0.14);}
  .badge.soft{color:var(--muted);background:var(--surface3);}
  .gbtn{width:100%;border:none;border-radius:12px;padding:15px;cursor:pointer;font-family:'IBM Plex Sans Arabic','Cairo',sans-serif;font-weight:600;font-size:14.5px;color:#131217;background:linear-gradient(120deg,#dbbd81,#ccab64 45%,#9c8047);box-shadow:0 8px 22px rgba(156,124,58,0.25);}
  .ghbtn{width:100%;border:1px solid var(--line);border-radius:12px;padding:14px;cursor:pointer;font-family:'IBM Plex Sans Arabic','Cairo',sans-serif;font-weight:500;font-size:14px;color:var(--gold-pale);background:none;}
  .lat{position:absolute;inset:0;opacity:0.4;}
  .fade{animation:fd .4s ease both;}@keyframes fd{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  @media(prefers-reduced-motion:reduce){.fade{animation:none;}}
  .reset{font-size:12px;color:var(--gold-pale);background:none;border:1px solid var(--line);border-radius:30px;padding:9px 22px;cursor:pointer;font-family:'IBM Plex Sans Arabic','Cairo',sans-serif;}
</style>

  help:'<circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 015 .3c0 1.7-2.5 2-2.5 3.7"/><circle cx="12" cy="17" r="0.6" fill="currentColor"/>',
  out:'<path d="M14 21H5a2 2 0 01-2-2V5a2 2 0 012-2h9"/><path d="M18 16l4-4-4-4M22 12H9"/>',

  whatsapp:'<path d="M3.5 20.5l1.4-4.1A8.5 8.5 0 1112 20.5a8.4 8.4 0 01-3.8-.9z"/><path d="M8.8 9.2c.7 1.9 2.1 3.3 4 4 .5.2.9 0 1.2-.4"/>',
};
const icon=(n,s=22)=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${IC[n]||''}</svg>`;
const stars=(r,sz=12)=>{let s='';for(let i=1;i<=5;i++)s+=`<span style="color:${i<=r?'#ccab64':'#26242d'};font-size:${sz}px">★</span>`;return s;}
const av=(n,sz=44,fs=18)=>`<span class="avc" style="width:${sz}px;height:${sz}px;font-size:${fs}px">${n.charAt(0)}</span>`;

/* DATA */
const NEXT={pr:'رهف العتيبي',role:'خبيرة مكياج',s:'مكياج سهرة',date:'الإثنين ٢٢ يونيو',time:'7:00 م',city:'جدة'};

];

  {n:'لمياء الزهراني',role:'بشرة · الرياض',r:5.0,from:280},
  {n:'نورة القحطاني',role:'شعر · جازان',r:4.8,from:220},
  {n:'ريم العنزي',role:'رموش · الدمام',r:5.0,from:190},
];
const RECO=[
  {n:'دانة الشهري',role:'مكياج · الرياض',r:4.7,from:380},
  {n:'غادة الفيفي',role:'تصوير · جازان',r:4.9,from:550},
];

/* SCREENS */
function tile(h){return `<div style="height:${h}px;border-radius:11px;background:linear-gradient(150deg,#2a2218,#131217);border:1px solid var(--line);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center"><svg class="lat" width="100%" height="100%"><rect width="100%" height="100%" fill="url(#clat)"/></svg><span style="position:relative;color:var(--gold-deep)">◆</span></div>`;}
function expertCard(e){return `<div class="card" style="display:flex;align-items:center;gap:13px;margin-bottom:11px;cursor:pointer">${av(e.n,48,20)}<div style="flex:1;min-width:0"><div style="font-size:15px;color:var(--white);font-weight:600">${e.n}</div><div style="font-size:12.5px;color:var(--gold-pale);margin-top:1px">${e.role}</div><div style="display:flex;align-items:center;gap:6px;margin-top:6px;font-size:12px;color:var(--cream)">${stars(Math.round(e.r))} ${e.r}</div></div><div style="text-align:left"><div style="font-size:10px;color:var(--muted)">يبدأ من</div><div class="num" style="font-size:18px;color:var(--gold-light)">${e.from} <span style="font-family:'IBM Plex Sans Arabic',Cairo;font-size:10px;color:var(--muted)">ر.س</span></div></div></div>`;}
/* ── دليل المزوّدات الكامل (نفس بيانات المتجر) للاستكشاف داخل التطبيق ── */
const PROVIDERS=[
  {type:'expert',n:'رهف العتيبي',role:'خبيرة مكياج',city:'جدة',rating:4.9,reviews:213,price:350,cat:'مكياج',tags:['عرائس','سهرات']},
  {type:'expert',n:'لمياء الزهراني',role:'أخصائية بشرة',city:'الرياض',rating:5.0,reviews:98,price:280,cat:'بشرة',tags:['هيدرافيشل']},

  {type:'expert',n:'جواهر الدوسري',role:'فنانة أظافر',city:'جدة',rating:4.9,reviews:142,price:160,cat:'أظافر',tags:['جل','رسم فني']},
  {type:'expert',n:'سارة الغامدي',role:'مصورة بورتريه',city:'مكة',rating:4.8,reviews:76,price:600,cat:'تصوير',tags:['نسائي','مناسبات']},
  {type:'expert',n:'ريم العنزي',role:'فنية رموش',city:'الدمام',rating:5.0,reviews:121,price:190,cat:'رموش',tags:['كلاسيك','حجم روسي']},
  {type:'expert',n:'وجدان الحربي',role:'خبيرة شعر',city:'جدة',rating:4.9,reviews:203,price:300,cat:'شعر',tags:['كيراتين','قص']},
  {type:'expert',n:'أمل السبيعي',role:'خبيرة مكياج',city:'الدمام',rating:4.7,reviews:134,price:380,cat:'مكياج',tags:['سهرات','تخرّج']},
  {type:'salon',n:'صالون لمسة',role:'صالون متكامل',city:'جدة · الشاطئ',rating:4.9,reviews:512,price:200,cat:'متكامل',branches:2,staff:4,tags:['مكياج','شعر','بشرة'],live:true},
  {type:'salon',n:'مركز إشراقة',role:'مركز عناية بالبشرة',city:'الرياض · العليا',rating:4.8,reviews:389,price:280,cat:'بشرة',branches:1,staff:6,tags:['ليزر','هيدرافيشل']},
  {type:'salon',n:'صالون رؤى',role:'صالون نسائي شامل',city:'جدة · الروضة',rating:4.9,reviews:431,price:220,cat:'متكامل',branches:3,staff:9,tags:['عرائس','سبا']},
  {type:'salon',n:'مركز لازوردي',role:'سبا ومركز تجميل',city:'الرياض',rating:5.0,reviews:178,price:350,cat:'سبا',branches:2,staff:7,tags:['مساج','عناية']},
  {type:'salon',n:'استوديو نون',role:'صالون شعر ومكياج',city:'الدمام',rating:4.7,reviews:264,price:180,cat:'شعر',branches:1,staff:5,tags:['صبغات','تسريحات']},
  {type:'salon',n:'الجوهرة سبأ',role:'صالون نسائي متكامل',city:'جازان · صبيا',rating:4.8,reviews:87,price:150,cat:'متكامل',branches:2,staff:5,tags:['مكياج','شعر','عرائس'],offer:{pct:30,occ:'التخرج'}},
  {type:'salon',n:'صالون ضي',role:'صالون أظافر وعناية',city:'مكة',rating:4.6,reviews:142,price:150,cat:'أظافر',branches:1,staff:3,tags:['منيكير','تركيب']},
];
function providerURL(p){
  if(p.type==='salon')return p.live?'booking.html':'experience.html?name='+encodeURIComponent(p.n)+'&type=salon&role='+encodeURIComponent('صالون · '+p.cat)+'&city='+encodeURIComponent(p.city);
  return 'experience.html?name='+encodeURIComponent(p.n)+'&role='+encodeURIComponent(p.role)+'&city='+encodeURIComponent(p.city.split('·')[0].trim());
}

/* ── الحجز من تطبيق العميلة: روابط حجز فعلية للصوالين والخبيرات ── */
const BOOK_SALONS=[
  {n:'صالون لمسة',role:'صالون متكامل',city:'جدة · الشاطئ',live:true},
  {n:'الجوهرة سبأ',role:'صالون نسائي متكامل',city:'جازان · صبيا',offer:'🎓 خصم 30%'},

function salonBookURL(x){
  if(x.live)return 'booking.html';   /* صفحة صالون لمسة الحية — حجزها يصل للوحة الصالون */
  return 'experience.html?name='+encodeURIComponent(x.n)+'&type=salon&role='+encodeURIComponent('صالون · '+x.role)+'&city='+encodeURIComponent(x.city);
}
function expertBookURL(e){
  const parts=String(e.role||'').split('·').map(s=>s.trim());
  return 'experience.html?name='+encodeURIComponent(e.n)+'&role='+encodeURIComponent('خبيرة '+(parts[0]||'تجميل'))+'&city='+encodeURIComponent(parts[1]||'جدة');
}
/* WhatsApp is the client's main channel on LUMA */
function waLink(msg){return 'https://wa.me/966501234567?text='+encodeURIComponent(msg);}
function waBtn(msg,label){return `<a href="${waLink(msg)}" target="_blank" rel="noopener" style="display:flex;align-items:center;justify-content:center;gap:8px;background:#25D366;color:#06351c;font-family:'IBM Plex Sans Arabic','Cairo',sans-serif;font-weight:600;font-size:13px;border-radius:9px;padding:11px;text-decoration:none;margin-top:12px">${icon('whatsapp',16)} ${label||'تواصل عبر واتساب'}</a>`;}

/* ── استكشفي: دليل كامل بالفلاتر داخل التطبيق (نفس الموقع) ── */
function exFiltered(){
  return PROVIDERS.filter(p=>
    (CLI.ftype==='all'||p.type===CLI.ftype)&&
    (CLI.fcat==='all'||p.cat===CLI.fcat)&&
    (CLI.fcity==='all'||p.city.startsWith(CLI.fcity))&&
    (!CLI.q||(p.n+' '+p.role+' '+p.city+' '+(p.tags||[]).join(' ')).includes(CLI.q)));
}
function exCard(p){
  const isS=p.type==='salon';
  const eff=p.offer?Math.round(p.price*(100-p.offer.pct)/100):p.price;
  return `<div class="card" style="margin-bottom:11px;padding:14px">
    <div style="display:flex;align-items:center;gap:12px">

    bg.innerHTML=`
    <style>
      .bk-sheet-bg{position:absolute;inset:0;z-index:60;background:rgba(8,6,10,.62);backdrop-filter:blur(4px);display:flex;align-items:flex-end;opacity:0;transition:opacity .25s}
      .bk-sheet-bg.show{opacity:1}
      .bk-sheet{width:100%;max-height:78%;background:var(--surface);border:1px solid var(--line);border-bottom:none;border-radius:24px 24px 0 0;padding:14px 18px 20px;overflow-y:auto;transform:translateY(40px);transition:transform .3s cubic-bezier(.2,1.2,.4,1)}
      .bk-sheet-bg.show .bk-sheet{transform:none}
      .bk-grab{width:44px;height:4px;border-radius:4px;background:var(--line);margin:0 auto 14px}
      .bk-row{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line-soft)}
      .bk-row:last-child{border-bottom:none}
      .bk-go{background:linear-gradient(120deg,#dbbd81,#9c8047);color:#131217;font-family:inherit;font-weight:700;font-size:11.5px;border-radius:20px;padding:8px 16px;text-decoration:none;white-space:nowrap}
    </style>
    <div class="bk-sheet">
      <div class="bk-grab"></div>
      <div style="font-size:16.5px;color:var(--white);font-weight:700;margin-bottom:2px">حجز جديد ✨</div>
      <div style="font-size:12px;color:var(--gold-pale);margin-bottom:12px">اختاري وجهتك — صالوناً أو خبيرتك المفضلة</div>
      <div class="seclab" style="margin-top:4px"><span class="t">الصوالين</span></div>
      ${BOOK_SALONS.map(x=>`<div class="bk-row">${av(x.n.replace('صالون ','').replace('مركز ','').replace('استوديو ',''),40,16)}
        <div style="flex:1;min-width:0"><div style="font-size:13.5px;color:var(--white);font-weight:600">${x.n} ${x.offer?`<span style="font-size:9.5px;color:#fff;background:linear-gradient(120deg,#d98a93,#b25a6c);border-radius:12px;padding:2px 8px">${x.offer}</span>`:''}</div>
        <div style="font-size:11px;color:var(--muted)">${x.role} · ${x.city}</div></div>
        <a class="bk-go" href="${salonBookURL(x)}" target="_blank" rel="noopener">احجزي ←</a></div>`).join('')}
      <div class="seclab"><span class="t">خبيراتكِ المفضلات</span></div>
      ${FAVS.map(e=>`<div class="bk-row">${av(e.n,40,16)}
        <div style="flex:1;min-width:0"><div style="font-size:13.5px;color:var(--white);font-weight:600">${e.n}</div>
        <div style="font-size:11px;color:var(--muted)">${e.role} · من ${e.from} ر.س</div></div>
        <a class="bk-go" href="${expertBookURL(e)}" target="_blank" rel="noopener">احجزي ←</a></div>`).join('')}
    </div>`;
    bg.addEventListener('click',e=>{if(e.target===bg){bg.classList.remove('show');setTimeout(()=>bg.remove(),250);}});
    scr.appendChild(bg);
    requestAnimationFrame(()=>bg.classList.add('show'));
  },
};
window.CLI=CLI;
document.getElementById('tabbar').innerHTML=TABS.map(t=>`<button class="tab" data-t="${t[0]}" onclick="CLI.go('${t[0]}')"><span class="ic">${icon(t[2],23)}</span><span class="lb">${t[1]}</span></button>`).join('');
CLI.go((()=>{try{return localStorage.getItem('luma_cli_tab')||'home';}catch(e){return 'home';}})());
</script>
<script src="luma-ui.js"></script>
<script src="luma-theme.js"></script>
<script src="luma-i18n.js"></script>
