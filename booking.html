<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<link rel="icon" href="favicon.svg" type="image/svg+xml"/>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#0C0B0E"/>
<script src="luma-store.js"></script>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LUMA — احجزي موعدك</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&family=Bodoni+Moda:opsz,wght@6..96,500&display=swap" rel="stylesheet" media="print" onload="this.media='all'"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#09090b;--card:#151517;--ac:#e5c158;--tx:#f5f1e8}
  body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
  .wrap{max-width:430px;margin:0 auto;padding-bottom:40px}
  .cover{position:relative;height:150px;background:linear-gradient(140deg,color-mix(in srgb,var(--ac) 25%,transparent),var(--bg))}
  .cover img{width:100%;height:100%;object-fit:cover}
  .logo{position:absolute;bottom:-26px;right:18px;width:58px;height:58px;border-radius:16px;border:1px solid var(--ac);background:var(--card);color:var(--ac);display:flex;align-items:center;justify-content:center;font-family:'Bodoni Moda',serif;font-size:24px;overflow:hidden}
  .logo img{width:100%;height:100%;object-fit:cover}
  .head{padding:36px 18px 8px}
  .head h1{font-size:19px}
  .head .bio{font-size:11.5px;opacity:.65;line-height:1.8;margin-top:4px}
  .head .meta{font-size:10.5px;opacity:.45;margin-top:4px}
  .gal{padding:2px 0 10px}
  .gal .gal-t{font-size:12px;color:var(--ac);font-weight:700;margin-bottom:9px}
  .gal-row{display:flex;gap:9px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none}
  .gal-row::-webkit-scrollbar{display:none}
  .gal-it{flex:0 0 auto;width:104px;height:104px;border-radius:var(--rad,16px);overflow:hidden;border:1px solid rgba(128,128,128,.22);background:var(--card);position:relative;padding:0;cursor:pointer}
  .gal-it img{width:100%;height:100%;object-fit:cover;display:block}
  .gal-it .vid{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);color:#fff;font-size:24px}
  .gal-lb{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;padding:20px}
  .gal-lb img,.gal-lb video{max-width:94vw;max-height:82vh;border-radius:14px}
  .gal-lb iframe{width:min(94vw,760px);aspect-ratio:16/9;border:none;border-radius:14px}
  .gal-lb .gx{position:absolute;top:16px;right:16px;width:38px;height:38px;border-radius:50%;border:none;background:rgba(255,255,255,.14);color:#fff;font-size:17px;cursor:pointer}
  .wpop{position:fixed;inset:0;z-index:70;background:rgba(8,6,10,.66);backdrop-filter:blur(7px);display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;transition:opacity .25s}
  .wpop.show{opacity:1}
  .wpop .wcard{position:relative;width:360px;max-width:92vw;background:var(--card);color:var(--tx);border:1px solid color-mix(in srgb,var(--ac) 40%,transparent);border-radius:calc(var(--rad,16px) + 6px);padding:34px 26px 26px;text-align:center;box-shadow:0 34px 90px rgba(0,0,0,.55);transform:translateY(14px) scale(.97);transition:transform .3s cubic-bezier(.2,1.4,.4,1)}
  .wpop.show .wcard{transform:none}
  .wpop .wx{position:absolute;top:12px;left:12px;width:28px;height:28px;border-radius:50%;border:none;background:rgba(128,128,128,.18);color:var(--tx);cursor:pointer;font-size:12px;line-height:1}
  .wpop .wlogo{width:56px;height:56px;border-radius:16px;border:1px solid var(--ac);color:var(--ac);display:flex;align-items:center;justify-content:center;font-family:'Bodoni Moda',serif;font-size:25px;margin:0 auto 12px}
  .wpop .wsalon{font-size:11px;color:var(--ac);font-weight:700;letter-spacing:.04em;margin-bottom:8px}
  .wpop .wmsg{font-size:15.5px;font-weight:600;line-height:2;color:var(--tx)}
  .wpop .wok{width:100%;margin-top:20px;border:none;border-radius:calc(var(--rad,16px) - 2px);padding:13px;background:var(--ac);color:var(--bg);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer}
  .feat{display:inline-block;font-size:9.5px;font-weight:700;color:var(--bg);background:var(--ac);border-radius:20px;padding:2px 9px;margin-bottom:5px}
  .mapc{background:var(--card);border:1px solid rgba(128,128,128,.18);border-radius:var(--rad,16px);padding:15px 16px;margin-top:20px}
  .mapc .mt{font-size:12px;color:var(--ac);font-weight:700;margin-bottom:10px}
  .mapc .mapf{width:100%;height:210px;border:none;border-radius:calc(var(--rad,16px) - 5px);background:rgba(128,128,128,.08)}
  .policy{background:var(--card);border:1px solid rgba(128,128,128,.18);border-radius:var(--rad,16px);padding:15px 16px;margin-top:20px}
  .policy.compact{margin-top:14px;font-size:11px}
  .policy .pt{font-size:12px;color:var(--ac);font-weight:700;margin-bottom:9px}
  .policy .pl{display:flex;gap:8px;font-size:11.8px;opacity:.78;line-height:2}
  .policy .pl span{color:var(--ac);font-size:8px;line-height:2.6}
  .aboutBtn{margin-right:6px;border:1px solid color-mix(in srgb,var(--ac) 55%,transparent);background:color-mix(in srgb,var(--ac) 10%,transparent);color:var(--ac);border-radius:20px;padding:3px 12px;font-family:inherit;font-size:10.5px;font-weight:700;cursor:pointer;vertical-align:1px}
  .wpop .wabout p:last-child{margin-bottom:0}
  .socs{display:flex;gap:9px;margin-top:11px}
  .soc{width:34px;height:34px;border-radius:50%;border:1px solid color-mix(in srgb,var(--ac) 45%,transparent);color:var(--ac);display:flex;align-items:center;justify-content:center;transition:transform .15s,background .2s}
  .soc:hover{transform:translateY(-2px);background:color-mix(in srgb,var(--ac) 14%,transparent)}
  .prog{display:flex;gap:6px;padding:14px 18px 4px}
  .prog span{height:5px;flex:1;border-radius:5px;background:rgba(255,255,255,.1);transition:background .3s}
  .prog span.on{background:var(--ac)}
  .step{padding:14px 18px}
  .cat{font-size:11.5px;color:var(--ac);font-weight:700;margin:16px 0 8px}
  .svc,.stf{width:100%;text-align:right;background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:var(--rad,16px);padding:14px;margin-bottom:8px;color:var(--tx);font-family:inherit;cursor:pointer;transition:transform .12s,border-color .2s}
  .svc:active{transform:scale(.98)} .svc:hover,.stf:hover{border-color:var(--ac)}
  .svc{display:flex;justify-content:space-between;align-items:center}
  .svc .n{font-size:13.5px;font-weight:600} .svc .d{font-size:10.5px;opacity:.5;margin-top:2px}
  .svc .p{color:var(--ac);font-weight:700;font-size:13.5px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .stf{text-align:center;margin:0}
  .stf .av{width:48px;height:48px;border-radius:50%;border:1px solid var(--ac);color:var(--ac);display:flex;align-items:center;justify-content:center;font-family:'Bodoni Moda',serif;font-size:19px;margin:0 auto 8px}
  .stf .nm{font-size:13.5px;font-weight:700} .stf .rl{font-size:10px;opacity:.55;margin-top:2px}
  .stf.leave{opacity:.5} .stf .lv{font-size:9.5px;color:#f0a3b0;font-weight:700;margin-top:3px}
  .stf.sel{background:var(--ac);color:var(--bg)} .stf.sel .av{border-color:var(--bg);color:var(--bg)}
  .reroute{background:var(--card);border:1px solid color-mix(in srgb,var(--ac) 45%,transparent);border-radius:var(--rad,16px);padding:14px;margin-top:12px;font-size:13px;line-height:1.9}
  .reroute b{color:var(--ac)}
  .btn{width:100%;border:none;border-radius:calc(var(--rad,16px) - 2px);padding:14px;background:var(--ac);color:var(--bg);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;margin-top:14px}
  .btn:disabled{opacity:.35} .btn.ghost{background:transparent;border:1px solid rgba(255,255,255,.2);color:var(--tx)}
  .days{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
  .day{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:calc(var(--rad,16px) - 1px);padding:11px;text-align:center;color:var(--tx);font-family:inherit;cursor:pointer}
  .day .lb{font-size:12px;font-weight:700} .day .dt{font-size:10px;opacity:.55;margin-top:2px}
  .day.sel{background:var(--ac);color:var(--bg)} .day:disabled{opacity:.32}
  .day .lv{font-size:9px;color:#f0a3b0}
  .slots{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .slot{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:11px;padding:10px 0;color:var(--tx);font-family:inherit;font-size:12px;cursor:pointer;direction:ltr}
  .slot.sel{background:var(--ac);color:var(--bg);font-weight:700} .slot:disabled{opacity:.3;text-decoration:line-through}
  .ticket{background:var(--card);border:1px solid rgba(255,255,255,.09);border-radius:calc(var(--rad,16px) + 6px);overflow:hidden}
  .ticket .th{background:color-mix(in srgb,var(--ac) 12%,transparent);padding:16px}
  .ticket .th .k{font-size:10.5px;color:var(--ac)} .ticket .th h2{font-size:17px;margin-top:3px}
  .ticket .rows{padding:16px;display:grid;gap:11px;font-size:13px}
  .trow2{display:flex;justify-content:space-between} .trow2 .k{opacity:.5}
  .total{border-top:1px dashed rgba(255,255,255,.18);padding-top:12px;font-weight:700}
  .total b{color:var(--ac)}
  .back{display:flex;align-items:center;gap:9px;margin-bottom:12px}
  .back button{width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:none;color:var(--tx);cursor:pointer;font-size:15px}
  .back h1{font-size:17px}
  .success{text-align:center;padding:60px 18px}
  .ok{width:82px;height:82px;border-radius:50%;background:var(--ac);color:var(--bg);display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto;animation:pop .5s cubic-bezier(.2,1.6,.4,1)}
  @keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
  .wa{display:flex;gap:11px;background:var(--card);border:1px solid rgba(255,255,255,.1);border-radius:var(--rad,16px);padding:14px;margin-top:22px;text-align:right;font-size:12px;line-height:1.8}
  .wa .ic{width:38px;height:38px;border-radius:50%;background:#22a55b;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
/* ═══ تُقرأ الهوية والثيم مما حفظته المالكة في «مُنشئ الصفحة» ═══ */
const THEMES={
  'dark-luxury':{bg:'#09090b',card:'#151517',ac:'#e5c158',tx:'#f5f1e8'},
  'rose-velvet':{bg:'#1a0e12',card:'#241318',ac:'#e08a9b',tx:'#f8eef1'},
  'minimal-emerald':{bg:'#0a1413',card:'#12201e',ac:'#8fd0c0',tx:'#eef6f4'},
  'pearl-light':{bg:'#f7f3ec',card:'#ffffff',ac:'#9c8047',tx:'#2e241b'},
};
const load=(k,f)=>LumaStore.get(k,f);
const CFG={slug:'lama-beauty',title:'صالون لمسة',bio:'وجهتكِ الأولى للجمال في جدة — مكياج، شعر، وعناية ملكية بلمسات خبيرات.',phone:'0555 123 456',address:'جدة · حي الشاطئ',logo:'',cover:'',theme:'dark-luxury',
  policy:'الحضور قبل الموعد بـ10 دقائق يضمن اكتمال جلستك كاملة.\nيمكن إلغاء أو تعديل الحجز مجاناً قبل 24 ساعة من الموعد.\nالتأخر أكثر من 15 دقيقة قد يتطلب إعادة جدولة الموعد.\nقيمة العربون (إن وُجد) تُخصم من الفاتورة النهائية.',
  featured:{'مكياج عروس':'الأكثر طلباً'},
  ...load('luma_page_cfg',{})};
/* ثيم مخصص من المحرر الكامل، أو قالب جاهز */
const T=(CFG.theme==='custom'&&CFG.themeCustom)?{...THEMES['dark-luxury'],...CFG.themeCustom}:(THEMES[CFG.theme]||THEMES['dark-luxury']);
const rt=document.documentElement.style;
rt.setProperty('--bg',T.bg);rt.setProperty('--card',T.card);rt.setProperty('--ac',T.ac);rt.setProperty('--tx',T.tx);
rt.setProperty('--rad',(T.rad!=null?T.rad:18)+'px');

/* ═══ الخط المخصص — يُحمَّل بشكل غير حاجب حتى لا يجمّد الصفحة ═══ */
const FONTS={
  plex:["'IBM Plex Sans Arabic',sans-serif",'IBM+Plex+Sans+Arabic:wght@300;400;500;700'],
  cairo:["'Cairo',sans-serif",'Cairo:wght@300;400;600;700'],
  tajawal:["'Tajawal',sans-serif",'Tajawal:wght@300;400;500;700'],
  almarai:["'Almarai',sans-serif",'Almarai:wght@300;400;700'],
  'noto-kufi':["'Noto Kufi Arabic',sans-serif",'Noto+Kufi+Arabic:wght@300;400;600'],
  messiri:["'El Messiri',sans-serif",'El+Messiri:wght@400;600'],
  amiri:["'Amiri',serif",'Amiri:wght@400;700'],
  changa:["'Changa',sans-serif",'Changa:wght@300;400;600'],
};
const FK=FONTS[CFG.font||'plex'];
if(FK&&(CFG.font||'plex')!=='plex'){
  const fl=document.createElement('link');fl.rel='stylesheet';fl.media='print';
  fl.href='https://fonts.googleapis.com/css2?family='+FK[1]+'&display=swap';
  fl.onload=function(){this.media='all';};
  document.head.appendChild(fl);
  document.body.style.fontFamily=FK[0];
}

/* ═══ رسالة الترحيب — نافذة منبثقة أول ما تُفتح الصفحة، تُغلق لبقية الجلسة ═══ */
if(CFG.welcome&&String(CFG.welcome).trim()&&!(()=>{try{return sessionStorage.getItem('luma_wb_x');}catch(e){return null;}})()){
  const wp=document.createElement('div');wp.className='wpop';
  wp.innerHTML=`<div class="wcard" role="dialog" aria-label="رسالة ترحيب">
    <button class="wx" aria-label="إغلاق">✕</button>
    <div class="wlogo"></div>
    <div class="wsalon"></div>
    <div class="wmsg"></div>
    <button class="wok">حسناً، أكملي 🌸</button>
  </div>`;
  wp.querySelector('.wlogo').textContent=String(CFG.title||'L').replace('صالون ','').charAt(0);
  wp.querySelector('.wsalon').textContent=CFG.title||'';
  wp.querySelector('.wmsg').textContent=CFG.welcome;
  const closeWp=()=>{try{sessionStorage.setItem('luma_wb_x','1');}catch(e){}wp.classList.remove('show');setTimeout(()=>wp.remove(),250);};
  wp.querySelector('.wx').onclick=closeWp;
  wp.querySelector('.wok').onclick=closeWp;
  wp.addEventListener('click',e=>{if(e.target===wp)closeWp();});
  document.body.appendChild(wp);
  requestAnimationFrame(()=>wp.classList.add('show'));
}

/* ═══ بيانات الصالون: الخدمات من الكتالوج الحي (تديره المالكة من شاشة «الخدمات») ═══ */
const SVC_DEFAULTS=[['مكياج سهرة',2,350,'مكياج'],['مكياج عروس',4,850,'مكياج'],['مكياج ناعم',2,250,'مكياج'],['صبغة + قص',3,550,'شعر'],['تسريحة',2,200,'شعر'],['كيراتين',4,700,'شعر'],['هيدرافيشل',3,480,'بشرة'],['تنظيف بشرة',2,320,'بشرة'],['تقشير',2,280,'بشرة'],['منيكير جل',2,160,'أظافر'],['منيكير + بديكير',3,240,'أظافر'],['تركيب أظافر',3,220,'أظافر']];
const CATLG=(load('luma_svc_catalog',null)||SVC_DEFAULTS).filter(s=>s&&s[0]);
const CAT_EMOJI={'مكياج':'✨','شعر':'💇‍♀️','أظافر':'💅','بشرة':'🧖‍♀️'};
const SERVICES=CATLG.map((s,i)=>({id:i+1,cat:s[3]||'أخرى',n:s[0],p:s[2],d:(s[1]||2)*30}));
const CATS=[...new Set(SERVICES.map(s=>s.cat))].map(c=>[c,c+' '+(CAT_EMOJI[c]||'🌸')]);
/* الخدمات المميزة تتصدر قسمها */
const FEAT=CFG.featured||{};
SERVICES.sort((a,b)=>(FEAT[b.n]?1:0)-(FEAT[a.n]?1:0));
const ROLE2CAT={'مكياج':'makeup','شعر':'hair','بشرة':'skin','أظافر':'nails','رموش':'makeup','سبا':'skin'};
let STAFF=[
  {id:'amal',n:'أمل',role:'مكياج'},{id:'sara',n:'سارة',role:'شعر'},
  {id:'nora',n:'نورة',role:'بشرة'},{id:'reem',n:'ريم',role:'أظافر'},
];
load('luma_salon_staff',[]).forEach(s=>{if(s&&s.id)STAFF.push({id:s.id,n:s.n,role:s.role});});
const PROFILES=load('luma_staff_profiles',{});
const ARCH=load('luma_staff_archived',[]);
STAFF=STAFF.filter(s=>!ARCH.includes(s.id)&&((PROFILES[s.id]||{}).status||'active')==='active');
const LEAVES=load('luma_hr_leaves',[]).filter(l=>l.status==='approved');
const onLeave=(sid,iso)=>LEAVES.some(l=>l.staff===sid&&l.from<=iso&&l.to>=iso);
const SHIFTS=load('luma_hr_shifts',{});
function shiftOf(sid,weekday){const s=(SHIFTS[sid]||{})[weekday];return s||((weekday===5)?{off:true}:{off:false,start:'10:00',end:'20:00'});}
const BOOKED=load('luma_public_bookings',[]);

/* ═══ حالة المعالج ═══ */
let step=1,svc=null,staff=null,date='',time='';
/* ── كوبونات الخصم — تُدار من لوحة الصالون (برنامج الولاء) ── */
let coupon=null,cpnMsg='';
const COUPONS=()=>load('luma_coupons',[{code:'LUMA10',type:'percent',value:10,active:true}]);
const discount=()=>!coupon?0:coupon.type==='percent'?Math.round(svc.p*coupon.value/100):Math.min(coupon.value,svc.p);
window.applyCoupon=()=>{
  const code=(document.getElementById('cpn').value||'').trim().toUpperCase();
  const c=COUPONS().find(x=>x.active&&x.code.toUpperCase()===code);
  if(c){coupon=c;cpnMsg='';}else{coupon=null;cpnMsg=code?'الكود غير صحيح أو منتهي':'';}
  render();
};
const days=Array.from({length:3},(_,i)=>{const d=new Date();d.setDate(d.getDate()+i);
  return {iso:d.toISOString().slice(0,10),wd:d.getDay(),
    lb:i===0?'اليوم':d.toLocaleDateString('ar-SA',{weekday:'long'}),
    dt:d.toLocaleDateString('ar-SA',{day:'numeric',month:'short'})};});

function slotsFor(sid,day){
  if(onLeave(sid,day.iso))return[];
  const sh=shiftOf(sid,day.wd);if(sh.off)return[];
  const h0=parseInt(sh.start),h1=parseInt(sh.end);
  const out=[];
  for(let h=h0;h<h1;h++){
    const hh=String(h).padStart(2,'0')+':00';
    const taken=BOOKED.some(b=>b.staff===sid&&b.date===day.iso&&b.time===hh);
    out.push({t:hh,taken});
  }
  return out;
}
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');
const app=document.getElementById('app');

/* ═══ روابط السوشل ميديا — اختيارية، تُطبَّع من اسم مستخدم أو رابط كامل ═══ */
const SOC_ICONS={
  ig:'<rect x="4" y="4" width="16" height="16" rx="5"/><circle cx="12" cy="12" r="3.6"/><circle cx="16.8" cy="7.2" r="1" fill="currentColor" stroke="none"/>',
  tk:'<path d="M14 4v9.5a4 4 0 11-3-3.87"/><path d="M14 6.5c.8 1.8 2.4 3 4.5 3.2"/>',
  sc:'<path d="M12 4c2.8 0 4.5 2 4.5 4.7 0 1 .1 1.8.4 2.4.4.8 1.6 1 2.1 1.4-.5 1-1.9 1-2.5 1.6-.4.4-.2 1.2-.9 1.5-.6.3-1.6 0-2.3.4-.5.3-.8.9-1.3.9s-.8-.6-1.3-.9c-.7-.4-1.7-.1-2.3-.4-.7-.3-.5-1.1-.9-1.5-.6-.6-2-.6-2.5-1.6.5-.4 1.7-.6 2.1-1.4.3-.6.4-1.4.4-2.4C7.5 6 9.2 4 12 4z"/>',
  x:'<path d="M5 5l14 14M19 5L5 19"/>',
  wa:'<path d="M12 4a8 8 0 00-6.9 12l-1 3.9 4-1A8 8 0 1012 4z"/><path d="M9.3 9.2c.5-.9 1-.5 1.3.1l.4.9c.1.3-.1.7-.4.9-.3.3-.3.5 0 .9.4.6 1 1.2 1.7 1.5.4.2.6.2.8-.1.2-.3.5-.7.9-.5l1.2.6c.5.3.4.8-.1 1.3-1.7 1.7-6.5-1.8-6.2-4.2z"/>',
};
function socialUrl(k,v){
  v=String(v||'').trim();if(!v)return null;
  if(/^https?:\/\//i.test(v))return v;
  const h=v.replace(/^@/,'');
  if(k==='ig')return 'https://instagram.com/'+h;
  if(k==='tk')return 'https://tiktok.com/@'+h;
  if(k==='sc')return 'https://snapchat.com/add/'+h;
  if(k==='x')return 'https://x.com/'+h;
  if(k==='wa'){let d=h.replace(/\D/g,'');if(d.startsWith('05'))d='966'+d.slice(1);return 'https://wa.me/'+d;}
  return null;
}
function socialRow(){
  const s=CFG.social||{};
  const links=['ig','tk','sc','x','wa'].map(k=>({k,url:socialUrl(k,s[k])})).filter(l=>l.url);
  if(!links.length)return '';
  return `<div class="socs">${links.map(l=>`
    <a class="soc soc-${l.k}" href="${l.url}" target="_blank" rel="noopener" aria-label="${l.k}">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${SOC_ICONS[l.k]}</svg>
    </a>`).join('')}</div>`;
}

/* ═══ «من نحن» — نافذة منبثقة عند الطلب، نصها من «صفحتي والرابط» ═══ */
window.showAbout=()=>{
  const txt=String(CFG.about||'').trim();if(!txt)return;
  const ov=document.createElement('div');ov.className='wpop';
  ov.innerHTML=`<div class="wcard" role="dialog" aria-label="من نحن">
    <button class="wx" aria-label="إغلاق">✕</button>
    <div class="wlogo"></div>
    <div class="wsalon"></div>
    <div style="font-size:17px;font-weight:700;margin-bottom:10px">من نحن ✨</div>
    <div class="wabout"></div>
    <div style="font-size:11px;opacity:.55;margin-top:14px">${esc(CFG.address||'')}${CFG.phone?` · <bdo dir="ltr">${esc(CFG.phone)}</bdo>`:''}</div>
    <button class="wok">إغلاق</button>
  </div>`;
  ov.querySelector('.wlogo').textContent=String(CFG.title||'L').replace('صالون ','').charAt(0);
  ov.querySelector('.wsalon').textContent=CFG.title||'';
  ov.querySelector('.wabout').innerHTML=txt.split('\n').map(l=>l.trim()).filter(Boolean)
    .map(l=>`<p style="font-size:13.5px;line-height:2.1;opacity:.85;margin-bottom:8px;text-align:right">${esc(l)}</p>`).join('');
  const close=()=>{ov.classList.remove('show');setTimeout(()=>ov.remove(),250);};
  ov.querySelector('.wx').onclick=close;
  ov.querySelector('.wok').onclick=close;
  ov.addEventListener('click',e=>{if(e.target===ov)close();});
  document.body.appendChild(ov);
  requestAnimationFrame(()=>ov.classList.add('show'));
};

function header(){
  return `<div class="cover">${CFG.cover?`<img src="${CFG.cover}" alt=""/>`:''}
    <div class="logo">${CFG.logo?`<img src="${CFG.logo}" alt=""/>`:esc(CFG.title).charAt(0)}</div></div>
  <div class="head"><h1>${esc(CFG.title)}</h1><div class="bio">${esc(CFG.bio)}</div>
    <div class="meta">${esc(CFG.address||'')} · <bdo dir="ltr">${esc(CFG.phone||'')}</bdo> · ★ 4.9 (512)
      ${String(CFG.about||'').trim()?`<button class="aboutBtn" onclick="showAbout()">من نحن ✨</button>`:''}</div>
    ${socialRow()}</div>
  <div class="prog">${[1,2,3,4].map(i=>`<span class="${i<=step?'on':''}"></span>`).join('')}</div>`;
}
function back(t,to){return `<div class="back"><button onclick="go(${to})">‹</button><h1>${t}</h1></div>`;}

/* ═══ معرض الأعمال — صور وفيديوهات تديرها المالكة من «صفحتي والرابط» ═══ */
function gallery(){
  const g=CFG.gallery||[];if(!g.length)return '';
  return `<div class="gal"><div class="gal-t">من أعمال ${esc(CFG.title)} ✨</div>
    <div class="gal-row">${g.map((x,i)=>`
      <button class="gal-it" onclick="galOpen(${i})" aria-label="عرض">
        ${x.type==='video'
          ?`${x.yt?`<img src="https://i.ytimg.com/vi/${x.yt}/hqdefault.jpg" alt="" onerror="this.remove()"/>`:''}<span class="vid">▶</span>`
          :`<img src="${x.src}" alt="" loading="lazy" onerror="this.closest('.gal-it').remove()"/>`}
      </button>`).join('')}</div></div>`;
}
/* ═══ موقع الصالون على الخريطة — إحداثيات أو رابط خرائط Google ═══ */
function mapInfo(){
  const v=String(CFG.map||'').trim();if(!v)return null;
  const co=v.match(/^(-?\d{1,2}\.\d+)\s*,\s*(-?\d{1,3}\.\d+)$/)         /* إحداثيات مباشرة */
        ||v.match(/@(-?\d{1,2}\.\d+),(-?\d{1,3}\.\d+)/);                 /* من رابط خرائط */
  if(co)return {q:co[1]+','+co[2],link:'https://www.google.com/maps/search/?api=1&query='+co[1]+','+co[2]};
  if(/^https?:\/\//i.test(v))return {q:encodeURIComponent(CFG.address||CFG.title),link:v};
  return {q:encodeURIComponent(v),link:'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(v)};
}
function mapCard(){
  const m=mapInfo();if(!m)return '';
  return `<div class="mapc">
    <div class="mt">موقعنا 📍 <span style="opacity:.55;font-weight:400;font-size:11px">${esc(CFG.address||'')}</span></div>
    <iframe class="mapf" src="https://www.google.com/maps?q=${m.q}&z=15&output=embed" loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="خريطة الموقع"></iframe>
    <a class="btn ghost" style="text-align:center;text-decoration:none;display:block" href="${m.link}" target="_blank" rel="noopener">🧭 الاتجاهات في خرائط Google</a>
  </div>`;
}

/* ═══ سياسة الحجز — بنودها تديرها المالكة من «صفحتي والرابط» ═══ */
function policyBox(compact){
  const lines=String(CFG.policy||'').split('\n').map(l=>l.trim()).filter(Boolean);
  if(!lines.length)return '';
  return `<div class="policy${compact?' compact':''}">
    <div class="pt">سياسة الحجز 📋</div>
    ${lines.map(l=>`<div class="pl"><span>◆</span>${esc(l)}</div>`).join('')}</div>`;
}
window.galOpen=i=>{
  const x=(CFG.gallery||[])[i];if(!x)return;
  const lb=document.createElement('div');lb.className='gal-lb';
  lb.innerHTML=(x.type==='video'
    ?(x.yt?`<iframe src="https://www.youtube.com/embed/${x.yt}" allow="autoplay;fullscreen" allowfullscreen></iframe>`
          :`<video src="${x.src}" controls autoplay playsinline></video>`)
    :`<img src="${x.src}" alt=""/>`)+`<button class="gx" aria-label="إغلاق">✕</button>`;
  const close=()=>lb.remove();
  lb.onclick=e=>{if(e.target===lb)close();};
  lb.querySelector('.gx').onclick=close;
  document.body.appendChild(lb);
};

function render(){
  if(step===5){
    app.innerHTML=header()+`<div class="success">
      <div class="ok">✓</div><h1 style="margin-top:18px">تم تأكيد حجزك 🎉</h1>
      <p style="font-size:13px;opacity:.7;margin-top:8px">${esc(svc.n)} · مع ${esc(staff.n)}<br>${date} · <bdo dir="ltr">${time}</bdo></p>
      <div class="wa"><span class="ic">💬</span><div><b>واتساب · ${esc(CFG.title)}</b><br>أهلاً 🌸 حجزك مؤكد يوم ${date} الساعة <bdo dir="ltr">${time}</bdo>. نراكِ قريباً!</div></div>
      <button class="btn ghost" onclick="restart()">حجز موعد آخر</button></div>`;
    window.scrollTo({top:0});return;
  }
  let s='';
  if(step===1){
    s=gallery()+`<h1 style="font-size:18px">اختاري خدمتك</h1>`+CATS.map(([k,ar])=>{
      const list=SERVICES.filter(x=>x.cat===k);if(!list.length)return'';
      return `<div class="cat">${ar}</div>`+list.map(x=>`<button class="svc" onclick="pickSvc(${x.id})">
        <span>${FEAT[x.n]?`<span class="feat">⭐ ${esc(FEAT[x.n])}</span>`:''}<span class="n">${x.n}</span><div class="d">${x.d} دقيقة</div></span><span class="p">${x.p} ر.س</span></button>`).join('');
    }).join('')+mapCard()+policyBox();
  }
  if(step===2){
    const iso=date||days[0].iso;
    s=back('اختاري الأخصائية',1)+`<div class="grid2">`+STAFF.map(x=>{
      const lv=onLeave(x.id,iso);
      return `<button class="stf ${lv?'leave':''} ${staff&&staff.id===x.id?'sel':''}" onclick="pickStaff('${x.id}')">
        <span class="av">${x.n.charAt(0)}</span><span class="nm">${x.n}</span><div class="rl">${x.role}</div>
        ${lv?'<div class="lv">في إجازة معتمدة</div>':''}</button>`;}).join('')+`</div><div id="reroute"></div>`;
  }
  if(step===3){
    s=back('التاريخ والوقت',2)+`<div class="days">`+days.map((d,i)=>{
      const lv=onLeave(staff.id,d.iso);
      return `<button class="day ${date===d.iso?'sel':''}" ${lv?'disabled':''} onclick="pickDate(${i})">
        <div class="lb">${d.lb}</div><div class="dt">${d.dt}</div>${lv?'<div class="lv">إجازة</div>':''}</button>`;}).join('')+`</div>`;
    if(date){
      const day=days.find(d=>d.iso===date);
      const sl=slotsFor(staff.id,day);
      s+=sl.length?`<div class="slots">${sl.map(x=>`<button class="slot ${time===x.t?'sel':''}" ${x.taken?'disabled':''} onclick="pickTime('${x.t}')">${x.t}</button>`).join('')}</div>`
        :`<div style="text-align:center;opacity:.55;font-size:13px;padding:18px">لا أوقات متاحة هذا اليوم</div>`;
    }
    s+=`<button class="btn" ${!date||!time?'disabled':''} onclick="go(4)">متابعة</button>`;
  }
  if(step===4){
    s=back('تأكيد الموعد',3)+`<div class="ticket">
      <div class="th"><div class="k">تذكرة الحجز · ${esc(CFG.title)}</div><h2>${esc(svc.n)}</h2></div>
      <div class="rows">
        <div class="trow2"><span class="k">الأخصائية</span><b>${esc(staff.n)} · ${esc(staff.role)}</b></div>
        <div class="trow2"><span class="k">التاريخ</span><b>${date}</b></div>
        <div class="trow2"><span class="k">الوقت</span><b dir="ltr">${time}</b></div>
        <div class="trow2"><span class="k">المدة</span><b>${svc.d} دقيقة</b></div>
        ${coupon?`<div class="trow2" style="color:#6fa86a"><span class="k">كوبون <bdo dir="ltr">${coupon.code}</bdo></span><b>− ${discount()} ر.س</b></div>`:''}
        <div class="trow2 total"><span>الإجمالي</span><b>${svc.p-discount()} ر.س</b></div>
      </div></div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <input id="cpn" placeholder="كود خصم؟ (اختياري)" dir="ltr" value="${coupon?coupon.code:''}"
          style="flex:1;text-align:right;padding:12px 14px;border-radius:12px;border:1px solid rgba(150,130,90,.35);background:transparent;color:inherit;font-family:inherit;font-size:13px;text-transform:uppercase"/>
        <button class="btn ghost" style="margin:0;padding:12px 18px;font-size:13px" onclick="applyCoupon()">تطبيق</button>
      </div>
      ${cpnMsg?`<div style="font-size:12px;color:#c97b88;margin-top:6px">${cpnMsg}</div>`:coupon?`<div style="font-size:12px;color:#6fa86a;margin-top:6px">تم تطبيق الخصم ✓</div>`:''}
      ${policyBox(true)}
      <button class="btn" onclick="confirmBooking()">تأكيد الحجز ✓</button>`;
  }
  app.innerHTML=header()+`<div class="step">${s}</div>`;
  if(step===2&&staff&&onLeave(staff.id,date||days[0].iso))showReroute();
  window.scrollTo({top:0});
}
function showReroute(){
  const iso=date||days[0].iso;
  const alt=STAFF.find(x=>x.id!==staff.id&&x.role===staff.role&&!onLeave(x.id,iso))
        ||STAFF.find(x=>x.id!==staff.id&&!onLeave(x.id,iso));
  document.getElementById('reroute').innerHTML=`<div class="reroute">
    💛 ${staff.n} في إجازة حالياً — تحبين الحجز مع <b>${alt?alt.n:'زميلة أخرى'}</b>${alt&&alt.role===staff.role?' (نفس التخصص)':''} أو اختيار تاريخ آخر؟
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
      ${alt?`<button class="btn" style="margin:0;padding:11px;font-size:12.5px" onclick="pickAlt('${alt.id}')">الحجز مع ${alt.n}</button>`:''}
      <button class="btn ghost" style="margin:0;padding:11px;font-size:12.5px" onclick="go(3)">اختيار تاريخ آخر</button>
    </div></div>`;
}
window.go=n=>{step=n;render();};
window.restart=()=>{step=1;svc=staff=null;date=time='';coupon=null;cpnMsg='';render();};
window.pickSvc=id=>{svc=SERVICES.find(x=>x.id===id);
  /* اقتراح الأخصائية المناسبة للتصنيف تلقائياً */
  step=2;render();};
window.pickStaff=id=>{staff=STAFF.find(x=>x.id===id);
  if(onLeave(id,date||days[0].iso)){render();}else{step=3;render();}};
window.pickAlt=id=>{staff=STAFF.find(x=>x.id===id);step=3;render();};
window.pickDate=i=>{date=days[i].iso;time='';render();};
window.pickTime=t=>{time=t;render();};
window.confirmBooking=()=>{
  const rec={staff:staff.id,staffName:staff.n,client:'حجز أونلاين',service:svc.n,price:svc.p-discount(),coupon:coupon?coupon.code:null,date,time,at:new Date().toISOString()};
  BOOKED.push(rec);LumaStore.set('luma_public_bookings',BOOKED);
  /* الحجز بتاريخ اليوم يظهر مباشرة على لوحة حجوزات الصالون */
  if(date===days[0].iso){
    try{
      LumaStore.update('luma_salon_appts',a=>{a.push({id:Date.now(),staff:staff.id,start:(parseInt(time)-10)*2,dur:Math.max(1,Math.round(svc.d/30)),client:'حجز أونلاين — '+svc.n.split(' ')[0],service:svc.n,st:'pending',custom:true});return a;},[]);
    }catch(e){}
  }
  step=5;render();
};
render();
</script>
<script src="luma-i18n.js"></script>
</body>
</html>
